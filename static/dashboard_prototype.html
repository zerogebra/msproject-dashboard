    // ── PM STANDUP GENERATOR ─────────────────────────────────────────
    function StandupGenerator({ projects, user, onClose }) {
      const [notes, setNotes] = React.useState({});
      const [copied, setCopied] = React.useState(false);
      const dateStr = TODAY.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

      const PRIORITY = { 'Overdue': 0, 'Behind Schedule': 1, 'At Risk': 2, 'In Progress': 3, 'Not Started': 4 };

      function projectDueDate(p) {
        const ends = (p.items || []).filter(t => !t.is_summary && t.end).map(t => t.end);
        if (!ends.length) return null;
        return ends.sort().reverse()[0];
      }

      function daysUntil(dateStr) {
        if (!dateStr) return null;
        const d = new Date(dateStr); d.setHours(0,0,0,0);
        return Math.round((d - TODAY) / 86400000);
      }

      // Build project-level standup data
      const standupProjects = (projects || []).filter(p => {
        const leaves = (p.items || []).filter(t => !t.is_summary && !t.is_milestone);
        return leaves.some(t => t.pct < 100 && t.start && new Date(t.start) <= new Date(TODAY.getTime() + 14 * 86400000));
      }).map(p => {
        const items = p.items || [];
        const completed = items.filter(t => !t.is_summary && t.pct >= 100);
        const active = items.filter(t => !t.is_summary && !t.is_milestone && t.pct < 100 && t.start && new Date(t.start) <= TODAY);
        const upcoming = items.filter(t => !t.is_summary && !t.is_milestone && t.pct < 100 && t.start && new Date(t.start) > TODAY && daysUntil(t.start) <= 7);
        active.sort((a, b) => (PRIORITY[taskSt(a)?.l] ?? 99) - (PRIORITY[taskSt(b)?.l] ?? 99));
        return { ...p, _completed: completed, _active: active, _upcoming: upcoming, _due: projectDueDate(p) };
      }).filter(p => p._active.length || p._upcoming.length);

      function generateText() {
        let txt = `Good Morning 🌅\n\nProject status update — ${dateStr}\nPlease review and confirm or correct if I misunderstood anything.\n`;
        txt += `${'━'.repeat(56)}\n`;
        standupProjects.forEach((p, i) => {
          const due = p._due;
          const daysLeft = daysUntil(due);
          const dueLabel = due ? `Due: ${fmt(due)}${daysLeft != null ? (daysLeft < 0 ? ` ⚠️ OVERDUE (${Math.abs(daysLeft)}d)` : ` (${daysLeft}d remaining)`) : ''}` : '';
          txt += `\n${i+1}. ${p.name}${dueLabel ? ' — ' + dueLabel : ''}\n`;
          const pctVal = Math.round(p.progress || 0);
          txt += `   Overall: ${pctVal}%\n`;
          if (p._completed.length) {
            txt += `\n   ✅ COMPLETED:\n`;
            p._completed.forEach((t, ci) => { txt += `   ${String.fromCharCode(65+ci)}. ${t.title} — 100% ✓\n`; });
          }
          if (p._active.length) {
            txt += `\n   🔄 ACTION REQUIRED:\n`;
            p._active.forEach((t, ai) => {
              const st = taskSt(t);
              const stl = st?.l || '';
              const delay = taskDelayDays(t);
              const urgency = stl === 'Overdue' ? '🔴' : stl === 'Behind Schedule' || stl === 'At Risk' ? '🟡' : '🟢';
              txt += `   ${String.fromCharCode(65+(p._completed.length)+ai)}. ${urgency} ${t.title} — ${Math.round(t.pct)}% (${stl}${delay > 0 ? `, +${delay}d delay` : ''})\n`;
              txt += `      Plan: ${t.start ? fmt(t.start) : '?'} → ${t.end ? fmt(t.end) : '?'}\n`;
              const noteKey = `${p.code}_${t.id}`;
              if (notes[noteKey]) txt += `      Note: ${notes[noteKey]}\n`;
            });
          }
          if (p._upcoming.length) {
            txt += `\n   📅 STARTING THIS WEEK:\n`;
            p._upcoming.forEach((t, ui) => {
              txt += `   • ${t.title} — starts ${fmt(t.start)} (${daysUntil(t.start)}d)\n`;
            });
          }
          const pNote = notes[`proj_${p.code}`];
          if (pNote) txt += `\n   📝 ${pNote}\n`;
          txt += `${'─'.repeat(56)}\n`;
        });
        txt += `\nPlease provide updates by EOD. If you need support, raise it in the group.\n`;
        return txt;
      }

      function copyToClipboard() {
        const text = generateText();
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); });
        } else {
          const ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
          setCopied(true); setTimeout(() => setCopied(false), 2500);
        }
      }

      const PRIORITY_COLOR = { 'Overdue': '#dc2626', 'Behind Schedule': '#ef4444', 'At Risk': '#f97316', 'In Progress': '#6366f1', 'Not Started': '#94a3b8' };
      const URGENCY_ICON = { 'Overdue': '🔴', 'Behind Schedule': '🔴', 'At Risk': '🟡', 'In Progress': '🟢', 'Not Started': '⚪' };

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.55)', zIndex: 3000, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '32px 16px', overflowY: 'auto' }}>
          <div style={{ width: '100%', maxWidth: 780, borderRadius: 14, border: '1px solid var(--border)', background: 'var(--bg)', boxShadow: '0 24px 48px rgba(0,0,0,.3)', display: 'flex', flexDirection: 'column', maxHeight: 'calc(100vh - 64px)', overflow: 'hidden' }}>
            {/* Header */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 20px', borderBottom: '1px solid var(--border)', background: 'var(--s1)', flexShrink: 0 }}>
              <span style={{ fontSize: 18 }}>📋</span>
              <div>
                <div style={{ fontWeight: 800, fontSize: 14 }}>PM Daily Standup Generator</div>
                <div style={{ fontSize: 11, color: 'var(--muted)' }}>{dateStr} · {standupProjects.length} project{standupProjects.length !== 1 ? 's' : ''} with active tasks</div>
              </div>
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
                <button onClick={copyToClipboard}
                  style={{ fontSize: 12, padding: '6px 16px', borderRadius: 6, border: '1px solid var(--brand)', background: copied ? '#22c55e' : 'rgba(99,102,241,.12)', color: copied ? '#fff' : 'var(--brand)', cursor: 'pointer', fontWeight: 700, transition: 'all .2s' }}>
                  {copied ? '✓ Copied!' : '📋 Copy Message'}
                </button>
                <button onClick={onClose} style={{ fontSize: 18, background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer' }}>✕</button>
              </div>
            </div>

            {standupProjects.length === 0
              ? <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>✅ No active tasks requiring follow-up today.</div>
              : <div style={{ overflowY: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div style={{ fontSize: 11, color: 'var(--muted)', background: 'rgba(99,102,241,.06)', borderRadius: 7, padding: '8px 12px', border: '1px solid rgba(99,102,241,.15)' }}>
                    💡 Add notes to any task below — they'll appear in the copied message. Click "📋 Copy Message" when ready.
                  </div>

                  {standupProjects.map((p, pi) => {
                    const due = p._due;
                    const daysLeft = daysUntil(due);
                    const isOverdue = daysLeft != null && daysLeft < 0;
                    const pctVal = Math.round(p.progress || 0);
                    return (
                      <div key={p.code} style={{ borderRadius: 10, border: `1px solid ${isOverdue ? '#fca5a5' : 'var(--border)'}`, overflow: 'hidden', background: isOverdue ? 'rgba(239,68,68,.03)' : 'var(--s1)' }}>
                        {/* Project header */}
                        <div style={{ padding: '10px 16px', background: isOverdue ? 'rgba(239,68,68,.07)' : 'rgba(99,102,241,.05)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
                          <span style={{ fontWeight: 800, fontSize: 13, color: 'var(--brand)' }}>{pi+1}. {p.name}</span>
                          {due && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 10, background: isOverdue ? '#fee2e2' : 'rgba(99,102,241,.1)', color: isOverdue ? '#dc2626' : 'var(--brand)', fontWeight: 700 }}>
                            {isOverdue ? `⚠️ OVERDUE +${Math.abs(daysLeft)}d` : `Due: ${fmt(due)} (${daysLeft}d)`}
                          </span>}
                          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 7 }}>
                            <div style={{ width: 55, height: 6, background: 'var(--s2)', borderRadius: 3, overflow: 'hidden' }}>
                              <div style={{ width: pctVal + '%', height: '100%', background: pctVal >= 75 ? '#22c55e' : '#6366f1', borderRadius: 3 }} />
                            </div>
                            <span style={{ fontWeight: 800, fontSize: 12 }}>{pctVal}%</span>
                          </div>
                        </div>

                        <div style={{ padding: '10px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
                          {/* Completed (summarised) */}
                          {p._completed.length > 0 && (
                            <div>
                              <div style={{ fontSize: 10, fontWeight: 700, color: '#16a34a', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 4 }}>✅ Completed</div>
                              {p._completed.map(t => (
                                <div key={t.id} style={{ fontSize: 11, color: 'var(--muted)', padding: '2px 0' }}>
                                  <span style={{ marginRight: 6 }}>✓</span>{t.title}
                                </div>
                              ))}
                            </div>
                          )}

                          {/* Active tasks — full detail */}
                          {p._active.length > 0 && (
                            <div>
                              <div style={{ fontSize: 10, fontWeight: 700, color: '#6366f1', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>🔄 Action Required</div>
                              {p._active.map(t => {
                                const st = taskSt(t);
                                const stl = st?.l || '';
                                const delay = taskDelayDays(t);
                                const col = PRIORITY_COLOR[stl] || '#94a3b8';
                                const icon = URGENCY_ICON[stl] || '⚪';
                                const noteKey = `${p.code}_${t.id}`;
                                return (
                                  <div key={t.id} style={{ marginBottom: 8, borderRadius: 7, border: `1px solid ${col}33`, background: col + '08', padding: '8px 12px' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                                      <span style={{ fontSize: 13 }}>{icon}</span>
                                      <span style={{ fontWeight: 700, fontSize: 12, flex: 1 }}>{t.title}</span>
                                      <span style={{ fontSize: 10, padding: '2px 7px', borderRadius: 10, background: col + '22', color: col, fontWeight: 700, whiteSpace: 'nowrap' }}>
                                        {stl}{delay > 0 ? ` +${delay}d` : ''}
                                      </span>
                                      <span style={{ fontSize: 12, fontWeight: 800, color: col }}>{Math.round(t.pct)}%</span>
                                    </div>
                                    <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 6 }}>
                                      Plan: {t.start ? fmt(t.start) : '?'} → {t.end ? fmt(t.end) : '?'}
                                      {t.wbs ? ` · WBS ${t.wbs}` : ''}
                                    </div>
                                    <input value={notes[noteKey] || ''} placeholder="Add note (e.g. 'as per Hana, testing in progress')…"
                                      onChange={e => setNotes(n => ({ ...n, [noteKey]: e.target.value }))}
                                      style={{ width: '100%', background: 'var(--bg)', border: '1px dashed var(--border)', borderRadius: 5, padding: '4px 8px', color: 'var(--fg)', fontSize: 11, boxSizing: 'border-box' }} />
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          {/* Upcoming tasks */}
                          {p._upcoming.length > 0 && (
                            <div>
                              <div style={{ fontSize: 10, fontWeight: 700, color: '#f59e0b', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 4 }}>📅 Starting This Week</div>
                              {p._upcoming.map(t => (
                                <div key={t.id} style={{ fontSize: 11, color: 'var(--muted)', padding: '2px 0' }}>
                                  • {t.title} — starts {fmt(t.start)} ({daysUntil(t.start)}d)
                                </div>
                              ))}
                            </div>
                          )}

                          {/* Project-level note */}
                          <input value={notes[`proj_${p.code}`] || ''} placeholder="Add project-level note (e.g. blocker, dependency, context)…"
                            onChange={e => setNotes(n => ({ ...n, [`proj_${p.code}`]: e.target.value }))}
                            style={{ width: '100%', background: 'var(--bg)', border: '1px dashed rgba(99,102,241,.3)', borderRadius: 5, padding: '5px 10px', color: 'var(--fg)', fontSize: 11, boxSizing: 'border-box' }} />
                        </div>
                      </div>
                    );
                  })}

                  {/* Message preview */}
                  <div style={{ borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
                    <div style={{ padding: '8px 14px', background: 'var(--s2)', borderBottom: '1px solid var(--border)', fontWeight: 700, fontSize: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <span>💬 Message Preview</span>
                      <button onClick={copyToClipboard}
                        style={{ fontSize: 11, padding: '3px 12px', borderRadius: 5, border: '1px solid var(--brand)', background: copied ? '#22c55e' : 'transparent', color: copied ? '#fff' : 'var(--brand)', cursor: 'pointer', fontWeight: 600 }}>
                        {copied ? '✓ Copied!' : '📋 Copy'}
                      </button>
                    </div>
                    <pre style={{ margin: 0, padding: '12px 16px', fontSize: 11, whiteSpace: 'pre-wrap', wordBreak: 'break-word', color: 'var(--fg)', background: 'var(--bg)', maxHeight: 260, overflowY: 'auto', fontFamily: 'monospace, monospace', lineHeight: 1.6 }}>
                      {generateText()}
                    </pre>
                  </div>
                </div>
            }
          </div>
        </div>
      );
    }

    // ── PM STANDUP WIDGET ─────────────────────────────────────────────
    function StandupWidget({ projects, user }) {
      const [open, setOpen] = useState(true);
      const [showGenerator, setShowGenerator] = useState(false);
      const isAdmin = user?.role === 'admin';
      if (!isAdmin) return null;

      // Collect ALL leaf tasks that the team should be active on:
      // start date has arrived (start <= today) AND not yet 100% complete
      const runningTasks = [];
      (projects || []).forEach(p => {
        (p.items || []).forEach(t => {
          if (t.is_summary || t.is_milestone || t.pct >= 100) return;
          if (!t.start) return;
          if (new Date(t.start) > TODAY) return; // not started yet — skip
          const st = taskSt(t);
          runningTasks.push({ ...t, projectName: p.name, projectCode: p.code, _st: st });
        });
      });

      function scrollToTask(t) {
        const el = document.getElementById(`proj-${t.projectCode}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      const stColor = { 'In Progress': 'var(--brand)', 'At Risk': '#f97316', 'Behind Schedule': '#ef4444', 'Overdue': '#dc2626', 'Not Started': 'var(--muted)' };

      return (
        <>
        {showGenerator && <StandupGenerator projects={projects} user={user} onClose={() => setShowGenerator(false)} />}
        <div id="pm-standup-widget" style={{ margin: '0 0 18px', borderRadius: 10, border: '1px solid var(--border)', background: 'var(--s1)', overflow: 'hidden' }}>
          <div onClick={() => setOpen(o => !o)}
            style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 16px', cursor: 'pointer', background: 'rgba(99,102,241,.08)', borderBottom: open ? '1px solid var(--border)' : 'none' }}>
            <span style={{ fontSize: 14 }}>📋</span>
            <strong style={{ fontSize: 13 }}>PM Daily Standup</strong>
            <span style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 4 }}>
              {runningTasks.length > 0
                ? `${runningTasks.length} task${runningTasks.length !== 1 ? 's' : ''} active — ask team for update`
                : 'No active tasks today'}
            </span>
            <button onClick={e => { e.stopPropagation(); setShowGenerator(true); }}
              style={{ marginLeft: 'auto', fontSize: 11, padding: '3px 12px', borderRadius: 5, border: '1px solid var(--brand)', background: 'rgba(99,102,241,.12)', color: 'var(--brand)', cursor: 'pointer', fontWeight: 600 }}>
              ✉ Generate Message
            </button>
            <span style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 4 }}>{open ? '▲' : '▼'}</span>
          </div>
          {open && (
            runningTasks.length === 0
              ? <div style={{ padding: '20px', textAlign: 'center', color: 'var(--muted)', fontSize: 12 }}>✅ All active tasks are on track or not yet started.</div>
              : <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: 'var(--s2)', color: 'var(--muted)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '.05em' }}>
                    <th style={{ padding: '6px 12px', textAlign: 'left', fontWeight: 700 }}>Project</th>
                    <th style={{ padding: '6px 12px', textAlign: 'left', fontWeight: 700 }}>Task</th>
                    <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 700, width: 55 }}>WBS</th>
                    <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 700, width: 55 }}>%</th>
                    <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 700, width: 90 }}>Plan Start</th>
                    <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 700, width: 90 }}>Plan Finish</th>
                    <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 700, width: 110 }}>Status</th>
                    <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 700, width: 55 }}>Go</th>
                  </tr>
                </thead>
                <tbody>
                  {runningTasks.map((t, i) => {
                    const stLabel = t._st?.l || '';
                    const delay = taskDelayDays(t);
                    const col = stColor[stLabel] || 'var(--muted)';
                    return (
                      <tr key={t.id || i} style={{ borderTop: '1px solid var(--border)', background: i % 2 === 0 ? 'transparent' : 'var(--s2)' }}>
                        <td style={{ padding: '7px 12px', color: 'var(--brand)', fontWeight: 600, whiteSpace: 'nowrap' }}>{t.projectName}</td>
                        <td style={{ padding: '7px 12px' }}>{t.title}</td>
                        <td style={{ padding: '7px 8px', textAlign: 'center', color: 'var(--muted)' }}>{t.wbs || '—'}</td>
                        <td style={{ padding: '7px 8px', textAlign: 'center', fontWeight: 700 }}>{Math.round(t.pct)}%</td>
                        <td style={{ padding: '7px 8px', textAlign: 'center', color: 'var(--muted)' }}>{t.start ? fmt(t.start) : '—'}</td>
                        <td style={{ padding: '7px 8px', textAlign: 'center', color: 'var(--muted)' }}>{t.end ? fmt(t.end) : '—'}</td>
                        <td style={{ padding: '7px 8px', textAlign: 'center' }}>
                          <span style={{ fontSize: 10, padding: '2px 7px', borderRadius: 10, background: col + '22', color: col, fontWeight: 700, whiteSpace: 'nowrap' }}>
                            {stLabel || '—'}{delay > 0 ? ` +${delay}d` : ''}
                          </span>
                        </td>
                        <td style={{ padding: '7px 8px', textAlign: 'center' }}>
                          <button onClick={() => scrollToTask(t)}
                            style={{ fontSize: 10, padding: '2px 8px', borderRadius: 4, border: '1px solid var(--brand)', background: 'transparent', color: 'var(--brand)', cursor: 'pointer' }}>
                            ↓ View
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
        </>
      );
    }

    // ── ACTION ITEMS BOX (To-Do for users) ───────────────────────────
    function ActionItemsBox({ projects, user }) {
      const [open, setOpen] = useState(true);
      const isAdmin = user?.role === 'admin';
      // Don't show for admins — they see everything
      if (isAdmin) return null;
      if (!projects.length) return null;

      const todayStr = TODAY.toISOString().split('T')[0];

      // Collect action items across all visible projects
      const items = [];
      projects.forEach(p => {
        (p.items || []).forEach(t => {
          if (t.is_project_root || t.is_summary || t.is_milestone) return;
          const planStart = t.start?.split('T')[0];
          const planEnd   = t.end?.split('T')[0];

          // Task is past start date but still 0%
          if (planStart && planStart <= todayStr && t.pct === 0) {
            items.push({
              severity: 'high',
              project: p.name,
              projectCode: p.code,
              task: t.title,
              taskId: t.id,
              msg: `"${t.title}" has not started yet — was planned to start ${fmt(planStart)}`,
              icon: '🔴',
            });
          }
          // Task is in progress but plan end is within 5 days
          else if (t.pct > 0 && t.pct < 100 && planEnd) {
            const daysLeft = Math.ceil((new Date(planEnd) - TODAY) / 86400000);
            if (daysLeft >= 0 && daysLeft <= 5) {
              items.push({
                severity: 'warn',
                project: p.name,
                projectCode: p.code,
                task: t.title,
                taskId: t.id,
                msg: `"${t.title}" is at ${Math.round(t.pct)}% and due in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}`,
                icon: '🟡',
              });
            }
          }
          // Task is overdue (plan end passed, not 100%)
          else if (planEnd && planEnd < todayStr && t.pct < 100) {
            items.push({
              severity: 'overdue',
              project: p.name,
              projectCode: p.code,
              task: t.title,
              taskId: t.id,
              msg: `"${t.title}" is overdue — was due ${fmt(planEnd)}, currently at ${Math.round(t.pct)}%`,
              icon: '⚠',
            });
          }
        });
      });

      if (!items.length) return null;

      const sevOrder = { high: 0, overdue: 1, warn: 2 };
      const sorted = items.sort((a, b) => (sevOrder[a.severity] ?? 3) - (sevOrder[b.severity] ?? 3)).slice(0, 12);

      const colorFor = sev => sev === 'high' ? 'var(--r)' : sev === 'overdue' ? '#f97316' : 'var(--a)';

      return (
        <div style={{ background: 'var(--s1)', border: '1px solid var(--border)', borderRadius: 12, marginBottom: 18 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 16px', cursor: 'pointer', userSelect: 'none' }}
            onClick={() => setOpen(o => !o)}>
            <span style={{ fontSize: 13, fontWeight: 800, color: 'var(--text)' }}>📋 Your Action Items</span>
            <span style={{ fontSize: 10, fontWeight: 700, background: 'rgba(239,68,68,.12)', color: 'var(--r)', padding: '2px 8px', borderRadius: 8 }}>
              {sorted.length} item{sorted.length !== 1 ? 's' : ''} need attention
            </span>
            <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--muted)' }}>{open ? '▲' : '▼'}</span>
          </div>
          {open && (
            <div style={{ padding: '0 16px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
              {sorted.map((item, i) => (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px',
                  borderRadius: 8, border: `1px solid ${colorFor(item.severity)}22`,
                  background: `${colorFor(item.severity)}08`,
                }}>
                  <span style={{ fontSize: 14, flexShrink: 0 }}>{item.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.04em', marginRight: 6 }}>
                      {item.project}
                    </span>
                    <span style={{ fontSize: 12, color: 'var(--text)' }}>{item.msg}</span>
                  </div>
                  <button
                    onClick={() => {
                      // Scroll to project section and highlight
                      const el = document.getElementById(`proj-${item.projectCode}`);
                      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
                    }}
                    style={{ flexShrink: 0, fontSize: 11, padding: '4px 10px', borderRadius: 6, border: `1px solid ${colorFor(item.severity)}40`,
                      background: `${colorFor(item.severity)}12`, color: colorFor(item.severity), cursor: 'pointer', fontWeight: 700, whiteSpace: 'nowrap' }}>
                    Go to Task ↗
                  </button>
                </div>
              ))}
              <div style={{ fontSize: 10, color: 'var(--dim)', marginTop: 4 }}>
                Update task progress by clicking the % column in the project table below.
              </div>
            </div>
          )}
        </div>
      );
    }


    // ── REPORT PROJECT PICKER ────────────────────────────────────────
    function ReportProjectPicker({ projects, user, onClose, onToast }) {
      const [selected, setSelected] = useState(null);
      const p = projects.find(pr => pr.name === selected);
      return (
        <div className="cr-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="cr-modal" style={{ maxWidth: 520 }}>
            {p ? (
              <>
                <ReportModal p={p} allProjects={projects} onClose={onClose} onToast={onToast} />
              </>
            ) : (
              <>
                <h3 style={{ marginTop: 0 }}>📧 Generate Executive Report</h3>
                <p style={{ fontSize: 12, color: 'var(--muted)', marginTop: 0 }}>
                  Select a project to generate the status report for:
                </p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 320, overflowY: 'auto' }}>
                  {projects.map(pr => (
                    <button key={pr.code} onClick={() => setSelected(pr.name)}
                      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 8,
                        border: '1px solid var(--border)', background: 'var(--s2)', cursor: 'pointer', textAlign: 'left',
                        transition: 'background .15s' }}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--s3)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'var(--s2)'}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', flexShrink: 0,

                      <div style={{ flex: 1 }}>

    // ── ROOT APP ─────────────────────────────────────────────────────
    // ── CUBES 2026 PROGRAM PLAN ───────────────────────────────────────
    function Cubes2026Plan({ user, onClose }) {
      const isAdmin = user?.role === 'admin';
      const c2026Access = isAdmin ? 'edit' : (user?.c2026_access || 'view');
      if (c2026Access === 'no_access') return (
        <div style={{ position:'fixed', inset:0, background:'var(--bg)', zIndex:2000, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12 }}>

          <button onClick={onClose} style={{ marginTop:8, padding:'6px 18px', borderRadius:6, border:'1px solid var(--border)', background:'var(--s2)', cursor:'pointer', fontSize:13 }}>Close</button>
        </div>
      );
      const canEdit = c2026Access === 'edit';
      const [plan, setPlan] = React.useState(null);
      const [saving, setSaving] = React.useState(false);
      const [savedOk, setSavedOk] = React.useState(false);
      const [ganttMode, setGanttMode] = React.useState('quarterly');
      const [ganttExpanded, setGanttExpanded] = React.useState({});
      const [summaryExpanded, setSummaryExpanded] = React.useState({});
      const uid = () => 'id_' + Math.random().toString(36).slice(2,10);

      React.useEffect(() => {
        api.getC2026(user.id).then(d => { setPlan(d); });
      }, []);

      function update(fn) { setPlan(p => { const n = JSON.parse(JSON.stringify(p)); fn(n); return n; }); }

      async function savePlan() {
        setSaving(true);
        try { await api.saveC2026(user.id, plan); setSavedOk(true); setTimeout(() => setSavedOk(false), 2500); } finally { setSaving(false); }
      }

      // ─── Date auto-calc (triangle: 2 known → compute 3rd) ────────
      function addCalDays(dateStr, n) {
        const d = new Date(dateStr); d.setDate(d.getDate() + Math.round(n));
        return d.toISOString().split('T')[0];
      }
      function diffCalDays(s, e) {
        return Math.max(1, Math.round((new Date(e) - new Date(s)) / 86400000));
      }
      function autoCalc(row) {
        const hasS = !!row.start, hasE = !!row.end, hasD = row.days != null && row.days > 0;
        if (hasD && hasS) { row.end = addCalDays(row.start, row.days); }
        else if (hasS && hasE && !hasD) { row.days = diffCalDays(row.start, row.end); }
        else if (hasD && hasE && !hasS) { row.start = addCalDays(row.end, -row.days); }
      }
      function updateTeamRow(pi, phi, ri, field, val) {
        update(n => { const r = n.projects[pi].phases[phi].team_rows[ri]; r[field] = val; autoCalc(r); });
      }
      function updateRelease(pi, phi, ri, field, val) {
        update(n => { const r = n.projects[pi].phases[phi].releases[ri]; r[field] = val; autoCalc(r); });
      }

      function calcPhasePct(phase) {
        // PMO rule: undetermined/new phases count as 0%, not skipped
        const rows = phase.team_rows || [];
        if (!rows.length) return 0; // empty phase = 0% (brand new, unplanned)
        // Use days as weight if available, else 1 per row so all rows count
        const tot = rows.reduce((s, r) => s + (r.days || 1), 0);
        return Math.round(rows.reduce((s, r) => s + (r.pct || 0) * (r.days || 1), 0) / tot);
      }

      function calcProjectPct(proj) {
        const phases = proj.phases || [];
        if (!phases.length) return null;
        // All phases included — undetermined phases pull % down (PMO standard)
        const data = phases.map(ph => {
          const pct = calcPhasePct(ph);
          const days = Math.max(1, (ph.team_rows || []).reduce((s, r) => s + (r.days || 1), 0));
          return { pct, days };
        });
        const tot = data.reduce((s, x) => s + x.days, 0);
        return Math.round(data.reduce((s, x) => s + x.pct * x.days, 0) / tot);
      }

      function calcOverall() {
        if (!plan) return null;
        const projs = plan.projects || [];
        if (!projs.length) return null;
        // Only show overall if ALL projects have a weight defined
        const allWeighted = projs.every(p => p.weight != null && p.weight > 0);
        if (!allWeighted) return null; // TBD — prompt admin to set weights
        const weightTot = projs.reduce((s, p) => s + (p.weight || 0), 0);
        if (!weightTot) return null;
        return Math.round(projs.reduce((s, p) => s + calcProjectPct(p) * p.weight, 0) / weightTot);
      }

      // ─── Gantt helpers ────────────────────────────────────────────
      function allDates() {
        const ds = [];
        if (!plan) return ds;
        plan.projects.forEach(p => p.phases.forEach(ph => {
          ph.team_rows.forEach(r => { if (r.start) ds.push(new Date(r.start)); if (r.end) ds.push(new Date(r.end)); });
          ph.releases.forEach(r => { if (r.start) ds.push(new Date(r.start)); if (r.end) ds.push(new Date(r.end)); });
        }));
        return ds;
      }

      function ganttRange() {
        const ds = allDates();
        if (!ds.length) return { min: new Date('2025-07-01'), max: new Date('2026-12-31') };
        let mn = ds.reduce((a, b) => a < b ? a : b);
        let mx = ds.reduce((a, b) => a > b ? a : b);
        mn = new Date(mn.getFullYear(), mn.getMonth(), 1);
        const mxEnd = new Date(mx.getFullYear(), mx.getMonth() + 2, 0);
        return { min: mn, max: mxEnd };
      }

      function ganttColumns(mode) {
        const { min, max } = ganttRange();
        const cols = [];
        let cur = new Date(min);
        while (cur <= max) {
          if (mode === 'quarterly') {
            const q = Math.floor(cur.getMonth() / 3);
            const qStart = new Date(cur.getFullYear(), q * 3, 1);
            const qEnd = new Date(cur.getFullYear(), q * 3 + 3, 0);
            const label = `Q${q+1} ${cur.getFullYear()}`;
            if (!cols.length || cols[cols.length-1].label !== label) {
              cols.push({ label, start: qStart, end: qEnd });
            }
            cur = new Date(cur.getFullYear(), q * 3 + 3, 1);
          } else {
            const mStart = new Date(cur.getFullYear(), cur.getMonth(), 1);
            const mEnd = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
            const label = mStart.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
            cols.push({ label, start: mStart, end: mEnd });
            cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
          }
        }
        return cols;
      }

      function barPos(rowStart, rowEnd, cols) {
        if (!rowStart || !rowEnd) return null;
        const s = new Date(rowStart), e = new Date(rowEnd);
        const rS = cols[0].start, rE = cols[cols.length-1].end, total = rE - rS;
        const left = Math.max(0, (s - rS) / total * 100);
        const width = Math.max(0.5, Math.min(100-left, (e - s) / total * 100));
        return { left, width };
      }
      function todayPct(cols) {
        const rS = cols[0].start, rE = cols[cols.length-1].end;
        const p = (TODAY - rS) / (rE - rS) * 100;
        return (p >= 0 && p <= 100) ? p : null;
      }

      function phaseColor(pct) {
        if (pct == null) return '#94a3b8';

        return '#e2e8f0';

        if (s.toLowerCase().includes('progress')) return '#6366f1';
        if (s === 'Not Started') return '#cbd5e1';
        return '#f59e0b';
      }

      // ─── PLACEHOLDER — replaced below ────────────────────────────
      // replaced by inline JSX below

      if (!plan) return <div style={{ position:'fixed', inset:0, background:'var(--bg)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center' }}><div style={{ color:'var(--muted)', fontSize:14 }}>⏳ Loading CUBES 2026 Plan…</div></div>;
