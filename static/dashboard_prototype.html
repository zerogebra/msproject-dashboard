    // ── PROJECT SECTION ──────────────────────────────────────────────
    function ProjectSection({ p, onSaved, onToast, user }) {
      const settings = React.useContext(SettingsCtx);
      const [pushing, setPushing] = useState(false);
      const [crTask, setCrTask] = useState(null); // task for which RequestChangeModal is open
      const [detailTask, setDetailTask] = useState(null); // task for details modal
      const [reportMode, setReportMode] = useState(false);
      const [syncLocked, setSyncLocked] = useState(!!p.sync_locked);

      async function handleToggleSyncLock() {
        if (!isAdmin) return;
        const newVal = !syncLocked;
        try {
          await fetch(`/api/projects/${p.code}/sync-lock`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ caller_id: user?.id, locked: newVal }),
          });
          setSyncLocked(newVal);
          onToast(newVal ? '🔒 Project locked from MS Project sync' : '🔓 Project sync lock removed', 'success');
        } catch (e) { onToast('Failed to update sync lock', 'error'); }
      }

      // Make openDetails available to TaskTable children safely without deep prop drilling
      useEffect(() => {
        window.__openDetails = setDetailTask;
        return () => { window.__openDetails = null; };
      }, []);

      let maxDelayDays = 0;
      let delayReasonTasks = [];
      p.items.forEach(t => {
        const delay = t.extended_days || 0;
        if (t.is_critical && delay > 0) {
          if (delay > maxDelayDays) {
            maxDelayDays = delay;
            delayReasonTasks = [t.title];
          } else if (delay === maxDelayDays) {
            delayReasonTasks.push(t.title);
          }
        }
      });

      let pForecastEnd = null;
      if (maxDelayDays > 0) {
        const d = new Date(p.end);
        d.setDate(d.getDate() + maxDelayDays);
        pForecastEnd = d.toISOString().split('T')[0];
      }

      const dl = days(TODAY.toISOString().split('T')[0], p.end);
      const dlC = dl < 0 ? 'var(--r)' : dl <= 7 ? 'var(--a)' : 'var(--g)';
      const done = p.items.filter(t => !t.is_summary && !t.is_milestone && t.pct >= 100).length;
      const total = p.items.filter(t => !t.is_summary && !t.is_milestone).length;
      const isAdmin = user?.role === 'admin';

      async function handleClone() {
        if (!isAdmin) { onToast('Only admins can clone projects.', 'error'); return; }
        if (!window.confirm(`Create a clone of "${p.name}"?`)) return;
        setPushing(true);
        try {
          await api.cloneProject(p.code, user?.id);
          onToast(`✅ Cloned successfully`, 'success');
          onSaved();
        } catch (e) {
          onToast(`❌ ${e.message}`, 'error');
        }
        setPushing(false);
      }

      function handleGenerateReport() {
        setReportMode(true);
      }

      return (
        <div className="proj-section">
          <div className="ps-hdr">
            <div className="ps-av" style={{ background: `${p.color}18`, color: p.color, border: `1px solid ${p.color}40` }}>
              {p.code.substring(0, 3)}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="ps-nm">
                {p.name}
                {isAdmin && <span style={{ marginLeft: 8, cursor: 'pointer', opacity: 0.3, fontSize: 10 }} onClick={async () => {
                  const newTitle = window.prompt("Rename Project:", p.name);
                  if (!newTitle || newTitle === p.name) return;
                  // Requires /api/projects/{code} PUT route, which isn't there yet, but we have /api/tasks/{task_id} PUT. We'll skip project rename for now, or just let them clone.
                  // Actually they can rename the root task which is the project name!
                }} title="Use clone to rename projects"></span>}
              </div>
              <div className="ps-dt">
                Target: <strong>{fmt(p.end)}</strong>
                {pForecastEnd && <span style={{ color: 'var(--r)', marginLeft: 8 }}>→ Forecast: <strong>{fmt(pForecastEnd)}</strong> <span style={{ fontSize: 10, opacity: 0.8 }}>(Due to delay in: {delayReasonTasks.join(', ')})</span></span>}
              </div>
            </div>
            <div className="ps-mx">
              <div><div className="ps-mv" style={{ color: p.color }}>{p.progress}%</div><div className="ps-ml">Complete</div></div>
              <div><div className="ps-mv" style={{ color: pForecastEnd ? 'var(--r)' : dlC, fontSize: 16 }}>{days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end) < 0 ? Math.abs(days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end)) + 'd OD' : days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end) + 'd'}</div><div className="ps-ml">{days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end) < 0 ? 'Overdue' : 'Remaining'}</div></div>
              <span className={`rag rag-${p.health}`} style={{ fontSize: 12, padding: '5px 12px' }}>{ragLabel(p.health)}</span>
              {(isAdmin || settings.show_clone_btn || settings.show_report_btn) && (

    }


    // ── JORDAN WORKING CALENDAR ──────────────────────────────────────
    const JORDAN_HOLIDAYS = [
      '2026-01-01','2026-01-27',
      '2026-03-20','2026-03-21','2026-03-22', // Eid Al-Fitr
      '2026-05-01','2026-05-25',
      '2026-05-27','2026-05-28','2026-05-29','2026-05-30', // Eid Al-Adha
      '2026-06-10','2026-06-18','2026-08-25','2026-12-25',
      '2027-01-01','2027-03-09','2027-03-10','2027-03-11', // Eid Al-Fitr 2027
      '2027-05-01','2027-05-17','2027-05-18','2027-05-19','2027-05-20', // Eid Al-Adha 2027
      '2027-06-10','2027-08-14','2027-12-25',
    ];

    function isWorkingDay(d) {
      const dow = d.getDay(); // 0=Sun,1=Mon,...,5=Fri,6=Sat  →  Jordan: Fri+Sat = weekend
      if (dow === 5 || dow === 6) return false;
      return !JORDAN_HOLIDAYS.includes(d.toISOString().split('T')[0]);
    }

    function addWorkDays(startDate, n) {
      const d = new Date(startDate);
      if (n <= 0) return d;
      let added = 0;
      while (added < n) {
        d.setDate(d.getDate() + 1);
        if (isWorkingDay(d)) added++;
      }
      return d;
    }

    function fmtDate(d) { return d ? d.toISOString().split('T')[0] : ''; }

    // CUBES Implementation plan generator (all durations = working days)
    // overlapBaUiux: 0 = sequential (BA→UI/UX FS), 1-90 = % of BA done when UI/UX starts
    // overlapBeFe:   0 = sequential (BE→FE FS),    1-90 = % of BE done when FE starts
    function generateCubesPlan(startDateStr, disciplines, overlapBaUiux, overlapBeFe) {
      const tasks = [];
      const startDate = new Date(startDateStr + 'T08:00:00');

      const baD  = disciplines.BA?.days    || 0;   const baR  = disciplines.BA?.resources    || 1;
      const uxD  = disciplines.UIUX?.days  || 0;   const uxR  = disciplines.UIUX?.resources  || 1;
      const beD  = disciplines.BE?.days    || 0;   const beR  = disciplines.BE?.resources    || 1;
      const feD  = disciplines.FE?.days    || 0;   const feR  = disciplines.FE?.resources    || 1;
      const qcR    = disciplines.QC?.resources || 1;
      const qcPrep = disciplines.QC?.prepDays || 3;
      const df1D   = disciplines.QC?.df1Days || 3;
      const df2D   = disciplines.QC?.df2Days || 2;
      const regD   = disciplines.QC?.regDays || 2;

      // ── Phase 1: Requirements & Analysis ──────────────────────────────
      const p1Start  = new Date(startDate);
      const baStart  = new Date(p1Start);
      const baEnd    = baD > 0 ? addWorkDays(baStart, baD - 1) : new Date(baStart);

      // BA → UI/UX dependency: sequential (FS) or overlap at X% of BA
      let uxStart;
      if (overlapBaUiux > 0 && baD > 0 && uxD > 0) {
        uxStart = addWorkDays(baStart, Math.floor(baD * overlapBaUiux / 100));
      } else if (baD > 0) {
        uxStart = addWorkDays(baEnd, 1);   // FS: UI/UX starts after BA done
      } else {
        uxStart = new Date(p1Start);
      }
      const uxEnd = uxD > 0 ? addWorkDays(uxStart, uxD - 1) : new Date(uxStart);
      const p1End = new Date(Math.max(
        baD > 0 ? baEnd.getTime() : 0,
        uxD > 0 ? uxEnd.getTime() : 0,
        p1Start.getTime()
      ));

      tasks.push({ title: 'Phase 1: Requirements & Analysis', level: 2, is_summary: true, start: fmtDate(p1Start), end: fmtDate(p1End) });
      if (baD > 0) tasks.push({ title: 'Business Analysis (BA)', level: 3, start: fmtDate(baStart), end: fmtDate(baEnd), role: 'BA', resources: baR, duration_days: baD, predecessor: null });
      if (uxD > 0) tasks.push({ title: 'UI/UX Design', level: 3, start: fmtDate(uxStart), end: fmtDate(uxEnd), role: 'UIUX', resources: uxR, duration_days: uxD, predecessor: 'Business Analysis (BA)' });

      // ── Phase 2: Development ──────────────────────────────────────────
      const p2Start = addWorkDays(p1End, 1);
      const beStart = new Date(p2Start);
      const beEnd   = beD > 0 ? addWorkDays(beStart, beD - 1) : new Date(beStart);

      // BE → FE dependency: sequential (FS) or overlap at X% of BE
      let feStart;
      if (overlapBeFe > 0 && beD > 0 && feD > 0) {
        feStart = addWorkDays(beStart, Math.floor(beD * overlapBeFe / 100));
      } else if (beD > 0) {
        feStart = addWorkDays(beEnd, 1);   // FS: FE starts after BE done
      } else {
        feStart = new Date(p2Start);
      }
      const feEnd  = feD > 0 ? addWorkDays(feStart, feD - 1) : new Date(feStart);
      const devEnd = new Date(Math.max(
        beD > 0 ? beEnd.getTime() : 0,
        feD > 0 ? feEnd.getTime() : 0,
        p2Start.getTime()
      ));
      const p2End    = new Date(devEnd);   // p2End = end of development

      tasks.push({ title: 'Phase 2: Development', level: 2, is_summary: true, start: fmtDate(p2Start), end: fmtDate(p2End) });
      if (beD > 0) tasks.push({ title: 'Backend Development (BE)', level: 3, start: fmtDate(beStart), end: fmtDate(beEnd), role: 'BE', resources: beR, duration_days: beD, predecessor: 'UI/UX Design' });
      if (feD > 0) tasks.push({ title: 'Frontend Development (FE)', level: 3, start: fmtDate(feStart), end: fmtDate(feEnd), role: 'FE', resources: feR, duration_days: feD, predecessor: 'Backend Development (BE)' });
      // Development Complete depends on the last development task (FE if present, else BE)
      tasks.push({ title: 'Development Complete', level: 3, is_milestone: true, start: fmtDate(p2End), end: fmtDate(p2End), predecessor: feD > 0 ? 'Frontend Development (FE)' : 'Backend Development (BE)' });

      // ── Phase 3: Testing & QC ─────────────────────────────────────────
      // QC Preparation is anchored to UI/UX end (cross-phase) — runs during Development
      const qcPrepStart = addWorkDays(uxEnd, 1);
      const qcPrepEnd   = addWorkDays(qcPrepStart, qcPrep - 1);

      // QC Execution starts after BOTH Dev Complete AND QC Prep are done
      const qcExecReady = new Date(Math.max(p2End.getTime(), qcPrepEnd.getTime()));
      const cyc1Start   = addWorkDays(qcExecReady, 1);
      const cyc1End     = addWorkDays(cyc1Start, 4 - 1);   // 4 days fixed

      const df1Start = addWorkDays(cyc1End, 1);
      const df1End   = addWorkDays(df1Start, df1D - 1);

      const cyc2Start = addWorkDays(df1End, 1);
      const cyc2End   = addWorkDays(cyc2Start, 2 - 1);     // 2 days fixed

      const df2Start = addWorkDays(cyc2End, 1);
      const df2End   = addWorkDays(df2Start, df2D - 1);

      const regStart = addWorkDays(df2End, 1);
      const regEnd   = addWorkDays(regStart, regD - 1);

      const p3Start = new Date(Math.min(qcPrepStart.getTime(), p2Start.getTime()));
      const p3End   = new Date(regEnd);

      tasks.push({ title: 'Phase 3: Testing & QC', level: 2, is_summary: true, start: fmtDate(p3Start), end: fmtDate(p3End) });
      tasks.push({ title: 'QC Preparation', level: 3, start: fmtDate(qcPrepStart), end: fmtDate(qcPrepEnd), role: 'QC', resources: 1, duration_days: qcPrep, predecessor: 'UI/UX Design' });
      // QC Execution: single predecessor = Development Complete (the later gate); QC Prep runs in parallel
      tasks.push({ title: 'QC Execution Cycle 1', level: 3, start: fmtDate(cyc1Start), end: fmtDate(cyc1End), role: 'QC', resources: qcR, duration_days: 4, predecessor: 'Development Complete' });
      tasks.push({ title: 'Defect Fixing (Cycle 1)', level: 3, start: fmtDate(df1Start), end: fmtDate(df1End), role: 'BE', resources: beR, duration_days: df1D, predecessor: 'QC Execution Cycle 1' });
      tasks.push({ title: 'QC Execution Cycle 2', level: 3, start: fmtDate(cyc2Start), end: fmtDate(cyc2End), role: 'QC', resources: qcR, duration_days: 2, predecessor: 'Defect Fixing (Cycle 1)' });
      tasks.push({ title: 'Defect Fixing (Cycle 2)', level: 3, start: fmtDate(df2Start), end: fmtDate(df2End), role: 'BE', resources: beR, duration_days: df2D, predecessor: 'QC Execution Cycle 2' });
      tasks.push({ title: 'Regression + Retest', level: 3, start: fmtDate(regStart), end: fmtDate(regEnd), role: 'QC', resources: qcR, duration_days: regD, predecessor: 'Defect Fixing (Cycle 2)' });

      // ── Phase 4: Deployment & Go-Live ─────────────────────────────────
      const p4Start = addWorkDays(p3End, 1);
      const prStart = new Date(p4Start);
      const prEnd   = addWorkDays(prStart, 1);
      const glDate  = addWorkDays(prEnd, 1);
      const p4End   = new Date(glDate);

      tasks.push({ title: 'Phase 4: Deployment & Go-Live', level: 2, is_summary: true, start: fmtDate(p4Start), end: fmtDate(p4End) });
      tasks.push({ title: 'Production Release Preparation', level: 3, start: fmtDate(prStart), end: fmtDate(prEnd), duration_days: 2, predecessor: 'Regression + Retest' });
      tasks.push({ title: 'Go-Live', level: 3, is_milestone: true, start: fmtDate(p4End), end: fmtDate(p4End), predecessor: 'Production Release Preparation' });

      return tasks;
    }

    // Build an Implementation-team plan by inflating all discipline durations by implMargin%
    function generateImplPlan(startDateStr, disciplines, overlapBaUiux, overlapBeFe, implMargin = 20) {
      const factor = 1 + (implMargin / 100);
      const inflate = v => Math.ceil((v || 0) * factor);
      const implDisc = {
        BA:   { days: inflate(disciplines.BA?.days),   resources: disciplines.BA?.resources   || 1 },
        UIUX: { days: inflate(disciplines.UIUX?.days), resources: disciplines.UIUX?.resources || 1 },
        BE:   { days: inflate(disciplines.BE?.days),   resources: disciplines.BE?.resources   || 1 },
        FE:   { days: inflate(disciplines.FE?.days),   resources: disciplines.FE?.resources   || 1 },
        QC:   {
          prepDays:  inflate(disciplines.QC?.prepDays),
          df1Days:   inflate(disciplines.QC?.df1Days),
          df2Days:   inflate(disciplines.QC?.df2Days),
          regDays:   inflate(disciplines.QC?.regDays),
          resources: disciplines.QC?.resources || 1,
        },
      };
      return generateCubesPlan(startDateStr, implDisc, overlapBaUiux, overlapBeFe);
    }

    // ── PROJECT CREATION WIZARD ──────────────────────────────────────
    function CreateProjectWizard({ user, onClose, onCreated }) {
      const [step, setStep] = useState(1);
      const [name, setName] = useState('');
      const [client, setClient] = useState('');
      const [stakeholder, setStakeholder] = useState('');
      const [startDate, setStartDate] = useState(() => {
        const d = new Date(); return d.toISOString().split('T')[0];
      });
      const [priority, setPriority] = useState('P3');
      const [hoursPerDay, setHoursPerDay] = useState(8);
      // 0 = sequential (FS), 1-90 = % of predecessor done when successor starts
      const [overlapBaUiux, setOverlapBaUiux] = useState(0);
      const [overlapBeFe, setOverlapBeFe]     = useState(0);
      const [disciplines, setDiscs] = useState({
        BA:   { days: 10, resources: 1 },
        UIUX: { days: 7,  resources: 1 },
        BE:   { days: 14, resources: 1 },
        FE:   { days: 10, resources: 1 },
        QC:   { prepDays: 3, df1Days: 3, df2Days: 2, regDays: 2, resources: 1 },
      });
      // Implementation buffer margin (default 20%)
      const [implMargin, setImplMargin] = useState(20);
      // Track which disciplines are already completed (will create tasks at 100%)
      const [completedPhases, setCompletedPhases] = useState(new Set());
      function toggleCompleted(role) {
        setCompletedPhases(prev => {
          const next = new Set(prev);
          next.has(role) ? next.delete(role) : next.add(role);
          return next;
        });
      }
      const [saving, setSaving] = useState(false);
      const [saveMsg, setSaveMsg] = useState('');
      // Custom task rows added by admin in the Review Plan step
      const [customTasks, setCustomTasks] = useState([]);
      const customTaskId = () => 'ct_' + Math.random().toString(36).slice(2, 8);
      function addCustomRow() {
        setCustomTasks(rows => [...rows, { id: customTaskId(), title: 'New Task', level: 3, duration_days: 1, is_summary: false, is_milestone: false, predecessor: '' }]);
      }
      function removeCustomRow(id) { setCustomTasks(rows => rows.filter(r => r.id !== id)); }
      function updateCustomRow(id, field, value) { setCustomTasks(rows => rows.map(r => r.id === id ? { ...r, [field]: value } : r)); }
      function indentCustomRow(id) { setCustomTasks(rows => rows.map(r => r.id === id && r.level < 4 ? { ...r, level: r.level + 1 } : r)); }
      function outdentCustomRow(id) { setCustomTasks(rows => rows.map(r => r.id === id && r.level > 2 ? { ...r, level: r.level - 1 } : r)); }
      function moveCustomRow(id, dir) {
        setCustomTasks(rows => {
          const i = rows.findIndex(r => r.id === id);
          if (i < 0) return rows;
          const j = i + dir;
          if (j < 0 || j >= rows.length) return rows;
          const next = [...rows];
          [next[i], next[j]] = [next[j], next[i]];
          return next;
        });
      }

      const generatedTasks = React.useMemo(() => {
        if (!startDate) return [];
        return generateCubesPlan(startDate, disciplines, overlapBaUiux, overlapBeFe);
      }, [startDate, disciplines, overlapBaUiux, overlapBeFe]);

      const generatedTasksImpl = React.useMemo(() => {
        if (!startDate) return [];
        return generateImplPlan(startDate, disciplines, overlapBaUiux, overlapBeFe, implMargin);
      }, [startDate, disciplines, overlapBaUiux, overlapBeFe, implMargin]);

      function setDays(role, v) {
        setDiscs(d => ({ ...d, [role]: { ...d[role], days: Math.max(1, Number(v) || 1) } }));
      }
      function setQcField(field, v) {
        setDiscs(d => ({ ...d, QC: { ...d.QC, [field]: Math.max(1, Number(v) || 1) } }));
      }
      function setRes(role, delta) {
        setDiscs(d => ({ ...d, [role]: { ...d[role], resources: Math.max(1, (d[role].resources || 1) + delta) } }));
      }

      const projEnd = generatedTasks.length ? generatedTasks[generatedTasks.length - 1].end : startDate;
      const implEnd = generatedTasksImpl.length ? generatedTasksImpl[generatedTasksImpl.length - 1].end : startDate;

      function countWorkDays(from, to) {
        if (!from || !to) return 0;
        let d = new Date(from), cnt = 0, end = new Date(to);
        while (d <= end) { if (isWorkingDay(d)) cnt++; d.setDate(d.getDate() + 1); }
        return cnt;
      }
      const totalDays = countWorkDays(startDate, projEnd);
      const totalDaysImpl = countWorkDays(startDate, implEnd);

      function buildPayload(tasks, nameStr, teamType) {
        const allocations = {};
        Object.entries(disciplines).forEach(([role, v]) => { allocations[role] = v.resources || 1; });
        // Merge generated tasks + any custom rows added by admin
        const allTasks = [
          ...tasks.map(t => ({
            title: t.title, outline_level: t.level || 3,
            is_summary: !!t.is_summary, is_milestone: !!t.is_milestone,
            start_date: t.start ? t.start + 'T08:00' : startDate + 'T08:00',
            end_date:   t.end   ? t.end   + 'T17:00' : startDate + 'T17:00',
            pct: (t.role && completedPhases.has(t.role)) ? 100 : 0,
            role: t.role || null,
            resources: t.resources || 1, duration_days: t.duration_days || 0,
            predecessor: t.predecessor || null,
          })),
          ...customTasks.map(ct => ({
            title: ct.title || 'New Task', outline_level: ct.level || 3,
            is_summary: !!ct.is_summary, is_milestone: !!ct.is_milestone,
            start_date: startDate + 'T08:00', end_date: startDate + 'T17:00',
            pct: 0, role: null, resources: 1,
            duration_days: ct.duration_days || 1,
            predecessor: ct.predecessor || null,
          })),
        ];
        return {
          name: nameStr, start_date: startDate,
          priority, team_type: teamType, hours_per_day: hoursPerDay,
          client: client.trim() || null,
          stakeholder: stakeholder.trim() || null,
          tasks: allTasks,
          allocations,
          caller_id: user.id,
        };
      }

      async function handleCreate() {
        if (!name.trim()) return;
        setSaving(true);
        setSaveMsg('Creating CUBES project…');
        try {
          const baseName = name.trim();
          // Create CUBES project with [Cubes] suffix
          await api.createWizardProject(buildPayload(generatedTasks, baseName + ' [Cubes]', 'cubes'));
          setSaveMsg('Creating Implementation project (20% buffer)…');
          // Auto-create Implementation clone with 20% inflated durations
          await api.createWizardProject(buildPayload(generatedTasksImpl, baseName + ' [Imp]', 'implementation'));
          onCreated();
          onClose();
        } catch (e) { alert('Error: ' + e.message); }
        setSaving(false);
        setSaveMsg('');
      }

      const STEPS = ['Project Basics', 'Effort & Team', 'Review Plan'];

      return (
        <div className="wiz-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="wiz-modal">
            {/* header */}
            <div className="wiz-header">
              <div className="wiz-title">🚀 New CUBES Implementation Project</div>
              <button className="wiz-close" onClick={onClose}>×</button>
            </div>

            {/* step indicator */}
            <div className="wiz-steps">
              {STEPS.map((label, i) => {
                const n = i + 1;
                const isDone = step > n;
                const isActive = step === n;
                return (
                  <React.Fragment key={n}>
                    <div className="wiz-step-item">
                      <div className={`wiz-step-circle ${isDone ? 'done' : isActive ? 'active' : ''}`}>
                        {isDone ? '✓' : n}
                      </div>
                      <span className={`wiz-step-label ${isActive ? 'active' : ''}`}>{label}</span>
                    </div>
                    {i < STEPS.length - 1 && <div className={`wiz-step-line ${isDone ? 'done' : ''}`} />}
                  </React.Fragment>
                );
              })}
            </div>

            {/* body */}
            <div className="wiz-body">

              {/* ── Step 1 ── */}
              {step === 1 && (
                <div>
                  <div className="wiz-row">
                    <div className="wiz-field" style={{ flex: 2 }}>
                      <label>Project Name</label>
                      <input className="wiz-input" placeholder="e.g. EFCR-NewClient" value={name} onChange={e => setName(e.target.value)} />
                    </div>
                    <div className="wiz-field">
                      <label>Client Name</label>
                      <input className="wiz-input" placeholder="e.g. TSME Solutions" value={client} onChange={e => setClient(e.target.value)} />
                    </div>
                    <div className="wiz-field">
                      <label>Requested By (Stakeholder)</label>
                      <input className="wiz-input" placeholder="e.g. Ahmad Al-Masri" value={stakeholder} onChange={e => setStakeholder(e.target.value)} />
                    </div>
                    <div className="wiz-field">
                      <label>Start Date (Jordan)</label>
                      <input type="date" className="wiz-input" value={startDate} onChange={e => setStartDate(e.target.value)} />
                    </div>
                  </div>

                  <div className="wiz-row">
                    <div className="wiz-field">
                      <label>Priority</label>
                      <div className="prio-pills">
                        {['P1','P2','P3','P4'].map(p => (
                          <button key={p} className={`prio-pill ${priority === p ? p.toLowerCase() : ''}`}
                            onClick={() => setPriority(p)}>{p}</button>
                        ))}
                      </div>
                    </div>
                    <div className="wiz-field">
                      <label>Working Hours / Day</label>
                      <div className="hrs-toggle">
                        {[8, 6.5].map(h => (
                          <button key={h} className={`hrs-btn ${hoursPerDay === h ? 'active' : ''}`}
                            onClick={() => setHoursPerDay(h)}>{h}h</button>
                        ))}
                      </div>
                    </div>
                    <div className="wiz-field">
                      <label title="Buffer added to all task durations for the Implementation project">Impl. Buffer Margin</label>
                      <div className="hrs-toggle">
                        {[10, 15, 20, 25, 30].map(m => (
                          <button key={m} className={`hrs-btn ${implMargin === m ? 'active' : ''}`}
                            onClick={() => setImplMargin(m)}>{m}%</button>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div style={{ marginTop: 16, background: 'rgba(129,140,248,.06)', border: '1px solid rgba(129,140,248,.2)', borderRadius: 10, padding: '12px 16px' }}>
                    <div style={{ fontSize: 12, color: 'var(--brand2)', fontWeight: 700, marginBottom: 4 }}>📅 Jordan Working Calendar</div>
                    <div style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.6 }}>
                      Working days: <strong style={{ color: 'var(--text)' }}>Sunday – Thursday</strong> · Weekend: Friday & Saturday<br />
                      Public holidays are automatically excluded from duration calculations.
                    </div>
                  </div>
                </div>
              )}

              {/* ── Step 2: Effort & Team ── */}
              {step === 2 && (

    // ── RESOURCE HUB MODAL ───────────────────────────────────────────
    function ResourceHub({ user, onClose }) {
      const [tab, setTab] = useState(user?.role === 'admin' ? 'overview' : 'allocation');
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => { reload(); }, []);

      async function reload() {
        setLoading(true);
        try { setData(await api.getResourceHub()); }
        catch (e) { console.error(e); }
        setLoading(false);
      }

      const ROLES = ['BA', 'UIUX', 'BE', 'FE', 'QC', 'PM'];
      const ROLE_LABELS = { BA: 'BA', UIUX: 'UI/UX', BE: 'BE', FE: 'FE', QC: 'QC', PM: 'PM' };

      async function handlePoolEdit(role, newVal) {
        const n = parseInt(newVal);
        if (isNaN(n) || n < 0) return;
        try { await api.updateResourcePool(user.id, role, n, 8.0); reload(); }
        catch (e) { console.error(e); }
      }

      async function handleAllocEdit(code, role, newVal) {
        const n = parseInt(newVal);
        if (isNaN(n) || n < 0) return;
        try { await api.updateAllocation(user.id, code, role, n); reload(); }
        catch (e) { console.error(e); }
      }

      const pool     = data ? Object.fromEntries(data.pool.map(r => [r.role, r])) : {};
      const util     = data?.utilization  || {};
      const utilC    = data?.util_cubes   || {};
      const utilI    = data?.util_impl    || {};
      const cubesProj = data ? data.projects.filter(p => p.team_type === 'cubes') : [];
      const implProj  = data ? data.projects.filter(p => p.team_type === 'implementation') : [];

      // Generate smart recommendations from allocation data
      function buildRecommendations() {
        if (!data) return [];
        const recs = [];
        ROLES.forEach(r => {
          const total = pool[r]?.total_count || 0;
          const used  = util[r] || 0;
          const avail = total - used;
          const usedC = utilC[r] || 0;
          const usedI = utilI[r] || 0;
          if (total === 0) return;
          if (used > total) {
            recs.push({ type: 'error', msg: `${ROLE_LABELS[r]} is over-allocated (${used} assigned / ${total} available). Reduce assignments or increase pool.` });
          } else if (used === total) {
            recs.push({ type: 'warn', msg: `${ROLE_LABELS[r]} is at full capacity (${total}/${total}). Any new project needing this role will be blocked.` });
          } else if (avail >= 1 && total > 1) {
            recs.push({ type: 'ok', msg: `${ROLE_LABELS[r]} has ${avail} resource${avail > 1 ? 's' : ''} available for new assignments.` });
          }
          // Cross-team imbalance
          if (usedC > 0 && usedI > 0 && usedC !== usedI) {
            const heavier = usedC > usedI ? 'CUBES' : 'Implementation';
            recs.push({ type: 'info', msg: `${ROLE_LABELS[r]}: ${heavier} projects are consuming more (CUBES: ${usedC}, Impl: ${usedI}).` });
          }
        });
        // P1 project pressure
        const p1 = data.projects.filter(p => p.priority === 'P1');
        if (p1.length > 1) {
          recs.push({ type: 'info', msg: `${p1.length} P1 projects are active simultaneously — resource contention risk is high.` });
        }
        return recs.slice(0, 8); // cap at 8 recommendations
      }

      function PriorityBadge({ p }) {
        const bg    = p === 'P1' ? 'rgba(239,68,68,.12)' : p === 'P2' ? 'rgba(249,115,22,.12)' : 'rgba(129,140,248,.1)';
        const color = p === 'P1' ? '#ef4444' : p === 'P2' ? '#f97316' : 'var(--brand)';
        return <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 10, background: bg, color }}>{p || 'P3'}</span>;
      }

      function TeamUtilRow({ label, utilMap, color }) {
        return (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color, textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 8 }}>{label}</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {ROLES.filter(r => pool[r]).map(r => {
                const used  = utilMap[r] || 0;
                const total = pool[r]?.total_count || 1;
                const pct   = Math.min((used / total) * 100, 100);
                const over  = used > total;
                const warn  = used === total;
                return (
                  <div key={r} style={{ background: 'var(--s2)', border: `2px solid ${over ? '#ef4444' : warn ? '#f97316' : 'var(--border)'}`, borderRadius: 10, padding: '8px 12px', minWidth: 84, flex: '1 0 80px' }}>
                    <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 800, textTransform: 'uppercase', marginBottom: 4 }}>{ROLE_LABELS[r]}</div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: over ? '#ef4444' : warn ? '#f97316' : color, lineHeight: 1 }}>
                      {used}<span style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 400 }}>/{total}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 6 }}>
                      <div className="util-bar-wrap" style={{ flex: 1, margin: 0, height: 4 }}>
                        <div className={`util-bar ${over ? 'over' : warn ? 'warn' : ''}`} style={{ width: `${pct}%`, height: 4 }} />
                      </div>
                      <span className={`avail-chip ${over ? 'over' : warn ? 'warn' : 'ok'}`} style={{ fontSize: 10 }}>
                        {over ? '⚠' : '✓'}{Math.abs(total - used)}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      const [namedAllocProject, setNamedAllocProject] = useState(null); // project object for named alloc modal

      function AllocTable({ projects, subtotals, title, color }) {
        return (
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color, textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 8 }}>{title}</div>
            {projects.length === 0
              ? <div style={{ fontSize: 12, color: 'var(--muted)', padding: '10px 0' }}>No projects in this group.</div>
              : (
                <div style={{ overflowX: 'auto' }}>
                  <table className="alloc-table">
                    <thead>
                      <tr>
                        <th style={{ minWidth: 150 }}>Project</th>
                        <th>Priority</th>
                        {ROLES.map(r => <th key={r}>{ROLE_LABELS[r]}</th>)}
                        <th style={{ minWidth: 140 }}>Timeline</th>
                        {user.role === 'admin' && <th style={{ minWidth: 100 }}>Named</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {projects.map(p => (
                        <tr key={p.code}>
                          <td style={{ fontWeight: 600, fontSize: 12 }}>{p.name}</td>
                          <td><PriorityBadge p={p.priority} /></td>
                          {ROLES.map(r => {
                            const cnt = p.allocations[r] || 0;
                            return (
                              <td key={r} style={{ textAlign: 'center', padding: '4px 6px' }}>
                                {user.role === 'admin' ? (
                                  <input
                                    type="number" min="0" step="1"
                                    defaultValue={cnt}
                                    style={{ width: 48, textAlign: 'center', fontSize: 12, padding: '2px 4px', borderRadius: 4, border: '1px solid var(--border)', background: 'var(--s2)', color: 'var(--text)' }}
                                    onBlur={e => handleAllocEdit(p.code, r, e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                                  />
                                ) : (
                                  <span className="alloc-cell-num">{cnt || '—'}</span>
                                )}
                              </td>
                            );
                          })}
                          <td style={{ fontSize: 11, color: 'var(--muted)', whiteSpace: 'nowrap' }}>
                            {p.start_date?.slice(0,10)} → {p.end_date?.slice(0,10)}
                          </td>
                          {user.role === 'admin' && (
                            <td style={{ textAlign: 'center' }}>
                              <button
                                style={{ fontSize: 10, padding: '3px 7px', borderRadius: 4, border: '1px solid var(--brand)', background: 'rgba(99,102,241,.1)', color: 'var(--brand)', cursor: 'pointer', fontWeight: 700, whiteSpace: 'nowrap' }}
                                onClick={() => setNamedAllocProject(p)}>
                                👤 {(p.named_allocations || []).length > 0 ? `${p.named_allocations.length} assigned` : 'Assign'}
                              </button>
                            </td>
                          )}
                        </tr>
                      ))}
                      <tr className="total-row">
                        <td>Sub-total</td><td>—</td>
                        {ROLES.map(r => <td key={r} style={{ textAlign: 'center' }}><strong>{subtotals[r] || 0}</strong></td>)}
                        <td>—</td>
                        {user.role === 'admin' && <td>—</td>}
                      </tr>
                    </tbody>
                  </table>
                </div>
              )
            }
          </div>
        );
      }

      // Named allocation modal
      function NamedAllocModal({ project, allResources, onClose, onSaved }) {
        const [allocs, setAllocs] = useState(project.named_allocations || []);
        const [selectedRes, setSelectedRes] = useState('');
        const [pct, setPct] = useState(100);
        const [saving, setSaving] = useState(false);

        const availableResources = allResources.filter(r => r.active && !allocs.find(a => a.resource_id === r.id));
        const ROLE_COLORS = { BA: '#6366f1', UIUX: '#8b5cf6', BE: '#0ea5e9', FE: '#22c55e', QC: '#f97316', PM: '#ef4444' };

        async function addAlloc() {
          if (!selectedRes) return;
          setSaving(true);
          try {
            await api.upsertNamedAllocation(user.id, project.code, selectedRes, pct);
            onSaved();
            onClose();
          } catch (e) { alert(e.message); }
          setSaving(false);
        }

        async function removeAlloc(resourceId) {
          try {
            await api.removeNamedAllocation(user.id, project.code, resourceId);
            setAllocs(a => a.filter(x => x.resource_id !== resourceId));
            onSaved();
          } catch (e) { alert(e.message); }
        }

        async function updatePct(resourceId, newPct) {
          const n = parseInt(newPct);
          if (isNaN(n) || n < 1 || n > 100) return;
          try {
            await api.upsertNamedAllocation(user.id, project.code, resourceId, n);
            onSaved();
          } catch (e) { alert(e.message); }
        }

        return (
          <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}
            onClick={e => e.target === e.currentTarget && onClose()}>
            <div style={{ background: 'var(--s1)', border: '1px solid var(--border)', borderRadius: 12, padding: 24, minWidth: 420, maxWidth: 540, maxHeight: '80vh', overflowY: 'auto' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>👤 Named Resources — {project.name}</div>
                <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 16, color: 'var(--muted)', cursor: 'pointer' }}>✕</button>
              </div>

              {/* Current assignments */}
              {allocs.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--muted)', textTransform: 'uppercase', marginBottom: 8 }}>Assigned Resources</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {allocs.map(a => (
                      <div key={a.resource_id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', background: 'var(--s2)', borderRadius: 8, border: '1px solid var(--border)' }}>
                        <div style={{ width: 8, height: 8, borderRadius: '50%', background: ROLE_COLORS[a.role] || 'var(--brand)', flexShrink: 0 }} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 12, fontWeight: 600 }}>{a.name}</div>
                          <div style={{ fontSize: 10, color: 'var(--muted)' }}>{a.role}{a.title ? ` · ${a.title}` : ''}</div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                          <input type="number" min="1" max="100" defaultValue={a.allocation_pct}
                            style={{ width: 52, textAlign: 'center', fontSize: 12, padding: '2px 4px', borderRadius: 4, border: '1px solid var(--border)', background: 'var(--s1)', color: 'var(--text)' }}
                            onBlur={e => updatePct(a.resource_id, e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }} />
                          <span style={{ fontSize: 10, color: 'var(--muted)' }}>%</span>
                          {a.allocation_pct < 100 && (
                            <span style={{ fontSize: 9, padding: '1px 5px', borderRadius: 4, background: 'rgba(249,115,22,.12)', color: '#f97316', fontWeight: 700 }}>Shared</span>
                          )}
                        </div>
                        <button onClick={() => removeAlloc(a.resource_id)}
                          style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, border: '1px solid rgba(239,68,68,.3)', background: 'rgba(239,68,68,.08)', color: '#ef4444', cursor: 'pointer' }}>
                          Remove
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Add new assignment */}
              {availableResources.length > 0 && (
                <div style={{ background: 'var(--s2)', borderRadius: 8, padding: 12, border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--muted)', textTransform: 'uppercase', marginBottom: 8 }}>Add Resource</div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                    <select value={selectedRes} onChange={e => setSelectedRes(e.target.value)}
                      style={{ flex: 2, minWidth: 160, fontSize: 12, padding: '6px 8px', borderRadius: 4, border: '1px solid var(--border)', background: 'var(--s1)', color: 'var(--text)' }}>
                      <option value="">— Select resource —</option>
                      {['BA','UIUX','BE','FE','QC','PM'].map(role => {
                        const group = availableResources.filter(r => r.role === role);
                        if (!group.length) return null;
                        return (
                          <optgroup key={role} label={role}>
                            {group.map(r => <option key={r.id} value={r.id}>{r.name}{r.title ? ` (${r.title})` : ''}</option>)}
                          </optgroup>
                        );
                      })}
                    </select>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <input type="number" min="1" max="100" value={pct} onChange={e => setPct(Number(e.target.value))}
                        style={{ width: 56, textAlign: 'center', fontSize: 12, padding: '6px 4px', borderRadius: 4, border: '1px solid var(--border)', background: 'var(--s1)', color: 'var(--text)' }} />
                      <span style={{ fontSize: 11, color: 'var(--muted)' }}>%</span>
                    </div>
                    <button onClick={addAlloc} disabled={!selectedRes || saving}
                      style={{ padding: '6px 14px', borderRadius: 6, border: 'none', background: 'var(--brand)', color: '#fff', cursor: 'pointer', fontSize: 12, fontWeight: 700, opacity: !selectedRes ? .5 : 1 }}>
                      {saving ? '…' : 'Assign'}
                    </button>
                  </div>
                </div>
              )}
              {availableResources.length === 0 && allocs.length === 0 && (
                <div style={{ fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: '20px 0' }}>No resources available. Add resources in the Resources tab first.</div>
              )}
            </div>
          </div>
        );
      }

      const recommendations = buildRecommendations();
      const isAdmin = user?.role === 'admin';

      // Build C-Level narrative from allocation data
      function buildNarrative() {
        if (!data) return null;
        const overRoles  = ROLES.filter(r => pool[r] && util[r] > (pool[r]?.total_count || 0));
        const fullRoles  = ROLES.filter(r => pool[r] && util[r] === (pool[r]?.total_count || 0));
        const freeRoles  = ROLES.filter(r => pool[r] && util[r] < (pool[r]?.total_count || 0));
        const parts = [];
        if (overRoles.length)  parts.push({ type: 'error', text: `🔴 ${overRoles.map(r => ROLE_LABELS[r]).join(', ')} ${overRoles.length === 1 ? 'is' : 'are'} over-allocated — immediate action required.` });
        if (fullRoles.length)  parts.push({ type: 'warn',  text: `🟡 ${fullRoles.map(r => ROLE_LABELS[r]).join(', ')} at full capacity — no room for new projects.` });
        if (freeRoles.length)  parts.push({ type: 'ok',    text: `🟢 ${freeRoles.map(r => ROLE_LABELS[r]).join(', ')} ${freeRoles.length === 1 ? 'has' : 'have'} capacity available for new work.` });
        const p1 = data.projects.filter(p => p.priority === 'P1');
        if (p1.length > 1) parts.push({ type: 'info', text: `🔵 ${p1.length} P1 projects running simultaneously — high contention risk across all roles.` });
        return parts;
      }

      const narrative = buildNarrative();

      const ROLE_FULL_NAMES = { BA: 'Business Analysis', UIUX: 'UI/UX Design', BE: 'Backend Dev', FE: 'Frontend Dev', QC: 'Quality Control', PM: 'Proj. Management' };
      const ROLE_COLORS_BG  = { BA: 'rgba(99,102,241,.08)', UIUX: 'rgba(139,92,246,.08)', BE: 'rgba(14,165,233,.08)', FE: 'rgba(34,197,94,.08)', QC: 'rgba(249,115,22,.08)', PM: 'rgba(239,68,68,.08)' };
      const ROLE_COLORS_ACC = { BA: '#6366f1', UIUX: '#8b5cf6', BE: '#0ea5e9', FE: '#22c55e', QC: '#f97316', PM: '#ef4444' };

      return (
        <div className="res-hub-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="res-hub-panel">
            {/* Header */}
            <div className="res-hub-hdr">
              <span style={{ fontSize: 22 }}>📊</span>
              <h3>Resource Hub
                {data && <span style={{ fontSize: 11, fontWeight: 400, color: 'var(--muted)', marginLeft: 10 }}>
                  {cubesProj.length} CUBES · {implProj.length} Impl projects
                </span>}
              </h3>
              <button className="res-hub-hdr-close" onClick={onClose} title="Close">✕</button>
            </div>

            <div className="res-hub-body">
              {/* Tabs — Overview is admin-only */}
              <div className="rh-tabs">
                {isAdmin && (
                  <button className={`rh-tab ${tab === 'overview' ? 'active' : ''}`} onClick={() => setTab('overview')}>
                    📊 Overview
                    {data && ROLES.some(r => pool[r] && util[r] > (pool[r]?.total_count || 0)) && (
                      <span style={{ marginLeft: 5, background: '#ef4444', color: '#fff', fontSize: 9, fontWeight: 800, padding: '1px 5px', borderRadius: 8 }}>!</span>
                    )}
                  </button>
                )}
                {[['allocation', '📋 Allocation'], ['pool', '👥 Pool'], ['resources', '👤 Resources']].map(([id, label]) => (
                  <button key={id} className={`rh-tab ${tab === id ? 'active' : ''}`} onClick={() => setTab(id)}>{label}</button>
                ))}
              </div>

              {loading && (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 200, color: 'var(--muted)', fontSize: 13 }}>
                  Loading resource data…
                </div>
              )}

              {/* ── OVERVIEW TAB (admin only) ── */}
              {!loading && tab === 'overview' && isAdmin && data && (
                <div>
                  {/* C-Level Narrative Banner */}
                  {narrative && narrative.length > 0 && (
                    <div style={{ marginBottom: 20, borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
                      <div style={{ background: 'var(--s2)', padding: '8px 14px', fontSize: 10, fontWeight: 800, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.07em', borderBottom: '1px solid var(--border)' }}>
                        📋 Resource Status — Executive Summary
                      </div>
                      <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                        {narrative.map((n, i) => {
                          const bg = n.type === 'error' ? 'rgba(239,68,68,.06)' : n.type === 'warn' ? 'rgba(249,115,22,.06)' : n.type === 'ok' ? 'rgba(34,197,94,.06)' : 'rgba(99,102,241,.06)';
                          const border = n.type === 'error' ? '#ef4444' : n.type === 'warn' ? '#f97316' : n.type === 'ok' ? '#22c55e' : '#6366f1';
                          return (
                            <div key={i} style={{ padding: '8px 12px', borderRadius: 7, background: bg, borderLeft: `3px solid ${border}`, fontSize: 12.5, fontWeight: 500, color: 'var(--text)', lineHeight: 1.5 }}>
                              {n.text}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Role Utilization Cards — C-Level redesign */}
                  <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 10 }}>
                    Resource Utilization by Discipline
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 12, marginBottom: 22 }}>
                    {ROLES.filter(r => pool[r]).map(r => {
                      const total = pool[r]?.total_count || 1;
                      const used  = util[r] || 0;
                      const usedC = utilC[r] || 0;
                      const usedI = utilI[r] || 0;
                      const avail = total - used;
                      const pctNum = total > 0 ? Math.round((used / total) * 100) : 0;
                      const isOver = used > total;
                      const isFull = used === total;
                      const accent = ROLE_COLORS_ACC[r] || 'var(--brand)';
                      const statusColor = isOver ? '#ef4444' : isFull ? '#f97316' : accent;
                      const statusBg    = isOver ? 'rgba(239,68,68,.08)' : isFull ? 'rgba(249,115,22,.06)' : ROLE_COLORS_BG[r];
                      const statusIcon  = isOver ? '🔴' : isFull ? '🟡' : '🟢';
                      const statusLabel = isOver ? `Short ${Math.abs(avail)} ${Math.abs(avail) === 1 ? 'person' : 'people'}` : isFull ? 'At full capacity' : `${avail} available`;
                      const barWidth = Math.min(pctNum, 100);
                      const barOverPct = isOver ? Math.min(((used - total) / total) * 100, 40) : 0;
                      return (
                        <div key={r} style={{ background: statusBg, border: `1.5px solid ${isOver ? 'rgba(239,68,68,.3)' : isFull ? 'rgba(249,115,22,.25)' : 'var(--border)'}`, borderRadius: 12, padding: '14px 16px', position: 'relative', overflow: 'hidden' }}>
                          {/* Top accent bar */}
                          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: statusColor, borderRadius: '12px 12px 0 0', opacity: .7 }} />
                          {/* Role name */}
                          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 800, color: accent, textTransform: 'uppercase', letterSpacing: '.05em' }}>{ROLE_LABELS[r]}</div>
                              <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 1 }}>{ROLE_FULL_NAMES[r] || r}</div>
                            </div>
                            <span style={{ fontSize: 16 }}>{statusIcon}</span>
                          </div>
                          {/* Big % */}
                          <div style={{ fontSize: 28, fontWeight: 900, color: statusColor, lineHeight: 1, marginBottom: 6 }}>
                            {pctNum}<span style={{ fontSize: 14, fontWeight: 500, color: 'var(--muted)' }}>%</span>
                          </div>
                          {/* Progress bar */}
                          <div style={{ height: 6, borderRadius: 3, background: 'var(--s2)', marginBottom: 10, position: 'relative', overflow: 'hidden' }}>
                            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${barWidth}%`, background: statusColor, borderRadius: 3, opacity: .85, transition: 'width .4s' }} />
                            {isOver && <div style={{ position: 'absolute', left: '100%', top: 0, bottom: 0, width: `${barOverPct}%`, background: '#ef4444', borderRadius: 3, opacity: .4, transform: 'translateX(-100%)' }} />}
                          </div>
                          {/* Stats row */}
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 4 }}>
                            <div style={{ textAlign: 'center' }}>
                              <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--text)' }}>{used}</div>
                              <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>Demand</div>
                            </div>
                            <div style={{ textAlign: 'center', borderLeft: '1px solid var(--border)', borderRight: '1px solid var(--border)' }}>
                              <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--text)' }}>{total}</div>
                              <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>Pool</div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                              <div style={{ fontSize: 15, fontWeight: 800, color: statusColor }}>{Math.abs(avail)}</div>
                              <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>{avail >= 0 ? 'Free' : 'Short'}</div>
                            </div>
                          </div>
                          {/* CUBES vs Impl split */}
                          {(usedC > 0 || usedI > 0) && (
                            <div style={{ marginTop: 10, paddingTop: 8, borderTop: '1px solid var(--border)', display: 'flex', gap: 10, fontSize: 10 }}>
                              <span style={{ color: accent, fontWeight: 700 }}>CUBES: {usedC}</span>
                              <span style={{ color: '#f97316', fontWeight: 700 }}>Impl: {usedI}</span>
                            </div>
                          )}
                          {/* Status label */}
                          <div style={{ marginTop: 8, fontSize: 10, fontWeight: 700, color: statusColor }}>
                            {statusIcon} {statusLabel}
                            {isOver && <span style={{ marginLeft: 6, fontSize: 9, background: 'rgba(239,68,68,.12)', color: '#ef4444', padding: '1px 6px', borderRadius: 4, fontWeight: 800 }}>HIRE NEEDED</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Pool capacity summary table */}
                  <div style={{ marginBottom: 22 }}>
                    <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 10 }}>
                      Capacity Summary — All Teams Combined
                    </div>
                    <div style={{ overflowX: 'auto', borderRadius: 10, border: '1px solid var(--border)' }}>
                      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                        <thead>
                          <tr style={{ background: 'var(--s2)' }}>
                            <th style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 700, fontSize: 11, color: 'var(--muted)', borderBottom: '1px solid var(--border)' }}>Metric</th>
                            {ROLES.filter(r => pool[r]).map(r => (
                              <th key={r} style={{ padding: '8px 10px', textAlign: 'center', fontWeight: 800, fontSize: 11, color: ROLE_COLORS_ACC[r], borderBottom: '1px solid var(--border)', borderLeft: '1px solid var(--border)' }}>{ROLE_LABELS[r]}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[
                            { label: 'Pool Capacity', key: r => pool[r]?.total_count ?? '—', bold: true, color: null },

    // ── AUDIT LOG ────────────────────────────────────────────────────
    function AuditLog({ user }) {
      const [open, setOpen] = useState(false);
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(false);
      const [clearing, setClearing] = useState(false);
      const isAdmin = user?.role === 'admin';

      async function load() {
        setLoading(true);
        try { const d = await api.audit(); setEntries(d.entries || []); }
        catch (e) { setEntries([]); }
        setLoading(false);
      }

      function toggle() {
        const next = !open;
        setOpen(next);
        if (next) load();
      }

      async function handleClear() {
        if (!window.confirm('⚠ Clear entire audit log? This cannot be undone.')) return;
        setClearing(true);
        try {
          await api.clearAudit(user.id);
          setEntries([]);
        } catch (e) { alert('Failed: ' + e.message); }
        setClearing(false);
      }

      return (
        <div className="audit-section">
          <div className="audit-hdr" onClick={toggle} style={{ cursor: 'pointer' }}>
            <h3>📋 Audit Log — Change History</h3>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              {isAdmin && open && (
                <button
                  onClick={e => { e.stopPropagation(); handleClear(); }}
                  disabled={clearing || entries.length === 0}
                  style={{ padding: '3px 10px', fontSize: 10, borderRadius: 5, border: '1px solid rgba(239,68,68,.4)', background: 'rgba(239,68,68,.08)', color: 'var(--r)', cursor: 'pointer', fontWeight: 700 }}>
                  {clearing ? '…' : '🗑 Clear Log'}

            </div>
          </div>
          {open && (
            <div style={{ overflowX: 'auto' }}>

                ? <div className="loading">Loading audit log…</div>

                  ? <div style={{ padding: 24, textAlign: 'center', color: 'var(--dim)' }}>No audit entries yet. Edit a task % to start tracking.</div>

                          <td>{e.new_value != null ? <span style={{ color: 'var(--g)' }}>{e.new_value}{e.field === 'pct' ? '%' : ''}</span> : '—'}</td>
                          <td style={{ color: 'var(--muted)' }}>{e.user}</td>
