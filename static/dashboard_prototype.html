                  </label>
                )}
              </div>
            )}
            {(user?.role === 'admin' || settings.show_sync_btn) && (
              <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                <button className="btn"
                  style={{ flex: 1, background: syncing ? '#555' : '#0e7a4e', color: '#fff', borderColor: syncing ? '#555' : '#0e7a4e', fontWeight: 700, opacity: syncing ? 0.7 : 1 }}
                  onClick={onSyncMpp}
                  disabled={syncing}>
                  {syncing ? 'Syncing...' : '&#x21BA; Sync from MS Project'}
                </button>
              </div>
            )}
          </div>
        </aside>
      );
    }

    // ── KPI ROW ──────────────────────────────────────────────────────
    function KpiRow({ projects }) {
      const n = projects.length;
      const avg = n ? Math.round(projects.reduce((s, p) => s + p.progress, 0) / n) : 0;
      const g = projects.filter(p => p.health === 'G').length;
      const a = projects.filter(p => p.health === 'A').length;
      const r = projects.filter(p => p.health === 'R').length;
      const dl = n ? Math.round(projects.reduce((s, p) => s + Math.max(0, days(TODAY.toISOString().split('T')[0], p.end)), 0) / n) : 0;
      return (
        <div className="kpi-row">
          <div className="kpi kb"><div className="kl">Portfolio</div><div className="kv" style={{ color: 'var(--brand)' }}>{avg}%</div><div className="ks">{n} project{n !== 1 ? 's' : ''}</div></div>
          <div className="kpi kg"><div className="kl">On Track</div><div className="kv" style={{ color: 'var(--g)' }}>{g}</div><div className="ks">RAG Green</div></div>
          <div className="kpi ka"><div className="kl">At Risk</div><div className="kv" style={{ color: 'var(--a)' }}>{a}</div><div className="ks">RAG Amber</div></div>
          <div className="kpi kr"><div className="kl">Delayed</div><div className="kv" style={{ color: 'var(--r)' }}>{r}</div><div className="ks">RAG Red</div></div>
          <div className="kpi kx"><div className="kl">Avg Days Left</div><div className="kv" style={{ fontSize: 22 }}>{dl}d</div><div className="ks">to deadline</div></div>
        </div>
      );
    }

    // ── EXECUTIVE SUMMARY ────────────────────────────────────────────
    function ExecutiveSummary({ projects, user }) {
      const [open, setOpen] = useState(true);
      const isAdmin = user?.role === 'admin';
      const isEditor = user?.role === 'editor';
      const canComment = isAdmin || isEditor;

      const [comments, setComments] = useState(() => {
        try { return JSON.parse(localStorage.getItem('execSummaryComments') || '{}'); } catch { return {}; }
      });
      const [editingComment, setEditingComment] = useState(null);
      const [commentDraft, setCommentDraft] = useState('');
      const [hiddenProjects, setHiddenProjects] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('execSummaryHidden') || '[]')); } catch { return new Set(); }
      });
      const [showFilter, setShowFilter] = useState(false);

      function saveComment(projectCode, text) {
        const updated = { ...comments, [projectCode]: text };
        setComments(updated);
        localStorage.setItem('execSummaryComments', JSON.stringify(updated));
        setEditingComment(null);
      }

      function toggleHide(code) {
        const next = new Set(hiddenProjects);
        next.has(code) ? next.delete(code) : next.add(code);
        setHiddenProjects(next);
        localStorage.setItem('execSummaryHidden', JSON.stringify([...next]));
      }

      if (!projects.length) return null;

      const healthOrder = { R: 0, A: 1, G: 2 };
      const healthColor = h => h === 'G' ? 'var(--g)' : h === 'A' ? 'var(--a)' : 'var(--r)';
      const healthLabel = h => h === 'G' ? '🟢 On Track' : h === 'A' ? '🟡 At Risk' : '🔴 Delayed';
      const cubesProjs = [...projects].filter(p => p.team_type !== 'implementation').sort((a, b) => (healthOrder[a.health] ?? 2) - (healthOrder[b.health] ?? 2));
      const implProjs  = [...projects].filter(p => p.team_type === 'implementation').sort((a, b) => (healthOrder[a.health] ?? 2) - (healthOrder[b.health] ?? 2));

      const hiddenCount = hiddenProjects.size;

      function ProjTable({ rows }) {
        if (!rows.length) return <div style={{ fontSize: 12, color: 'var(--dim)', padding: '16px 12px', textAlign: 'center' }}>No projects in this group.</div>;
        return (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead>
                <tr style={{ background: 'var(--s2)' }}>
                  {['Project Name','Requested By','Start','End','Status','Plan %','Actual %','Delay (d)','Health','Stakeholder Comments & Risks'].map(h => (
                    <th key={h} style={{ padding: '7px 10px', textAlign: 'left', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.05em', color: 'var(--muted)', borderBottom: '2px solid var(--border2)', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                  {canComment && <th style={{ padding: '7px 10px', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.05em', color: 'var(--muted)', borderBottom: '2px solid var(--border2)' }}>Visibility</th>}
                </tr>
              </thead>
              <tbody>
                {rows.filter(p => !hiddenProjects.has(p.code)).map(p => {
                  const hc = healthColor(p.health);
                  const hl = healthLabel(p.health);
                  const comment = comments[p.code] || '';
                  const isEditingThis = editingComment === p.code;
                  return (
                    <tr key={p.code} style={{ borderBottom: '1px solid var(--border)' }}>
                      <td style={{ padding: '8px 10px', fontWeight: 600, borderLeft: `3px solid ${hc}` }}>{p.name}</td>
                      <td style={{ padding: '8px 10px', fontSize: 11, color: 'var(--muted)' }}>{p.stakeholder || '—'}</td>
                      <td style={{ padding: '8px 10px', color: 'var(--muted)', whiteSpace: 'nowrap' }}>{p.start ? fmt(p.start) : '—'}</td>
                      <td style={{ padding: '8px 10px', color: 'var(--muted)', whiteSpace: 'nowrap' }}>{p.end ? fmt(p.end) : '—'}</td>
                      <td style={{ padding: '8px 10px', whiteSpace: 'nowrap' }}>
                        <span style={{ fontWeight: 700, color: hc }}>{hl.split(' ').slice(1).join(' ')}</span>
                      </td>
                      <td style={{ padding: '8px 10px', whiteSpace: 'nowrap' }}>
                        {(() => {
                          const pStart = new Date(p.start), pEnd = new Date(p.end);
                          const todayD = new Date();
                          const planPct = todayD <= pStart ? 0 : todayD >= pEnd ? 100 : Math.round(((todayD - pStart) / (pEnd - pStart)) * 100);
                          const delta = p.progress - planPct;
                          const c = delta >= 0 ? 'var(--g)' : delta >= -15 ? '#f97316' : 'var(--r)';
                          return (
                            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                              <span style={{ fontWeight: 800, color: 'var(--muted)', minWidth: 32 }}>{planPct}%</span>
                              <div style={{ width: 40, height: 5, background: 'var(--s3)', borderRadius: 3, overflow: 'hidden' }}>
                                <div style={{ height: '100%', width: `${Math.min(planPct, 100)}%`, background: 'var(--muted)', borderRadius: 3 }} />
                              </div>
                            </div>
                          );
                        })()}
                      </td>
                      <td style={{ padding: '8px 10px', whiteSpace: 'nowrap' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <span style={{ fontWeight: 800, color: hc, minWidth: 32 }}>{p.progress}%</span>
                          <div style={{ width: 40, height: 5, background: 'var(--s3)', borderRadius: 3, overflow: 'hidden' }}>
                            <div style={{ height: '100%', width: `${Math.min(p.progress, 100)}%`, background: hc, borderRadius: 3 }} />
                          </div>
                        </div>
                      </td>
                      <td style={{ padding: '8px 10px', textAlign: 'right' }}>
                        {(() => {
                          const leaves = p.items ? p.items.filter(t => !t.is_summary && !t.is_milestone) : [];
                          const maxDelay = leaves.reduce((mx, t) => Math.max(mx, taskDelayDays(t)), 0);
                          return maxDelay > 0
                            ? <span style={{ fontWeight: 800, color: 'var(--r)', fontSize: 12 }}>+{maxDelay}d</span>
                            : <span style={{ color: 'var(--muted)', fontSize: 11 }}>—</span>;
                        })()}
                      </td>
                      <td style={{ padding: '8px 10px' }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: hc }}>
                          {p.health === 'G' ? '🟢' : p.health === 'A' ? '🟡' : '🔴'} {hl.split(' ')[1]}
                        </span>
                      </td>
                      <td style={{ padding: '5px 10px', minWidth: 200 }}>
                        {isEditingThis ? (
                          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                            <input autoFocus
                              style={{ flex: 1, fontSize: 11, padding: '4px 8px', borderRadius: 5, border: '1px solid var(--brand)', background: 'var(--s1)', color: 'var(--text)', outline: 'none' }}
                              value={commentDraft} onChange={e => setCommentDraft(e.target.value)}
                              onKeyDown={e => { if (e.key === 'Enter') saveComment(p.code, commentDraft); if (e.key === 'Escape') setEditingComment(null); }} />
                            <button onClick={() => saveComment(p.code, commentDraft)} style={{ padding: '3px 8px', borderRadius: 4, border: 'none', background: 'var(--brand)', color: '#fff', fontSize: 11, cursor: 'pointer', fontWeight: 700 }}>✓</button>
                            <button onClick={() => setEditingComment(null)} style={{ padding: '3px 7px', borderRadius: 4, border: '1px solid var(--border)', background: 'transparent', color: 'var(--muted)', fontSize: 11, cursor: 'pointer' }}>✕</button>
                          </div>
                        ) : (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, minHeight: 26 }}>
                            <span style={{ flex: 1, fontSize: 11, color: comment ? 'var(--text)' : 'var(--dim)', fontStyle: comment ? 'normal' : 'italic' }}>
                              {comment || (canComment ? 'Click to add comment…' : '—')}
                            </span>
                            {canComment && <span style={{ cursor: 'pointer', opacity: 0.4, fontSize: 11 }}
                              onClick={() => { setCommentDraft(comment); setEditingComment(p.code); }} title="Edit comment">✎</span>}
                          </div>
                        )}
                      </td>
                      {canComment && (
                        <td style={{ padding: '8px 10px', textAlign: 'center' }}>
                          <button onClick={() => toggleHide(p.code)}
                            style={{ fontSize: 9, padding: '2px 7px', borderRadius: 4, border: '1px solid var(--border)', background: 'var(--s2)', color: 'var(--muted)', cursor: 'pointer' }}
                            title="Hide from Executive Summary">Hide</button>
                        </td>
                      )}
                    </tr>
                  );
                  })}
                </tbody>
              </table>
            </div>
          );
        }

      return (
        <div style={{ background: 'var(--s1)', border: '1px solid var(--border)', borderRadius: 12, marginBottom: 18 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 16px', cursor: 'pointer', userSelect: 'none' }}
            onClick={() => setOpen(o => !o)}>
            <span style={{ fontSize: 13, fontWeight: 800, color: 'var(--text)' }}>📊 Executive Summary</span>
            <span style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 4 }}>{projects.length} projects</span>
            {hiddenCount > 0 && <span style={{ fontSize: 10, color: 'var(--a)', background: 'rgba(249,115,22,.1)', padding: '1px 7px', borderRadius: 8, fontWeight: 700 }}>{hiddenCount} hidden</span>}
            {hiddenCount > 0 && canComment && (
              <button onClick={e => { e.stopPropagation(); setHiddenProjects(new Set()); localStorage.removeItem('execSummaryHidden'); }}
                style={{ fontSize: 10, padding: '2px 8px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--s2)', color: 'var(--muted)', cursor: 'pointer', marginLeft: 2 }}>
                Show all
              </button>
            )}
            <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--muted)' }}>{open ? '▲' : '▼'}</span>
          </div>
          {open && (
            <div style={{ padding: '0 0 12px' }}>
              {cubesProjs.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ padding: '6px 14px 4px', fontSize: 11, fontWeight: 800, color: 'var(--brand)', textTransform: 'uppercase', letterSpacing: '.06em' }}>
                    🔷 CUBES Projects ({cubesProjs.filter(p => !hiddenProjects.has(p.code)).length})
                  </div>
                  <ProjTable rows={cubesProjs} />
                </div>
              )}
              {implProjs.length > 0 && (
                <div>
                  <div style={{ padding: '6px 14px 4px', fontSize: 11, fontWeight: 800, color: '#f97316', textTransform: 'uppercase', letterSpacing: '.06em' }}>
                    🔶 Implementation Projects ({implProjs.filter(p => !hiddenProjects.has(p.code)).length})
                  </div>
                  <ProjTable rows={implProjs} />
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── GANTT CHART ──────────────────────────────────────────────────
    function GanttChart({ p }) {
      // Exclude the synthetic project root from display
      const visItems = p.items.filter(t => !t.is_project_root);
      const all = visItems.flatMap(t => [new Date(t.start), new Date(t.end)]);
      if (!all.length) return null;
      let mn = new Date(Math.min(...all)), mx = new Date(Math.max(...all));
      mn.setDate(mn.getDate() - 3); mx.setDate(mx.getDate() + 8);
      const span = mx - mn;
      const pos = d => clamp(((new Date(d) - mn) / span) * 100, 0, 100);
      const tPct = pos(TODAY);
      const showToday = tPct > 1 && tPct < 99;

      const totalD = days(mn.toISOString().split('T')[0], mx.toISOString().split('T')[0]);
      const inter = Math.max(7, Math.round(totalD / 10));
      const ticks = []; const td = new Date(mn);
      while (td <= mx) { ticks.push({ p: pos(td), l: fmtS(td) }); td.setDate(td.getDate() + inter); }

      return (
        <div className="gantt-section">
          <div className="sec-hd">Gantt Chart</div>
          <div className="g-dhdr">
            <div className="g-dspacer" />
            <div className="g-dates">
              {ticks.map((t, i) => <div key={i} className="g-tick" style={{ left: `${t.p}%` }}>{t.l}</div>)}
              {showToday && <div className="g-tick g-tick-today" style={{ left: `${tPct}%` }}>TODAY</div>}
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            {showToday && (
              <div style={{ position: 'absolute', top: 0, bottom: 0, left: 240, right: 0, pointerEvents: 'none', zIndex: 5, overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${tPct}%`, width: 2, background: 'rgba(210,40,55,.6)' }} />
              </div>
            )}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
              {visItems.map((t, i) => {
                const isMs = t.is_milestone;
                const l = pos(t.start), r2 = pos(t.end), w = Math.max(0.6, r2 - l);
                const st = (!t.is_summary && !isMs) ? taskSt(t) : (t.pct >= 100 ? { l: 'Completed', c: 'sc-done' } : { l: '', c: 'sc-on' });
                const bc = statusColor(st, t.pct);
                const lc = 'l' + Math.min(t.level, 4);
                const rowType = t.level === 1 ? 'g-row-root' : t.is_summary ? 'g-row-phase' : '';
                // bar shape variant
                const barCls = t.level === 1 ? 'g-bar g-bar-root' : t.is_summary ? 'g-bar g-bar-summary' : 'g-bar';
                // tooltip for leaf tasks
                const tip = (!isMs && !t.is_summary) ? `${t.title}\n${fmt(t.start)} → ${fmt(t.end)}\n${taskStReason(t, st)}` : t.title;
                return (
                  <div key={i} className={`g-row ${rowType}`}>
                    <div className="g-left">
                      <div className={`g-lbl ${lc}`} title={t.title}>
                        {isMs ? `◆ ${t.title}` : t.is_summary ? `▼ ${t.title}` : t.title}
                      </div>
                      <span className="g-pct" style={{ color: bc, fontWeight: t.level === 1 ? 800 : 700 }}>
                        {isMs && t.pct === 0 ? '' : t.pct + '%'}
                      </span>
                    </div>
                    <div className="g-track">
                      {isMs
                        /* Milestone diamond */
                        ? <div className="g-ms" title={tip}
                          style={{ left: `${l}%`, background: bc, borderColor: 'rgba(255,255,255,.8)' }} />
                        /* Full-duration bar with fill representing completion */
                        : <div className={barCls} title={tip}
                          style={{
                            left: `${l}%`,
                            width: `${w}%`,
                            borderColor: `${bc}40`,
                          }}>
                          {/* Completion fill */}
                          <div className="g-bar-fill"
                            style={{ width: `${t.pct}%`, background: bc }} />
                        </div>
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {/* Gantt Color Legend */}
          <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginTop: 10, padding: '6px 4px', borderTop: '1px solid var(--border)' }}>
            {[
              { color: 'var(--g)', label: 'Completed' },
              { color: 'var(--brand)', label: 'In Progress / On Track' },
              { color: 'var(--a)', label: 'At Risk' },
              { color: 'var(--r)', label: 'Delayed / Overdue' },
              { color: 'var(--muted)', label: 'Not Started' },
            ].map(({ color, label }) => (
              <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: color, flexShrink: 0 }} />
                <span style={{ fontSize: 10, color: 'var(--muted)' }}>{label}</span>
              </div>
            ))}
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <div style={{ width: 12, height: 12, transform: 'rotate(45deg)', background: 'var(--brand)', flexShrink: 0, borderRadius: 1 }} />
              <span style={{ fontSize: 10, color: 'var(--muted)' }}>Milestone</span>
            </div>
          </div>
        </div>
      );
    }

    // ── TASK ROW (with inline editor) ────────────────────────────────
    function TaskRow({ t, p, idx, totalRows, onSaved, onToast, user, onRequestChange, onOpenDetails, colVis, isDeactivated, onReactivate, onHideRow, planEditMode, pendingEdit, allTasksForPred, onPlanStartEdit, onDurationEdit, onPredecessorChange, onPredRelChange }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(Math.round(t.pct));
      const [saving, setSaving] = useState(false);
      const inputRef = useRef();
      const settings = React.useContext(SettingsCtx);

      const role = user?.role || 'viewer';
      const canEdit = role === 'admin' || role === 'editor';
      const isAdmin = role === 'admin';

      // Keep editor seed in sync with live pct after each reload
      useEffect(() => { if (!editing) setVal(Math.round(t.pct)); }, [t.pct, editing]);
      useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [editing]);

      const isMs = t.is_milestone;
      const isRoot = t.level === 1;
      // Admins can edit any task (including 100%). Non-admins are blocked at 100%.
      const isLocked = !isAdmin && !isRoot && !t.is_summary && t.pct >= 100;
      const isEditable = canEdit && !isRoot && !t.is_summary && (t.pct < 100 || isAdmin);
      const rowCls = isRoot ? 'tr-root' : t.is_summary ? 'tr-phase' : isMs ? 'tr-ms' : 'tr-task';
      const st = (!t.is_summary && !isMs) ? taskSt(t) : (t.pct >= 100 ? { l: 'Completed', c: 'sc-done' } : null);
      const stReason = (!t.is_summary && !isMs && st) ? taskStReason(t, st) : '';
      const dur = days(t.start, t.end);
      const bc = isMs ? (t.pct >= 100 ? 'var(--g)' : 'var(--brand)') : statusColor(st, t.pct);

      // Tree connector
      function isLastAtLevel(level) {
        for (let j = idx + 1; j < totalRows; j++) {
          if (p.items[j].level < level) return true;
          if (p.items[j].level === level) return false;
        }
        return true;
      }
      function treePrefix() {
        if (t.level === 1) return '';
        let prefix = '';
        for (let lv = 2; lv < t.level; lv++) {
          let hasCont = false;
          for (let j = idx + 1; j < totalRows; j++) {
            if (p.items[j].level < lv) break;
            if (p.items[j].level === lv) { hasCont = true; break; }
          }
          prefix += hasCont ? '│  ' : '   ';
        }
        return prefix + (isLastAtLevel(t.level) ? '└─ ' : '├─ ');
      }

      async function handleSubmit() {
        const v = parseInt(val);
        if (isNaN(v) || v < 0 || v > 100) return;
        const floor = Math.round(t.pct);
        if (v < floor) {
          if (!isAdmin) {
            // Non-admin: hard block
            onToast(`Cannot decrease — "${t.title}" is already at ${floor}%. Only an admin can reduce a completed value.`, 'error');
            return;
          }
          // Admin: require explicit confirmation for any decrease
          const ok = window.confirm(
            `⚠ Admin override — decrease confirmation\n\n` +
            `Task: "${t.title}"\n` +
            `Current: ${floor}%  →  New: ${v}%\n\n` +
            `Reducing a completed percentage requires admin approval.\n` +
            `Are you sure you want to proceed?`
          );
          if (!ok) return;
        }
        setSaving(true);
        try {
          await api.saveOverride(p.name, t.title, v, t.original_pct, user?.username);

          // Auto-sync % to the paired [Imp] project when saving a [Cubes] leaf task
          const cubesMatch = p.name.match(/^(.*)\s*\[Cubes\]$/i);
          if (cubesMatch && !t.is_summary && !t.is_milestone) {
            const baseName = cubesMatch[1].trim();
            const allProjects = window.__allProjects || [];
            const impProject = allProjects.find(
              x => x.name.match(new RegExp('^' + baseName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*\\[Imp\\]$', 'i'))
            );
            if (impProject) {
              const impTask = impProject.items.find(it => it.title === t.title && !it.is_summary && !it.is_milestone);
              if (impTask) {
                try {
                  await api.saveOverride(impProject.name, impTask.title, v, impTask.original_pct, user?.username);
                } catch (_) { /* silent — don't block the main save */ }
              }
            }
          }

          onToast('Saved ✓', 'success');
          setEditing(false);
          onSaved();
        } catch (e) {
          onToast('Save failed: ' + e.message, 'error');
        }
        setSaving(false);
      }

      async function handleReset() {
        if (!window.confirm(`Reset "${t.title}" back to MS Project value (${t.original_pct}%)?`)) return;
        setSaving(true);
        try {
          await api.deleteOverride(p.name, t.title);
          onToast('Reset to MS Project value ✓', 'success');
          setEditing(false);
          onSaved();
        } catch (e) { onToast('Reset failed: ' + e.message, 'error'); }
        setSaving(false);
      }

      async function renameTask() {
        if (!isAdmin) return;
        const newTitle = window.prompt("Rename task:", t.title);
        if (!newTitle || newTitle === t.title) return;
        try {
          await api.updateTask(t.id, { title: newTitle }, user.id);
          onToast("Task renamed ✓", "success");
          onSaved();
        } catch (e) { onToast(e.message, "error"); }
      }

      const typeBadge = isRoot || t.is_summary
        ? <span className="type-badge t-sum">Summary</span>
        : isMs ? <span className="type-badge t-ms">Milestone</span>
          : <span className="type-badge t-task">Task</span>;

      const statusEl = isMs
        ? (() => {
          const s = t.pct >= 100
            ? { l: 'Achieved', c: 'sc-ms-ok' }
            : TODAY > new Date(t.end)
              ? { l: 'Missed', c: 'sc-ms-miss' }
              : { l: 'Upcoming', c: 'sc-ms-up' };
          const reason = s.c === 'sc-ms-miss' ? `Milestone missed — was due ${fmt(t.end)}.`
            : s.c === 'sc-ms-ok' ? `Milestone achieved.` : `Due on ${fmt(t.end)}.`;
          return <span className={`sc ${s.c}`} title={reason}>{s.l}</span>;
        })()
        : t.is_summary
          ? (() => {
            const s = t.pct >= 100
              ? { l: 'Completed', c: 'sc-done' }
              : TODAY > new Date(t.end)
                ? { l: 'Overdue', c: 'sc-overdue' }
                : t.pct === 0
                  ? { l: 'Not Started', c: 'sc-ns' }
                  : { l: 'In Progress', c: 'sc-on' };
            return <span className={`sc ${s.c}`}>{s.l}</span>;
          })()
          : <span className={`sc ${st.c}`} title={stReason}>{st.l}</span>;

      // Actual % — number cell (always shown when show_pct_edit is on)
      const pctNumCell = (
        <td style={{ width: 58, textAlign: 'right', paddingRight: 6 }}>
          {isEditable && editing ? (
            <div className="pct-editor" style={{ minWidth: 110 }}>
              <input ref={inputRef} type="number" min={isAdmin ? 0 : Math.round(t.pct)} max="100" value={val} onChange={e => setVal(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') handleSubmit(); if (e.key === 'Escape') setEditing(false); }} />
              <button className="pe-ok" onClick={handleSubmit} disabled={saving}>{saving ? '…' : '✓'}</button>
              <button className="pe-cancel" onClick={() => setEditing(false)}>✕</button>
              {t.overridden && <button className="pe-reset" onClick={handleReset} title={`Reset to ${t.original_pct}%`}>↺</button>}
            </div>
          ) : (
            <span className="pct-num" style={{ color: isLocked ? 'var(--g)' : bc, fontWeight: 700, fontSize: 12 }}>
              {Math.round(t.pct)}%
            </span>
          )}
        </td>
      );

      // ✎ edit-icon cell — separate column next to Actual %
      const pctCell = pctNumCell; // kept for backward compat reference below
      const pctEditIconCell = (
        <td style={{ width: 28, textAlign: 'center', padding: '0 2px' }}>
          {isEditable && !editing ? (
            <span className="pct-edit-icon" style={{ cursor: 'pointer', fontSize: 13, opacity: 0.55 }}
              onClick={() => setEditing(true)} title="Edit %">✎
              {t.overridden && <span className="override-badge" title={t.override_info ? `By ${t.override_info.updated_by}` : 'Override'} style={{ fontSize: 8, marginLeft: 1 }}>✏</span>}
            </span>
          ) : isLocked ? (
            isAdmin
              ? <span style={{ fontSize: 11, opacity: 0.35 }} title="Locked at 100%">🔒</span>
              : <button className="cr-req-btn" title="Request admin to change this value"
                  onClick={() => onRequestChange && onRequestChange(t)}>📝</button>
          ) : (
            <span style={{ color: 'var(--dim)', fontSize: 11 }}>—</span>
          )}
        </td>
      );

      // PM Logic: dynamic actual dates
      const planStart = t.start;
      const planEnd = t.end;
      const extraDays = t.extended_days || 0;   // correct field — integer only

      function addDaysStr(dStr, daysA) {
        if (!dStr || !daysA) return dStr;
        let d = new Date(dStr);
        d.setDate(d.getDate() + daysA);
        return d.toISOString().split('T')[0];
      }

      // Actual Start: admin-set override takes priority; else derive from progress
      const actualStart = t.actual_start_date || (t.pct > 0 ? planStart : null);
      // Actual Finish: admin-set override takes priority; else derive from plan + extra days
      const actualEnd = t.actual_finish_date ||
        (t.pct > 0 ? addDaysStr(planEnd, extraDays) : null);

      // Inline date editing state (for admins)
      const [editingAS, setEditingAS] = useState(false);
      const [editingAF, setEditingAF] = useState(false);
      const [asVal, setAsVal] = useState(t.actual_start_date || planStart?.split('T')[0] || '');
      const [afVal, setAfVal] = useState(t.actual_finish_date || planEnd?.split('T')[0] || '');

      async function saveActualDate(field, value) {
        try {
          await api.updateTask(t.id, { [field]: value || null }, user.id);
          onToast('Date updated ✓', 'success');
          onSaved();
        } catch (e) { onToast('Failed: ' + e.message, 'error'); }
        setEditingAS(false); setEditingAF(false);
      }

      const sh = colVis || (key => settings[key] !== false);
      const deactivatedStyle = isDeactivated ? { opacity: 0.45, textDecoration: 'line-through' } : {};

      // Plan % = schedule-based completion (how much of elapsed time vs task duration)
      const planPctVal = (() => {
        if (isMs) return TODAY >= new Date(t.end) ? 100 : 0;
        const s = new Date(t.start), e = new Date(t.end);
        if (TODAY <= s) return 0;
        if (TODAY >= e) return 100;
        return Math.round(((TODAY - s) / (e - s)) * 100);
      })();
      // Color: green if actual >= plan, orange if slightly behind, red if very behind
      const planDelta = Math.round(t.pct) - planPctVal;
      const planPctColor = planDelta >= 0 ? 'var(--g)' : planDelta >= -15 ? '#f97316' : 'var(--r)';
      const planPctCell = (
        <td style={{ width: 68, textAlign: 'right', paddingRight: 8 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--muted)', ...deactivatedStyle }}
            title={`Schedule expects ${planPctVal}% by today — actual is ${Math.round(t.pct)}%`}>
            {planPctVal}%
          </span>
        </td>
      );

      return (
        <tr className={rowCls} style={isDeactivated ? { opacity: 0.45 } : {}}
          onContextMenu={isAdmin && onHideRow ? (e) => {
            e.preventDefault();
            // Just hide the row on right-click
            if (window.confirm(`Hide "${t.title}" from the table?`)) {
              onHideRow(t.id, t.title);
            }
          } : undefined}>
          {sh('show_wbs') && <td style={{ width: 44 }}><div className="td-pad" style={{ color: 'var(--dim)', fontFamily: 'monospace', fontSize: 11, ...deactivatedStyle }}>{isRoot ? '' : t.wbs}</div></td>}
          {sh('show_plan_pct') && planPctCell}
          {sh('show_pct_edit') && pctNumCell}
          {sh('show_pct_edit') && pctEditIconCell}
          {sh('show_delay_days') && (() => {
            const delay = (!t.is_summary && !isRoot) ? taskDelayDays(t) : 0;
            return (
              <td style={{ width: 60, textAlign: 'right', paddingRight: 8 }}>
                {delay > 0
                  ? <span style={{ fontWeight: 700, color: 'var(--r)', fontSize: 12, ...deactivatedStyle }}>+{delay}d</span>
                  : <span style={{ color: 'var(--muted)', fontSize: 11 }}>—</span>}
              </td>
            );
          })()}
          {sh('show_progress_bar') && <td style={{ width: 60 }}>
            <div className="td-pad">
              <div className="pbar-wrap">
                <div className="pbar"><div className="pfill" style={{ width: `${t.pct}%`, background: bc }} /></div>
              </div>
            </div>
          </td>}
          {sh('show_status') && <td style={{ width: 85 }}><div className="td-pad">{statusEl}</div></td>}
          <td style={{ minWidth: 260, maxWidth: 340 }}>
            <div className="name-cell">
              <span className="tree-conn">{treePrefix()}</span>
              <span className="row-icon" style={{ color: isMs || t.is_summary ? p.color : 'var(--dim)' }}>{isMs ? '◆' : t.is_summary ? '▼' : '·'}</span>
              <span className="row-name" title={t.title} style={deactivatedStyle}>
                {t.title} {t.is_critical && !isDeactivated && <span style={{ color: 'var(--r)', fontSize: 10, marginLeft: 4 }}>[CRITICAL]</span>}
                {isDeactivated && <span style={{ fontSize: 9, color: 'var(--r)', marginLeft: 6, fontStyle: 'italic', textDecoration: 'none' }}>deactivated
                  {onReactivate && <button onClick={e => { e.stopPropagation(); onReactivate(); }}
                    style={{ marginLeft: 5, fontSize: 9, padding: '0 5px', borderRadius: 3, border: '1px solid var(--border)', background: 'transparent', color: 'var(--brand)', cursor: 'pointer', textDecoration: 'none' }}>↺</button>}
                </span>}
              </span>
              {isAdmin && !isDeactivated && <span style={{ marginLeft: 8, cursor: 'pointer', opacity: 0.3, fontSize: 10 }} onClick={renameTask} title="Rename Task">✏</span>}
            </div>
          </td>
          {sh('show_duration') && <td>
            <div className="td-pad" style={{ fontSize: 11, textAlign: 'right' }}>
              {planEditMode && isAdmin && !isRoot && !t.is_summary && !isMs ? (
                <input type="number" min="1" max="999"
                  style={{ width: 48, fontSize: 11, padding: '2px 4px', borderRadius: 4, border: '1px solid var(--brand)', background: 'var(--s2)', color: 'var(--text)', textAlign: 'right' }}
                  defaultValue={pendingEdit?.duration_days ?? (dur > 0 ? dur : (t.duration_days || dur))}
                  onBlur={e => onDurationEdit && onDurationEdit(t.id, e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') { e.target.blur(); } }}
                />
              ) : (
                <span style={{ color: pendingEdit?.duration_days ? 'var(--a)' : 'var(--muted)', fontWeight: pendingEdit?.duration_days ? 700 : 400, ...deactivatedStyle }}>
                  {isMs || dur === 0 ? '—' : (pendingEdit?.duration_days ?? dur) + 'd'}
                </span>
              )}
            </div>
          </td>}
          {sh('show_type_column') && <td style={{ width: 80 }}><div className="td-pad">{typeBadge}</div></td>}
          {sh('show_plan_start') && <td style={pendingEdit?.start_date ? { background: 'rgba(234,179,8,.12)' } : {}}>
            <div className="td-pad" style={{ fontSize: 11 }}>
              {planEditMode && isAdmin && !isRoot && !t.is_summary ? (
                <input type="date"
                  style={{ fontSize: 11, padding: '2px 4px', borderRadius: 4, border: '1px solid var(--brand)', background: 'var(--s2)', color: 'var(--text)', width: 115 }}
                  value={pendingEdit?.start_date ?? planStart?.split('T')[0] ?? ''}
                  onChange={e => onPlanStartEdit && onPlanStartEdit(t.id, e.target.value)}
                />
              ) : (
                <span style={{ color: isMs ? 'var(--brand)' : pendingEdit?.start_date ? 'var(--a)' : 'var(--muted)', fontWeight: pendingEdit?.start_date ? 700 : 400, ...deactivatedStyle }}>
                  {fmt(pendingEdit?.start_date ?? planStart)}
                </span>
              )}
            </div>
          </td>}
          {sh('show_actual_start') && <td>
            <div className="td-pad" style={{ fontSize: 11 }}>
              <span style={{ color: actualStart ? 'var(--g)' : 'var(--muted)', ...deactivatedStyle }}>{actualStart ? fmt(actualStart) : '—'}</span>
            </div>
          </td>}
          {sh('show_plan_finish') && <td><div className="td-pad" style={{ fontSize: 11, color: isMs ? 'var(--brand)' : 'var(--muted)', ...deactivatedStyle }}>{isMs ? '—' : fmt(planEnd)}</div></td>}
          {sh('show_actual_finish') && <td>
            <div className="td-pad" style={{ fontSize: 11 }}>
              <span style={{ color: actualEnd ? (extraDays > 0 ? 'var(--r)' : 'var(--g)') : 'var(--muted)', ...deactivatedStyle }}>{isMs ? '—' : (actualEnd ? fmt(actualEnd) : '—')}</span>
            </div>
          </td>}
          {sh('show_actual_edit') && <td style={{ textAlign: 'center' }}>
            {isAdmin && !isMs && !t.is_summary && !isRoot && !isDeactivated ? (
              <div className="td-pad">
                {(editingAS || editingAF) ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 160 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                      <span style={{ fontSize: 9, color: 'var(--muted)', width: 20 }}>S:</span>
                      <input type="date" style={{ fontSize: 10, padding: '2px 4px', borderRadius: 3, border: '1px solid var(--brand)', background: 'var(--s2)', color: 'var(--text)', flex: 1 }}
                        value={asVal} onChange={e => setAsVal(e.target.value)} />
                      {asVal && <button onClick={() => saveActualDate('actual_start_date', asVal)} style={{ padding: '1px 5px', fontSize: 9, borderRadius: 3, border: 'none', background: 'var(--brand)', color: '#fff', cursor: 'pointer' }}>✓</button>}
                      {t.actual_start_date && <button onClick={() => saveActualDate('actual_start_date', null)} title="Clear" style={{ padding: '1px 4px', fontSize: 9, borderRadius: 3, border: '1px solid var(--border)', background: 'transparent', color: 'var(--muted)', cursor: 'pointer' }}>↺</button>}
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                      <span style={{ fontSize: 9, color: 'var(--muted)', width: 20 }}>F:</span>
                      <input type="date" style={{ fontSize: 10, padding: '2px 4px', borderRadius: 3, border: '1px solid var(--brand)', background: 'var(--s2)', color: 'var(--text)', flex: 1 }}
                        value={afVal} onChange={e => setAfVal(e.target.value)} />
                      {afVal && <button onClick={() => saveActualDate('actual_finish_date', afVal)} style={{ padding: '1px 5px', fontSize: 9, borderRadius: 3, border: 'none', background: 'var(--brand)', color: '#fff', cursor: 'pointer' }}>✓</button>}
                      {t.actual_finish_date && <button onClick={() => saveActualDate('actual_finish_date', null)} title="Clear" style={{ padding: '1px 4px', fontSize: 9, borderRadius: 3, border: '1px solid var(--border)', background: 'transparent', color: 'var(--muted)', cursor: 'pointer' }}>↺</button>}
                    </div>
                    <button onClick={() => { setEditingAS(false); setEditingAF(false); }} style={{ fontSize: 9, padding: '1px 6px', borderRadius: 3, border: '1px solid var(--border)', background: 'transparent', color: 'var(--muted)', cursor: 'pointer', alignSelf: 'flex-end' }}>✕ Close</button>
                  </div>
                ) : (
                  <span style={{ cursor: 'pointer', opacity: 0.5, fontSize: 12 }}
                    onClick={() => { setAsVal(t.actual_start_date || planStart?.split('T')[0] || ''); setAfVal(t.actual_finish_date || planEnd?.split('T')[0] || ''); setEditingAS(true); setEditingAF(true); }}
                    title="Edit actual start / finish dates">✎</span>
                )}
              </div>
            ) : <span style={{ color: 'var(--dim)', fontSize: 11 }}>—</span>}
          </td>}
          {sh('show_extended_days') && <td><div className="td-pad" style={{ fontSize: 11, color: extraDays > 0 ? 'var(--r)' : 'var(--muted)', textAlign: 'center', ...deactivatedStyle }}>{isMs || t.is_summary || isRoot ? '—' : extraDays > 0 ? `+${extraDays}` : '0'}</div></td>}
          {sh('show_predecessor') && <td style={(pendingEdit?.predecessor_id !== undefined || pendingEdit?.predecessor_type || pendingEdit?.predecessor_lag) ? { background: 'rgba(234,179,8,.12)' } : {}}>
            <div className="td-pad" style={{ fontSize: 11 }}>
              {planEditMode && isAdmin && !isRoot && !t.is_summary ? (() => {
                const effectivePredId   = pendingEdit?.predecessor_id   !== undefined ? pendingEdit.predecessor_id   : (t.predecessor_id || '');
                const effectiveRelType  = pendingEdit?.predecessor_type !== undefined ? pendingEdit.predecessor_type  : (t.predecessor_type || 'FS');
                const effectiveLag      = pendingEdit?.predecessor_lag  !== undefined ? pendingEdit.predecessor_lag   : (t.predecessor_lag  || 0);
                return (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
                    <select value={effectivePredId || ''}
                      onChange={e => onPredecessorChange && onPredecessorChange(t.id, e.target.value || null)}
                      style={{ fontSize: 11, padding: '2px 4px', borderRadius: 4, border: '1px solid var(--brand)', background: 'var(--s2)', color: 'var(--text)', maxWidth: 135 }}>
                      <option value="">— none —</option>
                      {(allTasksForPred || []).filter(other => other.id !== t.id && !other.is_project_root && !other.is_summary).map(other => (
                        <option key={other.id} value={other.id}>{other.wbs ? other.wbs + ' ' : ''}{other.title}</option>
                      ))}
                    </select>
                    {effectivePredId && (
                      <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
                        <select value={effectiveRelType}
                          onChange={e => onPredRelChange && onPredRelChange(t.id, e.target.value, effectiveLag)}
                          style={{ fontSize: 10, padding: '1px 3px', borderRadius: 3, border: '1px solid var(--border)', background: 'var(--s2)', color: 'var(--text)', width: 48 }}>
                          {['FS','SS','FF','SF'].map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                        <span style={{ fontSize: 10, color: 'var(--muted)' }}>+</span>
                        <input type="number" min="0" max="99"
                          style={{ width: 34, fontSize: 10, padding: '1px 3px', borderRadius: 3, border: '1px solid var(--border)', background: 'var(--s2)', color: 'var(--text)', textAlign: 'right' }}
                          value={effectiveLag}
                          onChange={e => onPredRelChange && onPredRelChange(t.id, effectiveRelType, parseInt(e.target.value) || 0)} />
                        <span style={{ fontSize: 10, color: 'var(--muted)' }}>d</span>
                      </div>
                    )}
                  </div>
                );
              })() : (() => {
                const predId      = pendingEdit?.predecessor_id  !== undefined ? pendingEdit.predecessor_id  : t.predecessor_id;
                const relType     = pendingEdit?.predecessor_type !== undefined ? pendingEdit.predecessor_type : (t.predecessor_type || 'FS');
                const lag         = pendingEdit?.predecessor_lag  !== undefined ? pendingEdit.predecessor_lag  : (t.predecessor_lag  || 0);
                const predTask    = predId && (allTasksForPred || []).find(x => x.id === predId);
                const changed     = pendingEdit?.predecessor_id !== undefined || pendingEdit?.predecessor_type || pendingEdit?.predecessor_lag;
                const relLabel    = predTask ? `${relType}${lag > 0 ? '+' + lag + 'd' : ''}` : '';
                return (
                  <span style={{ color: predTask ? (changed ? 'var(--a)' : 'var(--brand)') : 'var(--muted)', fontWeight: changed ? 700 : 400 }}>
                    {predTask ? `${predTask.title} [${relLabel}]` : (isRoot || t.is_summary ? '—' : <span style={{ opacity: 0.4 }}>—</span>)}
                  </span>
                );
              })()}
            </div>
          </td>}
          {sh('show_risk_log_btn') && <td>
            <div className="td-pad">
              {!t.is_summary && !isRoot && !isDeactivated && (
                <button style={{ padding: '2px 6px', fontSize: 9, borderRadius: 4, background: 'rgba(239,68,68,0.1)', color: 'var(--r)', border: '1px solid rgba(239,68,68,0.2)', cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => onOpenDetails(t)} title={canEdit ? 'Log Rework, Expected Delays, or Risk impact' : 'Report a risk or delay for admin review'}>⚠ {canEdit ? 'Log Risk/Delay' : 'Report Risk'}</button>
              )}
            </div>
          </td>}
        </tr>
      );
    }

    // ── TASK TABLE ───────────────────────────────────────────────────
    function TaskTable({ p, onSaved, onToast, user, onRequestChange }) {
      const settings = React.useContext(SettingsCtx);
      const isAdmin = user?.role === 'admin';
      // Exclude synthetic project root from display
      const allItems = p.items.filter(t => !t.is_project_root);

      // ── Plan Edit Mode (MS-Project-style inline scheduling) ──────────
      const hasDependencies = allItems.some(t => t.predecessor_id);
      const [planEditMode, setPlanEditMode] = useState(false);
      const [pendingEdits, setPendingEdits] = useState({}); // {taskId: {start_date?, end_date?, predecessor_id?}}
      const [savingEdits, setSavingEdits] = useState(false);

      // Advance a date by n work days (Jordan calendar, reusing global isWorkingDay)
      function nextWorkDay(dateStr) {
        let d = new Date(dateStr);
        do { d.setDate(d.getDate() + 1); } while (!isWorkingDay(d));
        return d.toISOString().split('T')[0];
      }
      function addWD(dateStr, n) {
        if (n <= 0) return dateStr;
        const d = addWorkDays(new Date(dateStr), n);
        return d.toISOString().split('T')[0];
      }
      function taskDur(t) {
        // prefer duration_days stored on task, fall back to date diff
        if (t.duration_days && t.duration_days > 0) return t.duration_days;
        return Math.max(1, days(t.start?.split('T')[0], t.end?.split('T')[0]) || 1);
      }

      // Compute successor start/end based on predecessor relationship type and lag
      function applyPredType(predStart, predEnd, succDur, relType, lag) {
        const lagDays = lag || 0;
        let succStart, succEnd;
        if (relType === 'SS') {
          // Start-to-Start: successor starts when predecessor starts (+ lag)
          succStart = lagDays > 0 ? addWD(predStart, lagDays) : predStart;
        } else if (relType === 'FF') {
          // Finish-to-Finish: successor finishes when predecessor finishes (+ lag)
          const succFinish = lagDays > 0 ? addWD(predEnd, lagDays) : predEnd;
          succEnd = succFinish;
          succStart = succDur > 1 ? addWD(succFinish, -(succDur - 1)) : succFinish;
          return { succStart, succEnd };
        } else if (relType === 'SF') {
          // Start-to-Finish: successor finishes when predecessor starts (+ lag)
          const succFinish = lagDays > 0 ? addWD(predStart, lagDays) : predStart;
          succEnd = succFinish;
          succStart = succDur > 1 ? addWD(succFinish, -(succDur - 1)) : succFinish;
          return { succStart, succEnd };
        } else {
          // FS (default): successor starts after predecessor finishes (+ lag)
          succStart = lagDays > 0 ? addWD(nextWorkDay(predEnd), lagDays - 1) : nextWorkDay(predEnd);
        }
        succEnd = succDur > 1 ? addWD(succStart, succDur - 1) : succStart;
        return { succStart, succEnd };
      }

      // Recursively cascade date change from taskId downward through successors
      function cascadeEdits(taskId, newStart, newEnd, edits, items) {
        const successors = items.filter(t => {
          const predId = edits[t.id]?.predecessor_id ?? t.predecessor_id;
          return predId === taskId;
        });
        let result = { ...edits };
        for (const succ of successors) {
          const relType = edits[succ.id]?.predecessor_type ?? succ.predecessor_type ?? 'FS';
          const lag     = edits[succ.id]?.predecessor_lag  ?? succ.predecessor_lag  ?? 0;
          const dur = taskDur(succ);
          const { succStart, succEnd } = applyPredType(newStart, newEnd, dur, relType, lag);
          result[succ.id] = { ...(result[succ.id] || {}), start_date: succStart, end_date: succEnd };
          result = cascadeEdits(succ.id, succStart, succEnd, result, items);
        }
        return result;
      }

      function handlePlanStartEdit(taskId, newStart) {
        const task = allItems.find(t => t.id === taskId);
        if (!task) return;
        const dur = taskDur(task);
        const newEnd = dur > 1 ? addWD(newStart, dur - 1) : newStart;
        const base = { ...pendingEdits, [taskId]: { ...(pendingEdits[taskId] || {}), start_date: newStart, end_date: newEnd } };
        setPendingEdits(cascadeEdits(taskId, newStart, newEnd, base, allItems));
      }

      function handleDurationEdit(taskId, newDur) {
        const dur = parseInt(newDur);
        if (isNaN(dur) || dur < 1) return;
        const task = allItems.find(t => t.id === taskId);
        if (!task) return;
        const startStr = pendingEdits[taskId]?.start_date ?? task.start?.split('T')[0];
        const newEnd = addWD(startStr, dur - 1);
        const base = { ...pendingEdits, [taskId]: { ...(pendingEdits[taskId] || {}), duration_days: dur, end_date: newEnd } };
        setPendingEdits(cascadeEdits(taskId, startStr, newEnd, base, allItems));
      }

      function handlePredecessorChange(taskId, newPredId) {
        if (!newPredId) {
          setPendingEdits(e => ({ ...e, [taskId]: { ...(e[taskId] || {}), predecessor_id: null } }));
          return;
        }
        const pred    = allItems.find(t => t.id === newPredId);
        const predStart = pred ? (pendingEdits[newPredId]?.start_date ?? pred.start?.split('T')[0]) : null;
        const predEnd   = pred ? (pendingEdits[newPredId]?.end_date   ?? pred.end?.split('T')[0])   : null;
        if (predEnd) {
          const task    = allItems.find(t => t.id === taskId);
          const relType = pendingEdits[taskId]?.predecessor_type ?? task?.predecessor_type ?? 'FS';
          const lag     = pendingEdits[taskId]?.predecessor_lag  ?? task?.predecessor_lag  ?? 0;
          const dur     = taskDur(task);
          const { succStart, succEnd } = applyPredType(predStart, predEnd, dur, relType, lag);
          const base = { ...pendingEdits, [taskId]: { ...(pendingEdits[taskId] || {}), predecessor_id: newPredId, start_date: succStart, end_date: succEnd } };
          setPendingEdits(cascadeEdits(taskId, succStart, succEnd, base, allItems));
        } else {
          setPendingEdits(e => ({ ...e, [taskId]: { ...(e[taskId] || {}), predecessor_id: newPredId } }));
        }
      }

      function handlePredRelChange(taskId, relType, lag) {
        const task    = allItems.find(t => t.id === taskId);
        const predId  = pendingEdits[taskId]?.predecessor_id ?? task?.predecessor_id;
        if (!predId) {
          setPendingEdits(e => ({ ...e, [taskId]: { ...(e[taskId] || {}), predecessor_type: relType, predecessor_lag: lag } }));
          return;
        }
        const pred      = allItems.find(t => t.id === predId);
        const predStart = pred ? (pendingEdits[predId]?.start_date ?? pred.start?.split('T')[0]) : null;
        const predEnd   = pred ? (pendingEdits[predId]?.end_date   ?? pred.end?.split('T')[0])   : null;
        if (predEnd) {
          const dur = taskDur(task);
          const { succStart, succEnd } = applyPredType(predStart, predEnd, dur, relType, lag);
          const base = { ...pendingEdits, [taskId]: { ...(pendingEdits[taskId] || {}), predecessor_type: relType, predecessor_lag: lag, start_date: succStart, end_date: succEnd } };
          setPendingEdits(cascadeEdits(taskId, succStart, succEnd, base, allItems));
        } else {
          setPendingEdits(e => ({ ...e, [taskId]: { ...(e[taskId] || {}), predecessor_type: relType, predecessor_lag: lag } }));
        }
      }

      async function savePendingEdits() {
        const entries = Object.entries(pendingEdits);
        if (!entries.length) return;
        setSavingEdits(true);
        try {
          // Save Cubes edits first
          await Promise.all(entries.map(([taskId, edit]) => api.updateTask(taskId, edit, user.id)));

          // Auto-sync to paired [Imp] project if this is a [Cubes] project
          let impSynced = 0;
          if (p.name.endsWith(' [Cubes]')) {
            const baseName = p.name.replace(' [Cubes]', '');
            const allProjects = window.__allProjects || [];
            const impProj = allProjects.find(x => x.name === baseName + ' [Imp]');
            if (impProj) {
              const impItems = impProj.items.filter(t => !t.is_project_root);
              // Build lookup maps
              const cubesTaskMap = {};
              allItems.forEach(t => { cubesTaskMap[t.id] = t; });
              const impByTitle = {};
              impItems.forEach(t => { impByTitle[t.title] = t; });

              let impEdits = {};

              // Sync start date changes: same start, imp keeps its own (longer) duration
              for (const [cubesTaskId, edit] of entries) {
                if (!edit.start_date) continue;
                const cubesTask = cubesTaskMap[cubesTaskId];
                if (!cubesTask || cubesTask.is_summary || cubesTask.is_project_root) continue;
                const impTask = impByTitle[cubesTask.title];
                if (!impTask) continue;
                const newStart = edit.start_date;
                const impDur = taskDur(impTask);
                const newEnd = impDur > 1 ? addWD(newStart, impDur - 1) : newStart;
                impEdits[impTask.id] = { ...(impEdits[impTask.id] || {}), start_date: newStart, end_date: newEnd };
                impEdits = cascadeEdits(impTask.id, newStart, newEnd, impEdits, impItems);
              }

              // Sync predecessor changes: map cubes predecessor to matching imp task
              for (const [cubesTaskId, edit] of entries) {
                if (!('predecessor_id' in edit)) continue;
                const cubesTask = cubesTaskMap[cubesTaskId];
                if (!cubesTask) continue;
                const impTask = impByTitle[cubesTask.title];
                if (!impTask) continue;
                if (edit.predecessor_id === null) {
                  impEdits[impTask.id] = { ...(impEdits[impTask.id] || {}), predecessor_id: null };
                } else {
                  const predCubes = allItems.find(t => t.id === edit.predecessor_id);
                  if (predCubes) {
                    const predImp = impByTitle[predCubes.title];
                    if (predImp) impEdits[impTask.id] = { ...(impEdits[impTask.id] || {}), predecessor_id: predImp.id };
                  }
                }
              }

              if (Object.keys(impEdits).length > 0) {
                await Promise.all(Object.entries(impEdits).map(([id, edit]) => api.updateTask(id, edit, user.id)));
                impSynced = Object.keys(impEdits).length;
              }
            }
          }

          const msg = impSynced > 0
            ? `${entries.length} Cubes task${entries.length > 1 ? 's' : ''} + ${impSynced} Imp task${impSynced > 1 ? 's' : ''} synced ✓`
            : `${entries.length} task${entries.length > 1 ? 's' : ''} updated ✓`;
          onToast(msg, 'success');
          setPendingEdits({});
          setPlanEditMode(false);
          onSaved();
        } catch (e) { onToast('Save failed: ' + e.message, 'error'); }
        setSavingEdits(false);
      }

      function cancelPlanEdit() {
        setPendingEdits({});
        setPlanEditMode(false);
      }

      // Hidden rows (admin can hide individual rows)
      const hiddenKey = `hiddenRows_${p.code}`;
      const [hiddenRows, setHiddenRows] = useState(() => {
        try { return JSON.parse(localStorage.getItem(hiddenKey) || '[]'); } catch { return []; }
      });
      const [contextMenu, setContextMenu] = useState(null); // {x, y, taskId, taskTitle}

      function hideRow(taskId) {
        const next = [...hiddenRows, taskId];
        setHiddenRows(next);
        localStorage.setItem(hiddenKey, JSON.stringify(next));
        setContextMenu(null);
      }
      function restoreAllRows() {
        setHiddenRows([]);
        localStorage.removeItem(hiddenKey);
      }

      const visItems = allItems.filter(t => !hiddenRows.includes(t.id || t.title));
      const msCount = visItems.filter(t => t.is_milestone).length;
      const summaryCount = visItems.filter(t => t.is_summary).length;
      const taskCount = visItems.filter(t => !t.is_summary && t.start !== t.end).length;

      // Per-table column picker — user overrides on top of admin defaults
      const COL_DEFS = [
        { key: 'show_wbs',           label: 'WBS' },
        { key: 'show_plan_pct',      label: 'Plan %' },
        { key: 'show_pct_edit',      label: 'Actual %' },
        { key: 'show_delay_days',    label: 'Delay (d)' },
        { key: 'show_progress_bar',  label: 'Progress' },
        { key: 'show_status',        label: 'Status' },
        { key: 'show_duration',      label: 'Dur.' },
        { key: 'show_type_column',   label: 'Type' },
        { key: 'show_plan_start',    label: 'Plan Start' },
        { key: 'show_actual_start',  label: 'Actual Start' },
        { key: 'show_plan_finish',   label: 'Plan Finish' },
        { key: 'show_actual_finish', label: 'Actual Finish' },
        { key: 'show_actual_edit',   label: '✎ Edit Actuals' },
        { key: 'show_extended_days', label: 'Ext. Days' },
        { key: 'show_predecessor',   label: 'Predecessor' },
        { key: 'show_risk_log_btn',  label: '⚠ Log Risk/Delay' },
      ];
      const [colOverrides, setColOverrides] = useState({});
      const [pickerOpen, setPickerOpen] = useState(false);

      function colVisible(key) {
        if (key in colOverrides) return colOverrides[key];
        return settings[key] !== false;
      }
      function toggleCol(key) {
        setColOverrides(o => ({ ...o, [key]: !colVisible(key) }));
      }
      function resetColsToDefault() {
        setColOverrides({});
      }
      const hiddenColCount = COL_DEFS.filter(c => !colVisible(c.key)).length;

      // Deactivated tasks
      const deactivatedKey = `deactivatedTasks_${p.code}`;
      const [deactivated, setDeactivated] = useState(() => {
        try { return JSON.parse(localStorage.getItem(deactivatedKey) || '[]'); } catch { return []; }
      });
      const [deactivateOpen, setDeactivateOpen] = useState(false);
      const [deactivateSelections, setDeactivateSelections] = useState({});

      function applyDeactivation() {
        const toDeactivate = Object.entries(deactivateSelections).filter(([,v]) => v).map(([k]) => k);
        const next = [...new Set([...deactivated, ...toDeactivate])];
        setDeactivated(next);
        localStorage.setItem(deactivatedKey, JSON.stringify(next));
        setDeactivateOpen(false);
        setDeactivateSelections({});
      }
      function reactivateTask(taskId) {
        const next = deactivated.filter(id => id !== taskId);
        setDeactivated(next);
        localStorage.setItem(deactivatedKey, JSON.stringify(next));
      }

      // Close context menu on click outside
      useEffect(() => {
        if (!contextMenu) return;
        const close = () => setContextMenu(null);
        document.addEventListener('click', close);
        return () => document.removeEventListener('click', close);
      }, [contextMenu]);

      useEffect(() => {
        if (!pickerOpen) return;
        const close = e => { if (!e.target.closest('.col-picker-panel')) setPickerOpen(false); };
        setTimeout(() => document.addEventListener('click', close), 10);
        return () => document.removeEventListener('click', close);
      }, [pickerOpen]);

      const sh = key => colVisible(key); // shorthand

      return (
        <div className="tt-section" onClick={() => contextMenu && setContextMenu(null)}>
          <div className="tt-hdr">
            <h3>Task Plan — {p.name}</h3>
            <span className="tt-meta">{taskCount} tasks · {summaryCount} summaries · {msCount} milestones</span>
            {isAdmin && hiddenRows.length > 0 && (
              <button onClick={restoreAllRows} style={{ marginLeft: 6, fontSize: 10, padding: '2px 8px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--s3)', color: 'var(--muted)', cursor: 'pointer' }}>
                ↺ Show {hiddenRows.length} hidden row{hiddenRows.length !== 1 ? 's' : ''}
              </button>
            )}
            {isAdmin && deactivated.length > 0 && (
              <span style={{ fontSize: 10, color: 'var(--muted)', marginLeft: 4 }}>
                {deactivated.length} deactivated
                <button onClick={() => { setDeactivated([]); localStorage.removeItem(deactivatedKey); }}
                  style={{ marginLeft: 5, fontSize: 9, padding: '1px 6px', borderRadius: 4, border: '1px solid var(--border)', background: 'transparent', color: 'var(--muted)', cursor: 'pointer' }}>↺ All</button>
              </span>
            )}
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 6, alignItems: 'center', position: 'relative' }}>
              {isAdmin && planEditMode && (
                <>
                  <span style={{ fontSize: 10, color: 'var(--a)', fontWeight: 700 }}>
                    {Object.keys(pendingEdits).length > 0 ? `${Object.keys(pendingEdits).length} task${Object.keys(pendingEdits).length > 1 ? 's' : ''} modified` : 'Edit mode — click Plan Start or Predecessor to change'}
                  </span>
                  <button onClick={savePendingEdits} disabled={savingEdits || Object.keys(pendingEdits).length === 0}
                    style={{ fontSize: 10, padding: '3px 10px', borderRadius: 5, border: 'none', background: 'var(--g)', color: '#fff', cursor: Object.keys(pendingEdits).length ? 'pointer' : 'not-allowed', fontWeight: 700, opacity: Object.keys(pendingEdits).length ? 1 : 0.5 }}>
                    {savingEdits ? '…' : '💾 Save Changes'}
                  </button>
                  <button onClick={cancelPlanEdit}
                    style={{ fontSize: 10, padding: '3px 9px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--s3)', color: 'var(--muted)', cursor: 'pointer' }}>
                    ✕ Cancel
                  </button>
                </>
              )}
              {isAdmin && !planEditMode && (
                <button onClick={() => setPlanEditMode(true)}
                  title={hasDependencies ? 'Edit start dates & dependencies — system will auto-cascade' : 'Edit start dates inline'}
                  style={{ fontSize: 10, padding: '3px 9px', borderRadius: 5, border: '1px solid var(--brand)', background: 'transparent', color: 'var(--brand)', cursor: 'pointer', fontWeight: 600 }}>
                  📅 Edit Plan
                </button>
              )}
              {isAdmin && (
                <button onClick={() => setDeactivateOpen(true)}
                  style={{ fontSize: 10, padding: '3px 9px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--s3)', color: 'var(--muted)', cursor: 'pointer', fontWeight: 600 }}>
                  ⊘ Deactivate Task
                </button>
              )}
              <div style={{ position: 'relative' }}>
                <button onClick={e => { e.stopPropagation(); setPickerOpen(o => !o); }}
                  style={{ fontSize: 10, padding: '3px 9px', borderRadius: 5, border: '1px solid var(--border)', background: pickerOpen ? 'var(--s3)' : 'var(--s2)', color: 'var(--muted)', cursor: 'pointer', fontWeight: 600 }}>
                  ⊞ Columns{hiddenColCount > 0 ? ` (${hiddenColCount} hidden)` : ''}
                </button>
                {pickerOpen && (
                  <div className="col-picker-panel" onClick={e => e.stopPropagation()}
                    style={{ position: 'absolute', right: 0, top: '110%', zIndex: 100, background: 'var(--s1)', border: '1px solid var(--border)', borderRadius: 9, boxShadow: '0 6px 24px rgba(0,0,0,.18)', padding: '12px 14px', minWidth: 180 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', marginBottom: 8 }}>Table Columns</div>
                    {COL_DEFS.map(({ key, label }) => (
                      <label key={key} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 5, cursor: 'pointer', fontSize: 12 }}>
                        <input type="checkbox" checked={colVisible(key)} onChange={() => toggleCol(key)} />
                        <span style={{ color: colVisible(key) ? 'var(--text)' : 'var(--muted)' }}>{label}</span>
                      </label>
                    ))}
                    <button onClick={resetColsToDefault} style={{ marginTop: 8, width: '100%', fontSize: 10, padding: '4px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--s3)', color: 'var(--muted)', cursor: 'pointer' }}>
                      Reset to defaults
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table className="msp">
              <thead><tr>
                {sh('show_wbs') && <th style={{ width: 44 }}>WBS</th>}
                {sh('show_plan_pct') && <th style={{ width: 68, textAlign: 'right' }}>Plan %</th>}
                {sh('show_pct_edit') && <th style={{ width: 58, textAlign: 'right' }}>Actual %</th>}

    // ── REPORT MODAL ──────────────────────────────────────────────────
    function ReportModal({ p, allProjects, onClose, onToast }) {
      const leaves = p.items.filter(t => !t.is_summary && !t.is_milestone && !t.is_project_root);
      const risks = leaves.filter(t => t.is_critical || taskSt(t).c === 'sc-critical' || taskSt(t).c === 'sc-late' || taskSt(t).c === 'sc-risk');
      // Per-task report comments (not saved to DB — report-time annotations)
      const [taskComments, setTaskComments] = useState({});
      function setTaskComment(taskId, val) { setTaskComments(c => ({ ...c, [taskId]: val })); }

      let maxDelayDays = 0;
      let delayReasonTasks = [];
      p.items.forEach(t => {
        const delay = t.extended_days || 0;
        if (t.is_critical && delay > 0) {
          if (delay > maxDelayDays) {
            maxDelayDays = delay;
            delayReasonTasks = [t.title];
          } else if (delay === maxDelayDays) {
            delayReasonTasks.push(t.title);
          }
        }
      });

      let pForecastEnd = null;

        const d = new Date(p.end);
        d.setDate(d.getDate() + maxDelayDays);
        pForecastEnd = d.toISOString().split('T')[0];
      }

      const expectedPct = Math.round(leaves.map(t => {
        const start = new Date(t.start);
        const end = new Date(t.end);
        const totalD = Math.max(1, days(start, end));
        const elap = clamp(days(start, TODAY.toISOString().split('T')[0]), 0, totalD);
        return Math.round(elap / totalD * 100);
      }).reduce((a, b) => a + b, 0) / Math.max(1, leaves.length)) || 0;

      const healthBg = h => h === 'G' ? '#dcfce7' : h === 'A' ? '#fef08a' : '#fee2e2';

            <thead>
              <tr style={{ background: '#f3f4f6' }}>
                {['Project','Start Date','End Date','Status','%','Health'].map(h => (
                  <th key={h} style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, textTransform: 'uppercase', fontSize: 10 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {(allProjects.length ? allProjects : [p]).map((proj, i) => (
                <tr key={i} style={{ background: i % 2 === 0 ? '#fff' : '#f9fafb' }}>
                  <td style={{ padding: '9px 10px', border: '1px solid #e5e7eb', fontWeight: 600 }}>{proj.name}</td>
                  <td style={{ padding: '9px 10px', border: '1px solid #e5e7eb' }}>{proj.start ? fmt(proj.start) : '—'}</td>
                  <td style={{ padding: '9px 10px', border: '1px solid #e5e7eb' }}>{proj.end ? fmt(proj.end) : '—'}</td>
                  <td style={{ padding: '9px 10px', border: '1px solid #e5e7eb', color: proj.health === 'G' ? '#166534' : proj.health === 'A' ? '#854d0e' : '#b91c1c', fontWeight: 700 }}>
                    {proj.health === 'G' ? 'On Track' : proj.health === 'A' ? 'At Risk' : 'Delayed'}
                  </td>
                  <td style={{ padding: '9px 10px', border: '1px solid #e5e7eb', fontWeight: 700 }}>{proj.progress}%</td>
                  <td style={{ padding: '9px 10px', border: '1px solid #e5e7eb' }}>
                    <span style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 4, fontWeight: 700, fontSize: 11, background: healthBg(proj.health), color: healthFg(proj.health) }}>
                      {ragLabel(proj.health)}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

          {/* Project Detail */}
          <h3 style={{ borderBottom: '1px solid #e5e7eb', paddingBottom: '6px', color: '#374151' }}>Project Detail — {p.name}</h3>
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: '24px', fontSize: '13px' }}>
            <tbody>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', width: '35%', fontWeight: 'bold' }}>Health Status</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}>
                  <span style={{ display: 'inline-block', padding: '4px 12px', borderRadius: '4px', fontWeight: 'bold', fontSize: '12px', backgroundColor: healthBg(p.health), color: healthFg(p.health) }}>{ragLabel(p.health)}</span>
                </td>
              </tr>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Start Date</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}>{p.start ? fmt(p.start) : '—'}</td>
              </tr>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Target End Date</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}>{fmt(p.end)}</td>
              </tr>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Progress vs Expected</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}><strong>{p.progress}%</strong> Actual vs <strong>{expectedPct}%</strong> Expected</td>

                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Forecasted End Date</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', color: pForecastEnd ? '#b91c1c' : '#166534', fontWeight: 'bold' }}>
                  {pForecastEnd ? `${fmt(pForecastEnd)} (Impacted by: ${delayReasonTasks.join(', ')})` : 'On Track (No major delays)'}
                </td>
              </tr>
            </tbody>
          </table>

          {/* Task Breakdown Table with Comments & Risks */}
          <h3 style={{ borderBottom: '1px solid #e5e7eb', paddingBottom: '6px', color: '#374151' }}>Task Breakdown — {p.name}</h3>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px', marginBottom: 24 }}>
            <thead>
              <tr style={{ background: '#f3f4f6' }}>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, fontSize: 10, textTransform: 'uppercase' }}>WBS</th>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, fontSize: 10, textTransform: 'uppercase' }}>Task Name</th>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, fontSize: 10, textTransform: 'uppercase' }}>Status</th>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, fontSize: 10, textTransform: 'uppercase' }}>Plan Start</th>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, fontSize: 10, textTransform: 'uppercase' }}>Plan Finish</th>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'center', fontWeight: 800, fontSize: 10, textTransform: 'uppercase' }}>%</th>
                <th style={{ padding: '9px 10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: 800, fontSize: 10, textTransform: 'uppercase', minWidth: 200 }}>Comments &amp; Risks</th>
              </tr>
            </thead>
            <tbody>
              {allTaskItems.map((t, i) => {
                const st = (!t.is_summary && !t.is_milestone) ? taskSt(t) : (t.pct >= 100 ? { l: 'Completed' } : { l: t.is_summary ? 'In Progress' : 'Upcoming' });
                const stColor = t.is_milestone ? '#5b67e8' : t.pct >= 100 ? '#166534' : (taskSt(t).c === 'sc-critical' ? '#b91c1c' : taskSt(t).c === 'sc-late' ? '#c2410c' : '#374151');
                const rowBg = t.level === 1 ? '#eef2ff' : t.is_summary ? '#f8fafc' : '#fff';
                const taskId = t.id || t.title;
                return (
                  <tr key={i} style={{ background: i % 2 === 0 ? rowBg : '#f9fafb' }}>

                    <td style={{ padding: '8px 10px', border: '1px solid #e5e7eb', fontWeight: t.is_summary || t.level === 1 ? 700 : 400, paddingLeft: 10 + (Math.max(0, (t.level || 1) - 1) * 12) }}>
                      {t.is_milestone ? '◆ ' : t.is_summary ? '▼ ' : ''}{t.title}
                    </td>
                    <td style={{ padding: '8px 10px', border: '1px solid #e5e7eb', color: stColor, fontWeight: 600, fontSize: 11 }}>{st.l}</td>
                    <td style={{ padding: '8px 10px', border: '1px solid #e5e7eb', fontSize: 11, color: '#6b7280' }}>{fmt(t.start)}</td>
                    <td style={{ padding: '8px 10px', border: '1px solid #e5e7eb', fontSize: 11, color: '#6b7280' }}>{t.is_milestone ? '—' : fmt(t.end)}</td>
                    <td style={{ padding: '8px 10px', border: '1px solid #e5e7eb', textAlign: 'center', fontWeight: 700, color: stColor }}>{Math.round(t.pct)}%</td>
                    <td style={{ padding: '4px 8px', border: '1px solid #e5e7eb' }}>
                      <input
                        style={{ width: '100%', border: 'none', outline: 'none', fontSize: 11, background: 'transparent', color: '#374151', fontFamily: 'Arial, sans-serif' }}

      );

      const reportRef = useRef();

      function handleCopy() {
        const htmlToCopy = reportRef.current.innerHTML;
        const blobHtml = new Blob([htmlToCopy], { type: 'text/html' });
        const textToCopy = reportRef.current.innerText;
        const blobText = new Blob([textToCopy], { type: 'text/plain' });

        try {
          navigator.clipboard.write([
            new ClipboardItem({
              'text/html': blobHtml,
              'text/plain': blobText
            })
          ]).then(() => onToast('Rich format copied to clipboard!', 'success'))
            .catch(() => {
              navigator.clipboard.writeText(textToCopy);
              onToast('Text copied to clipboard!', 'success');
            });

          navigator.clipboard.writeText(textToCopy);
          onToast('Text copied to clipboard!', 'success');

          </div>
