                                  ? <input type="number" defaultValue={row.pct??''} key={row.id+'_pct_'+row.pct} placeholder="%" min="0" max="100"
                                      onBlur={e => { const v=e.target.value.trim(); updateTeamRow(pi,phi,ri,'pct',v===''?null:parseFloat(v)); }}
                                      onKeyDown={e => e.key==='Enter'&&e.target.blur()}
                                      style={{ width:52, background:row.pct==null?'rgba(99,102,241,.05)':'var(--s2)', border:row.pct==null?'1px dashed var(--border)':'1px solid var(--border)', borderRadius:4, padding:'3px 4px', color:row.pct==null?'#94a3b8':'var(--fg)', fontSize:11, textAlign:'center' }} />
                                  : <span style={{ fontWeight:700, color:row.pct==null?'#94a3b8':phaseColor(row.pct) }}>{row.pct!=null?row.pct+'%':'TBD'}</span>}
                              </td>
                              <td style={{ padding:'4px 4px', textAlign:'center' }}>
                                {canEdit
                                  ? <input type="number" defaultValue={row.days??''} key={row.id+'_days_'+row.days} placeholder="TBD" min="0"
                                      onBlur={e => { const v=e.target.value.trim(); updateTeamRow(pi,phi,ri,'days',v===''?null:parseFloat(v)); }}
                                      onKeyDown={e => e.key==='Enter'&&e.target.blur()}
                                      style={{ width:52, background:row.days==null?'rgba(99,102,241,.05)':'var(--s2)', border:row.days==null?'1px dashed var(--border)':'1px solid var(--border)', borderRadius:4, padding:'3px 4px', color:row.days==null?'#94a3b8':'var(--fg)', fontSize:11, textAlign:'center' }} />
                                  : <span style={{ color:row.days==null?'#94a3b8':'var(--fg)' }}>{row.days??'TBD'}</span>}
                              </td>
                              <td style={{ padding:'4px 4px', textAlign:'center' }}>
                                {canEdit
                                  ? <input type="date" defaultValue={row.start??''} key={row.id+'_start_'+row.start}
                                      onBlur={e => { const v=e.target.value; updateTeamRow(pi,phi,ri,'start',v===''?null:v); }}
                                      style={{ background:row.start==null?'rgba(99,102,241,.05)':'var(--s2)', border:row.start==null?'1px dashed var(--border)':'1px solid var(--border)', borderRadius:4, padding:'3px 5px', color:row.start==null?'#94a3b8':'var(--fg)', fontSize:11 }} />
                                  : <span style={{ color:row.start==null?'#94a3b8':'var(--fg)' }}>{row.start?fmt(row.start):'TBD'}</span>}
                              </td>
                              <td style={{ padding:'4px 8px', textAlign:'center' }}>
                                {endAuto
                                  ? <span style={{ color:'#6366f1', fontWeight:600, fontSize:11, whiteSpace:'nowrap' }}>{row.end?fmt(row.end):'—'} ⟵</span>
                                  : canEdit
                                    ? <input type="date" defaultValue={row.end??''} key={row.id+'_end_'+row.end}
                                        onBlur={e => { const v=e.target.value; updateTeamRow(pi,phi,ri,'end',v===''?null:v); }}
                                        style={{ background:row.end==null?'rgba(99,102,241,.05)':'var(--s2)', border:row.end==null?'1px dashed var(--border)':'1px solid var(--border)', borderRadius:4, padding:'3px 5px', color:row.end==null?'#94a3b8':'var(--fg)', fontSize:11 }} />
                                    : <span style={{ color:row.end==null?'#94a3b8':'var(--fg)' }}>{row.end?fmt(row.end):'TBD'}</span>}
                              </td>
                              {canEdit && <td style={{ padding:'4px', textAlign:'center' }}><button onClick={() => update(n => { n.projects[pi].phases[phi].team_rows.splice(ri,1); })} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontSize:14 }}>✕</button></td>}
                            </tr>
                          );
                        })}
                        {/* Release rows (indented, amber) */}
                        {phase.releases.map((rel, ri) => {
                          const endAuto = rel.days != null && !!rel.start;
                          return (
                            <tr key={rel.id} style={{ borderTop:'1px solid var(--border)', background:'rgba(245,158,11,.04)' }}>
                              <td style={{ padding:'5px 6px 5px 28px', fontWeight:700, color:'#b45309' }}>
                                <span style={{ marginRight:4 }}>📦</span>
                                {canEdit
                                  ? <input value={rel.name} onChange={e => update(n => { n.projects[pi].phases[phi].releases[ri].name = e.target.value; })}
                                      style={{ background:'transparent', border:'none', outline:'none', fontWeight:700, color:'#b45309', fontSize:12, width:130 }} />
                                  : rel.name}
                              </td>
                              <td /><td />
                              <td style={{ padding:'4px 4px', textAlign:'center' }}>
                                {canEdit
                                  ? <input type="number" defaultValue={rel.days??''} key={rel.id+'_days_'+rel.days} placeholder="TBD" min="0"
                                      onBlur={e => { const v=e.target.value.trim(); updateRelease(pi,phi,ri,'days',v===''?null:parseFloat(v)); }}
                                      onKeyDown={e => e.key==='Enter'&&e.target.blur()}
                                      style={{ width:52, background:rel.days==null?'rgba(245,158,11,.08)':'var(--s2)', border:rel.days==null?'1px dashed #f59e0b':'1px solid var(--border)', borderRadius:4, padding:'3px 4px', color:rel.days==null?'#94a3b8':'var(--fg)', fontSize:11, textAlign:'center' }} />
                                  : <span style={{ color:rel.days==null?'#94a3b8':'var(--fg)' }}>{rel.days??'TBD'}</span>}
                              </td>
                              <td style={{ padding:'4px 4px', textAlign:'center' }}>
                                {canEdit
                                  ? <input type="date" defaultValue={rel.start??''} key={rel.id+'_start_'+rel.start}
                                      onBlur={e => { const v=e.target.value; updateRelease(pi,phi,ri,'start',v===''?null:v); }}
                                      style={{ background:rel.start==null?'rgba(245,158,11,.08)':'var(--s2)', border:rel.start==null?'1px dashed #f59e0b':'1px solid var(--border)', borderRadius:4, padding:'3px 5px', color:rel.start==null?'#94a3b8':'var(--fg)', fontSize:11 }} />
                                  : <span style={{ color:rel.start==null?'#94a3b8':'var(--fg)' }}>{rel.start?fmt(rel.start):'TBD'}</span>}
                              </td>
                              <td style={{ padding:'4px 8px', textAlign:'center' }}>
                                {endAuto
                                  ? <span style={{ color:'#6366f1', fontWeight:600, fontSize:11, whiteSpace:'nowrap' }}>{rel.end?fmt(rel.end):'—'} ⟵</span>
                                  : canEdit
                                    ? <input type="date" defaultValue={rel.end??''} key={rel.id+'_end_'+rel.end}
                                        onBlur={e => { const v=e.target.value; updateRelease(pi,phi,ri,'end',v===''?null:v); }}
                                        style={{ background:rel.end==null?'rgba(245,158,11,.08)':'var(--s2)', border:rel.end==null?'1px dashed #f59e0b':'1px solid var(--border)', borderRadius:4, padding:'3px 5px', color:rel.end==null?'#94a3b8':'var(--fg)', fontSize:11 }} />
                                    : <span style={{ color:rel.end==null?'#94a3b8':'var(--fg)' }}>{rel.end?fmt(rel.end):'TBD'}</span>}
                              </td>
                              {canEdit && <td style={{ padding:'4px', textAlign:'center' }}><button onClick={() => update(n => { n.projects[pi].phases[phi].releases.splice(ri,1); })} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontSize:14 }}>✕</button></td>}
                            </tr>
                          );
                        })}
                      </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* Hiring Plan */}
            {proj.show_hiring && (
              <div style={{ borderTop:'2px solid var(--border)', background:'rgba(34,197,94,.02)' }}>
                <div style={{ display:'flex', alignItems:'center', padding:'8px 14px', background:'rgba(34,197,94,.05)', borderBottom:'1px solid var(--border)' }}>
                  <span style={{ fontWeight:700, fontSize:13 }}>👥 Hiring Plan</span>
                  {canEdit && <button onClick={() => update(n => { n.projects[pi].hiring.push({id:uid(),role:'New Role',q1:'',q2:'',q3:'',q4:''}); })}
                    style={{ marginLeft:'auto', fontSize:10, padding:'3px 9px', borderRadius:4, border:'1px solid #22c55e', background:'transparent', color:'#22c55e', cursor:'pointer', fontWeight:600 }}>+ Role</button>}
                </div>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                  <thead>
                    <tr style={{ background:'var(--s2)', fontSize:10, textTransform:'uppercase', color:'var(--muted)', letterSpacing:'.05em' }}>
                      <th style={{ padding:'6px 12px', textAlign:'left' }}>Role</th>
                      {['Q1 2026','Q2 2026','Q3 2026','Q4 2026'].map(q => <th key={q} style={{ padding:'6px 10px', textAlign:'center', width:100, fontWeight:700 }}>{q}</th>)}
                      {canEdit && <th style={{ width:36 }} />}
                    </tr>
                  </thead>
                  <tbody>
                    {(proj.hiring||[]).map((h, hi) => (
                      <tr key={h.id} style={{ borderTop:'1px solid var(--border)' }}>
                        <td style={{ padding:'6px 12px', fontWeight:700 }}>
                          {canEdit
                            ? <input value={h.role} onChange={e => update(n => { n.projects[pi].hiring[hi].role = e.target.value; })}
                                style={{ background:'transparent', border:'none', outline:'none', fontWeight:700, color:'var(--fg)', fontSize:12 }} />
                            : h.role}
                        </td>
                        {['q1','q2','q3','q4'].map(q => (
                          <td key={q} style={{ padding:'4px 8px', textAlign:'center' }}>
                            {canEdit
                              ? <input type="text" defaultValue={h[q]??''} key={h.id+'_'+q} placeholder="—"
                                  onBlur={e => update(n => { n.projects[pi].hiring[hi][q] = e.target.value.trim()||''; })}
                                  style={{ width:80, background:'transparent', border:'1px solid var(--border)', borderRadius:4, padding:'3px 5px', textAlign:'center', fontSize:11, color:'var(--fg)' }} />
                              : <span>{h[q]||'—'}</span>}
                          </td>
                        ))}
                        {canEdit && <td style={{ padding:'4px', textAlign:'center' }}><button onClick={() => update(n => { n.projects[pi].hiring.splice(hi,1); })} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontSize:14 }}>✕</button></td>}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      }

      return (
        <div style={{ position:'fixed', inset:0, background:'var(--bg)', zIndex:2000, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {/* ── HEADER ── */}
          <div style={{ borderBottom:'1px solid var(--border)', background:'var(--s1)', flexShrink:0 }}>
            {/* Title row */}
            <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 20px 8px' }}>
              <span style={{ fontSize:22 }}>🏗</span>
              <div>
                <div style={{ fontWeight:800, fontSize:15 }}>{plan.program_name||'CUBES 2026'}</div>
                <div style={{ fontSize:11, color:'var(--muted)' }}>Program Plan · {plan.projects.length} Projects</div>
              </div>
              <div style={{ marginLeft:'auto', display:'flex', gap:8, alignItems:'center' }}>
                {savedOk && <span style={{ fontSize:11, color:'#22c55e', fontWeight:600 }}>✓ Saved</span>}
                {canEdit && (
                  <button onClick={savePlan} disabled={saving}
                    style={{ fontSize:12, padding:'5px 14px', borderRadius:6, border:'1px solid var(--brand)', background:saving?'var(--s2)':'rgba(99,102,241,.15)', color:'var(--brand)', cursor:saving?'not-allowed':'pointer', fontWeight:700 }}>
                    {saving?'⏳…':'💾 Save Plan'}
                  </button>
                )}
                <button onClick={onClose} style={{ fontSize:20, background:'none', border:'none', color:'var(--muted)', cursor:'pointer', padding:'0 4px' }}>✕</button>
              </div>
            </div>
            {/* Per-project cards row */}
            <div style={{ display:'flex', gap:8, padding:'0 20px 10px', overflowX:'auto', flexWrap:'nowrap' }}>
              {plan.projects.map((proj, pi) => {
                const pct = calcProjectPct(proj);
                const clr = phaseColor(pct);
                return (
                  <div key={proj.id} style={{ flexShrink:0, background:'var(--bg)', borderRadius:8, padding:'7px 12px', border:'1px solid var(--border)', minWidth:140 }}>
                    <div style={{ fontSize:10, color:'var(--muted)', fontWeight:600, marginBottom:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:170 }}>
                      <span style={{ background:'rgba(99,102,241,.12)', color:'var(--brand)', borderRadius:4, padding:'0 5px', marginRight:4, fontWeight:800 }}>P{pi+1}</span>
                      {proj.name}
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <div style={{ flex:1, maxWidth:70, height:6, background:'var(--s2)', borderRadius:3, overflow:'hidden' }}>
                        <div style={{ width:(pct||0)+'%', height:'100%', background:clr, borderRadius:3, transition:'width .4s' }} />
                      </div>
                      <span style={{ fontWeight:800, fontSize:13, color:clr }}>{pct!=null?pct+'%':'TBD'}</span>
                    </div>
                    {proj.weight!=null && <div style={{ fontSize:9, color:'var(--muted)', marginTop:3 }}>Weight: {proj.weight}%</div>}
                  </div>
                );
              })}
              {/* Overall weighted card */}
              <div style={{ flexShrink:0, background: overall!=null ? 'rgba(99,102,241,.07)' : 'var(--bg)', borderRadius:8, padding:'7px 12px', border: overall!=null ? '1px solid rgba(99,102,241,.3)' : '1px dashed var(--border)', minWidth:150 }}>
                <div style={{ fontSize:10, fontWeight:700, color:'var(--muted)', marginBottom:4 }}>⚖ Overall (weighted)</div>
                {overall!=null
                  ? <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <div style={{ flex:1, maxWidth:70, height:6, background:'var(--s2)', borderRadius:3, overflow:'hidden' }}>
                        <div style={{ width:overall+'%', height:'100%', background:overall>=75?'#22c55e':overall>=40?'#6366f1':'#f59e0b', borderRadius:3, transition:'width .4s' }} />
                      </div>
                      <span style={{ fontWeight:800, fontSize:14 }}>{overall}%</span>
                    </div>
                  : <span style={{ fontSize:11, color:'#94a3b8', fontStyle:'italic' }}>TBD — set weights ↓</span>}
              </div>
            </div>
          </div>

          {/* ── SCROLLABLE BODY ── */}
          <div style={{ flex:1, overflowY:'auto', padding:'24px 28px' }}>

            {/* ══ SECTION 1: GANTT (read-only) ══════════════════════════════ */}
            <div style={{ marginBottom:28, borderRadius:10, border:'1px solid var(--border)', background:'var(--s1)', overflow:'hidden' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 16px', background:'rgba(99,102,241,.05)', borderBottom:'1px solid var(--border)' }}>
                <span style={{ fontWeight:700, fontSize:13 }}>📅 Projects Roadmap — Gantt</span>
                <span style={{ fontSize:11, color:'var(--muted)', background:'rgba(34,197,94,.08)', color:'#16a34a', padding:'1px 8px', borderRadius:10, fontWeight:600 }}>Read Only</span>
                <div style={{ marginLeft:'auto', display:'flex', gap:4 }}>
                  {['quarterly','monthly'].map(m => (
                    <button key={m} onClick={() => setGanttMode(m)}
                      style={{ fontSize:10, padding:'3px 10px', borderRadius:4, border:'1px solid var(--border)', cursor:'pointer',
                        background:ganttMode===m?'var(--brand)':'transparent', color:ganttMode===m?'#fff':'var(--muted)', fontWeight:ganttMode===m?700:400 }}>
                      {m.charAt(0).toUpperCase()+m.slice(1)}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ overflowX:'auto', padding:'12px 16px 16px' }}>
                <div style={{ minWidth:600 }}>
                  {/* Column headers */}
                  <div style={{ display:'flex', marginBottom:0 }}>
                    <div style={{ width:210, flexShrink:0, borderRight:'1px solid var(--border)' }} />
                    {cols.map((c,i) => (
                      <div key={i} style={{ flex:1, textAlign:'center', fontSize:10, fontWeight:700, color:'var(--muted)', padding:'4px 2px', background:'var(--s2)',
                        borderLeft:'1px solid var(--border)', borderTop:'1px solid var(--border)', borderBottom:'1px solid var(--border)',
                        borderRight:i===cols.length-1?'1px solid var(--border)':'none' }}>
                        {c.label}
                      </div>
                    ))}
                  </div>
                  {/* Project rows */}
                  {plan.projects.map((proj, pi) => {
                    const projPct = calcProjectPct(proj);
                    let allS=[], allE=[];
                    proj.phases.forEach(ph => {
                      ph.team_rows.forEach(r => { if(r.start) allS.push(r.start); if(r.end) allE.push(r.end); });
                      ph.releases.forEach(r => { if(r.start) allS.push(r.start); if(r.end) allE.push(r.end); });
                    });
                    const projStart = allS.length ? allS.sort()[0] : null;
                    const projEnd = allE.length ? allE.sort().reverse()[0] : null;
                    const bp = barPos(projStart, projEnd, cols);
                    const isExpanded = !!ganttExpanded[proj.id];
                    return (
                      <React.Fragment key={proj.id}>
                        {/* Project row */}
                        <div style={{ display:'flex', alignItems:'stretch', borderBottom:'1px solid var(--border)', background:pi%2===0?'transparent':'rgba(0,0,0,.01)' }}>
                          <div style={{ width:210, flexShrink:0, display:'flex', alignItems:'center', gap:6, padding:'6px 10px', borderRight:'1px solid var(--border)', cursor:'pointer' }}
                            onClick={() => setGanttExpanded(g => ({ ...g, [proj.id]: !g[proj.id] }))}>
                            <span style={{ fontSize:9, color:'var(--muted)', width:10 }}>{isExpanded?'▼':'▶'}</span>
                            <div style={{ overflow:'hidden' }}>
                              <div style={{ fontSize:11, fontWeight:700, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--fg)', maxWidth:170 }}>{proj.name}</div>
                              <div style={{ fontSize:10, fontWeight:600, color:phaseColor(projPct) }}>{projPct!=null?projPct+'%':'TBD — click to fill'}</div>
                            </div>
                          </div>
                          <div style={{ flex:1, position:'relative', height:44 }}>
                            {cols.map((c,ci) => <div key={ci} style={{ position:'absolute', left:(ci/cols.length*100)+'%', top:0, bottom:0, width:1, background:'var(--border)', opacity:0.4 }} />)}
                            {tPct!==null && <div style={{ position:'absolute', left:tPct+'%', top:0, bottom:0, width:2, borderLeft:'2px dashed #ef4444', zIndex:5 }} />}
                            {bp ? (
                              <>
                                <div style={{ position:'absolute', left:bp.left+'%', width:bp.width+'%', top:'20%', height:'60%', background:phaseColor(projPct), opacity:0.15, borderRadius:3 }} />
                                <div style={{ position:'absolute', left:bp.left+'%', width:(bp.width*(projPct||0)/100)+'%', top:'20%', height:'60%', background:phaseColor(projPct), opacity:0.9, borderRadius:3, display:'flex', alignItems:'center', justifyContent:'flex-end', overflow:'hidden', minWidth:projPct>0?2:0 }}>
                                  {projPct>15 && <span style={{ fontSize:9, color:'#fff', fontWeight:700, paddingRight:4 }}>{projPct}%</span>}
                                </div>
                              </>
                            ) : (
                              <div style={{ position:'absolute', left:'5%', right:'5%', top:'22%', height:'56%', border:'1px dashed #94a3b8', borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                <span style={{ fontSize:9, color:'#94a3b8' }}>TBD — fill data below ↓</span>
                              </div>
                            )}
                          </div>
                        </div>
                        {/* Phase sub-rows */}
                        {isExpanded && proj.phases.map((ph, phi) => {
                          let phS=[], phE=[];
                          ph.team_rows.forEach(r => { if(r.start) phS.push(r.start); if(r.end) phE.push(r.end); });
                          const pStart = phS.length?phS.sort()[0]:null, pEnd = phE.length?phE.sort().reverse()[0]:null;
                          const pbp = barPos(pStart, pEnd, cols);
                          const phPct = calcPhasePct(ph);
                          return (
                            <div key={ph.id} style={{ display:'flex', alignItems:'stretch', borderBottom:'1px solid var(--border)', background:'rgba(99,102,241,.03)' }}>
                              <div style={{ width:210, flexShrink:0, display:'flex', alignItems:'center', padding:'4px 10px 4px 26px', borderRight:'1px solid var(--border)' }}>
                                <div>
                                  <div style={{ fontSize:10, color:'var(--muted)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:160 }}>↳ {ph.name}</div>
                                  <div style={{ fontSize:9, fontWeight:600, color:phaseColor(phPct) }}>{phPct!=null?phPct+'%':'TBD'}</div>
                                </div>
                              </div>
                              <div style={{ flex:1, position:'relative', height:30 }}>
                                {cols.map((c,ci) => <div key={ci} style={{ position:'absolute', left:(ci/cols.length*100)+'%', top:0, bottom:0, width:1, background:'var(--border)', opacity:0.3 }} />)}
                                {tPct!==null && <div style={{ position:'absolute', left:tPct+'%', top:0, bottom:0, width:2, borderLeft:'2px dashed #ef4444', zIndex:5 }} />}
                                {pbp && (
                                  <>
                                    <div style={{ position:'absolute', left:pbp.left+'%', width:pbp.width+'%', top:'15%', height:'70%', background:phaseColor(phPct), opacity:0.12, borderRadius:2 }} />
                                    <div style={{ position:'absolute', left:pbp.left+'%', width:(pbp.width*(phPct||0)/100)+'%', top:'15%', height:'70%', background:phaseColor(phPct), opacity:0.8, borderRadius:2 }} />
                                  </>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </React.Fragment>
                    );
                  })}
                  {/* Legend */}
                  <div style={{ display:'flex', gap:16, padding:'10px 0 0', justifyContent:'flex-end', flexWrap:'wrap' }}>
                    {[['#22c55e','Completed'],['#6366f1','In Progress'],['#f59e0b','At Risk'],['#94a3b8','TBD']].map(([c,l]) => (
                      <div key={l} style={{ display:'flex', alignItems:'center', gap:4, fontSize:10, color:'var(--muted)' }}>
                        <div style={{ width:14, height:8, background:c, borderRadius:2 }} />{l}
                      </div>
                    ))}
                    <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:10, color:'var(--muted)' }}>
                      <div style={{ width:2, height:14, borderLeft:'2px dashed #ef4444' }} />Today
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* ══ SECTION 2: PROGRAM SUMMARY (read-only) ════════════════════ */}
            <div style={{ marginBottom:28, borderRadius:10, border:'1px solid var(--border)', background:'var(--s1)', overflow:'hidden' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 16px', background:'rgba(99,102,241,.05)', borderBottom:'1px solid var(--border)' }}>
                <span style={{ fontWeight:700, fontSize:13 }}>📊 Program Summary</span>
                <span style={{ fontSize:11, background:'rgba(34,197,94,.08)', color:'#16a34a', padding:'1px 8px', borderRadius:10, fontWeight:600 }}>Read Only</span>
              </div>
              <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                <thead>
                  <tr style={{ background:'var(--s2)', fontSize:10, textTransform:'uppercase', color:'var(--muted)', letterSpacing:'.05em' }}>
                    <th style={{ padding:'7px 8px', width:28 }} />
                    {['#','Project','Description','Phases','Overall %','Start','End'].map(h => (
                      <th key={h} style={{ padding:'7px 12px', textAlign:h==='Phases'||h==='Overall %'?'center':'left', fontWeight:700 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {plan.projects.map((proj, i) => {
                    const pct = calcProjectPct(proj);
                    let allS2=[], allE2=[];
                    proj.phases.forEach(ph => { ph.team_rows.forEach(r => { if(r.start) allS2.push(r.start); if(r.end) allE2.push(r.end); }); });
                    const eS = allS2.length?allS2.sort()[0]:null;
                    const lE = allE2.length?allE2.sort().reverse()[0]:null;
                    const isExpanded = !!summaryExpanded[proj.id];
                    const toggle = () => setSummaryExpanded(s => ({ ...s, [proj.id]: !s[proj.id] }));
                    return (
                      <React.Fragment key={proj.id}>
                        {/* Project row */}
                        <tr style={{ borderTop:'1px solid var(--border)', cursor:'pointer', background: isExpanded ? 'rgba(99,102,241,.04)' : 'transparent' }}
                          onClick={toggle}>
                          <td style={{ padding:'8px 8px', textAlign:'center', color:'var(--muted)', fontSize:11 }}>{isExpanded ? '▼' : '▶'}</td>
                          <td style={{ padding:'8px 12px', color:'var(--muted)', fontWeight:700, width:30 }}>{i+1}</td>
                          <td style={{ padding:'8px 12px', fontWeight:700, color:'var(--brand)' }}>{proj.name}</td>
                          <td style={{ padding:'8px 12px', color:'var(--muted)', fontSize:11 }}>{proj.description||'—'}</td>
                          <td style={{ padding:'8px 12px', textAlign:'center', fontWeight:600 }}>{proj.phases.length}</td>
                          <td style={{ padding:'8px 12px' }}>
                            {pct!=null
                              ? <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                                  <div style={{ width:70, height:7, background:'var(--s2)', borderRadius:4, overflow:'hidden' }}>
                                    <div style={{ width:pct+'%', height:'100%', background:phaseColor(pct), borderRadius:4 }} />
                                  </div>
                                  <span style={{ fontWeight:800, color:phaseColor(pct) }}>{pct}%</span>
                                </div>
                              : <span style={{ color:'#94a3b8', fontStyle:'italic', fontSize:11 }}>TBD</span>}
                          </td>
                          <td style={{ padding:'8px 12px', color:'var(--muted)', fontSize:11 }}>{eS?fmt(eS):'—'}</td>
                          <td style={{ padding:'8px 12px', color:'var(--muted)', fontSize:11 }}>{lE?fmt(lE):'—'}</td>
                        </tr>
                        {/* Phase breakdown rows */}
                        {isExpanded && (
                          <tr>
                            <td colSpan={8} style={{ padding:'0', background:'rgba(99,102,241,.02)', borderBottom:'2px solid rgba(99,102,241,.15)' }}>
                              <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11 }}>
                                <thead>
                                  <tr style={{ background:'rgba(99,102,241,.06)', fontSize:10, textTransform:'uppercase', color:'var(--muted)', letterSpacing:'.04em' }}>
                                    <th style={{ padding:'5px 14px 5px 36px', textAlign:'left', width:200 }}>Phase</th>
                                    <th style={{ padding:'5px 12px', textAlign:'center', width:80 }}>Teams</th>
                                    <th style={{ padding:'5px 12px', textAlign:'center', width:90 }}>% Done</th>
                                    <th style={{ padding:'5px 12px', textAlign:'left', width:110 }}>Start</th>
                                    <th style={{ padding:'5px 12px', textAlign:'left', width:110 }}>End</th>
                                    <th style={{ padding:'5px 12px', textAlign:'left' }}>Team Status Summary</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {proj.phases.map((ph, phi) => {
                                    const phPct = calcPhasePct(ph);
                                    let phS=[], phE=[];
                                    ph.team_rows.forEach(r => { if(r.start) phS.push(r.start); if(r.end) phE.push(r.end); });
                                    const phStart = phS.length?phS.sort()[0]:null;
                                    const phEnd = phE.length?phE.sort().reverse()[0]:null;
                                    // build status summary chips
                                    const statusGroups = {};
                                    ph.team_rows.forEach(r => {
                                      const s = r.status || 'TBD';
                                      if (!statusGroups[s]) statusGroups[s] = [];
                                      statusGroups[s].push(r.team);
                                    });
                                    return (
                                      <tr key={ph.id} style={{ borderTop:'1px solid var(--border)', background: phi%2===0?'transparent':'rgba(0,0,0,.01)' }}>
                                        <td style={{ padding:'6px 14px 6px 36px', fontWeight:600 }}>
                                          <span style={{ fontSize:10, color:'var(--brand)', marginRight:6, fontWeight:800 }}>Ph{phi+1}</span>
                                          {ph.name}
                                        </td>
                                        <td style={{ padding:'6px 12px', textAlign:'center', color:'var(--muted)' }}>{ph.team_rows.length}</td>
                                        <td style={{ padding:'6px 12px' }}>
                                          {phPct!=null
                                            ? <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                                                <div style={{ flex:1, maxWidth:60, height:6, background:'var(--s2)', borderRadius:3, overflow:'hidden' }}>
                                                  <div style={{ width:phPct+'%', height:'100%', background:phaseColor(phPct), borderRadius:3 }} />
                                                </div>
                                                <span style={{ fontWeight:700, color:phaseColor(phPct), minWidth:30 }}>{phPct}%</span>
                                              </div>
                                            : <span style={{ color:'#94a3b8' }}>TBD</span>}
                                        </td>
                                        <td style={{ padding:'6px 12px', color:'var(--muted)' }}>{phStart?fmt(phStart):'—'}</td>
                                        <td style={{ padding:'6px 12px', color:'var(--muted)' }}>{phEnd?fmt(phEnd):'—'}</td>
                                        <td style={{ padding:'6px 12px' }}>
                                          <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                                            {Object.entries(statusGroups).map(([st, teams]) => (
                                              <span key={st} style={{ fontSize:10, padding:'1px 7px', borderRadius:10, background:statusColor(st)+'18', color:statusColor(st), fontWeight:600, whiteSpace:'nowrap' }}>
                                                {teams.join(', ')} — {st}
                                              </span>
                                            ))}
                                          </div>
                                          {ph.releases && ph.releases.length > 0 && (
                                            <div style={{ marginTop:4, fontSize:10, color:'#b45309' }}>
                                              📦 {ph.releases.length} release{ph.releases.length>1?'s':''}: {ph.releases.map(r=>r.name).join(' · ')}
                                            </div>
                                          )}
                                        </td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* ══ SECTION 2.5: PROJECT WEIGHTS (for weighted overall %) ════════ */}
            <div style={{ marginBottom:28, borderRadius:10, border:'1px solid var(--border)', background:'var(--s1)', overflow:'hidden' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 16px', background:'rgba(245,158,11,.05)', borderBottom:'1px solid var(--border)' }}>
                <span style={{ fontWeight:700, fontSize:13 }}>⚖ Project Weights</span>
                <span style={{ fontSize:11, color:'#b45309' }}>Define the importance % of each project — must total 100% to show weighted Overall</span>
                {(() => {
                  const wSum = plan.projects.reduce((s,p) => s+(p.weight||0), 0);
                  const allSet = plan.projects.every(p => p.weight!=null && p.weight>0);
                  return allSet
                    ? <span style={{ marginLeft:'auto', fontSize:11, fontWeight:700, color: Math.abs(wSum-100)<0.5 ? '#22c55e' : '#ef4444' }}>
                        {Math.abs(wSum-100)<0.5 ? `✓ Total: ${wSum}%` : `⚠ Total: ${wSum}% (must be 100%)`}
                      </span>
                    : <span style={{ marginLeft:'auto', fontSize:11, color:'#94a3b8' }}>Not all weights set — Overall shows TBD</span>;
                })()}
              </div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:0 }}>
                {plan.projects.map((proj, pi) => (
                  <div key={proj.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 16px', borderRight:'1px solid var(--border)', borderBottom:'1px solid var(--border)', flex:'1 1 200px', minWidth:180 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:'var(--muted)', marginBottom:2 }}>
                        <span style={{ background:'rgba(99,102,241,.12)', color:'var(--brand)', borderRadius:3, padding:'0 5px', marginRight:4, fontWeight:800 }}>P{pi+1}</span>
                        {proj.name}
                      </div>
                      <div style={{ fontSize:10, color:'var(--muted)' }}>Current: {calcProjectPct(proj)!=null ? calcProjectPct(proj)+'%' : 'TBD'}</div>
                    </div>
                    {canEdit
                      ? <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                          <input type="number" min="0" max="100"
                            defaultValue={proj.weight??''} key={proj.id+'_w_'+proj.weight}
                            placeholder="0"
                            onBlur={e => { const v=e.target.value.trim(); update(n => { n.projects[pi].weight = v===''?null:parseFloat(v); }); }}
                            onKeyDown={e => e.key==='Enter'&&e.target.blur()}
                            style={{ width:55, background:proj.weight==null?'rgba(245,158,11,.08)':'var(--s2)', border:proj.weight==null?'1px dashed #f59e0b':'1px solid var(--border)', borderRadius:4, padding:'4px 6px', textAlign:'center', fontSize:13, fontWeight:700, color:proj.weight==null?'#94a3b8':'var(--fg)' }} />
                          <span style={{ fontSize:12, color:'var(--muted)' }}>%</span>
                        </div>
                      : <span style={{ fontWeight:800, fontSize:14, color: proj.weight!=null ? 'var(--brand)' : '#94a3b8' }}>
                          {proj.weight!=null ? proj.weight+'%' : 'TBD'}
                        </span>}
                  </div>
                ))}
              </div>
            </div>

            {/* ══ SECTION 3: DIVIDER + Project Details ══════════════════════ */}
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, paddingBottom:12, borderBottom:'2px dashed var(--border)' }}>
              <div style={{ flex:1, height:1, background:'var(--border)' }} />
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:14 }}>✏️</span>
                <span style={{ fontWeight:800, fontSize:14, color:'var(--fg)' }}>Project Details</span>
                <span style={{ fontSize:11, color:'var(--muted)' }}>— PM / Admin Data Entry</span>
              </div>
              <div style={{ flex:1, height:1, background:'var(--border)' }} />
              {canEdit && (
                <button onClick={() => {
                  const newId = uid();
                  update(n => { n.projects.push({ id:newId, name:'New Project', description:'', show_hiring:false,
                    phases:[{ id:uid(), name:'Phase 1', team_rows:[
                      {id:uid(),team:'BA',status:'TBD',pct:null,days:null,start:null,end:null},
                      {id:uid(),team:'UI/UX',status:'TBD',pct:null,days:null,start:null,end:null},
                      {id:uid(),team:'FE',status:'TBD',pct:null,days:null,start:null,end:null},
                      {id:uid(),team:'BE',status:'TBD',pct:null,days:null,start:null,end:null},
                      {id:uid(),team:'QC',status:'TBD',pct:null,days:null,start:null,end:null},
                    ], releases:[]}], hiring:[] }); });
                }}
                  style={{ fontSize:11, padding:'6px 14px', borderRadius:6, border:'1px dashed #22c55e', background:'rgba(34,197,94,.06)', color:'#16a34a', cursor:'pointer', fontWeight:700, flexShrink:0 }}>
                  + New Project
                </button>
              )}
            </div>

            {/* ══ SECTION 4: PROJECT DETAILS (editable flat tables) ══════════ */}
            {plan.projects.map((proj, pi) => renderProjectFlat(proj, pi))}

          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(() => {
        try { const u = localStorage.getItem('pmUser'); return u ? JSON.parse(u) : null; } catch { return null; }
      });
      const [projects, setProjects] = useState([]);
      const [selected, setSelected] = useState(new Set());
      const [isLight, setIsLight] = useState(true);
      // Start in loading state when a user session already exists (avoids blank flash on refresh)
      const [loading, setLoading] = useState(() => {
        try { return !!localStorage.getItem('pmUser'); } catch { return false; }
      });
      const [syncing, setSyncing] = useState(false);
      const [toast, setToast] = useState(null);
      const [showAdmin, setShowAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('users');
      const [pendingCR, setPendingCR] = useState(0);
      const [showWizard, setShowWizard] = useState(false);
      const [showResHub, setShowResHub] = useState(false);
      const [showProjExt, setShowProjExt] = useState(false);
      const [showC2026, setShowC2026] = useState(false);
      const [dashSettings, setDashSettings] = useState(DEFAULT_SETTINGS);
      const [showReportPicker, setShowReportPicker] = useState(false);
      const [reportProject, setReportProject] = useState(null);
      const [showDbViewer, setShowDbViewer] = useState(false);

      async function loadProjects(currentUser, silent = false) {
        const u = currentUser || user;
        if (!u) return;
        if (!silent) setLoading(true);
        try {
          const raw = await api.portfolio(u.username);
          setProjects(transformData(raw));
        } catch (e) {
          showToast('Failed to load: ' + e.message, 'error');
        }
        if (!silent) setLoading(false);
      }

      // One-time setup: light mode
      useEffect(() => {
        document.documentElement.classList.toggle('light', true);
      }, []);

      // Re-run whenever the logged-in user changes (login OR logout)
      useEffect(() => {
        if (!user) {
          setDashSettings(DEFAULT_SETTINGS);
          setPendingCR(0);
          return;
        }
        // Page-refresh path: user was pre-loaded from localStorage, loadProjects not yet called
        loadProjects(user);
        // Merge role settings + per-user overrides
        api.getDashboardSettings().then(s => {
          const roleKey = user.role === 'admin' ? null : user.role;
          const roleSettings = roleKey && s[roleKey] ? s[roleKey] : {};
          const userOverride = user.settings_override || {};
          setDashSettings({ ...DEFAULT_SETTINGS, ...roleSettings, ...userOverride });
        }).catch(() => {});
        // Poll pending change requests every 30s for admins
        if (user.role === 'admin') {
          const refresh = () => api.pendingCRCount().then(r => setPendingCR(r.pending_count)).catch(() => { });
          refresh();
          const iv = setInterval(refresh, 30000);
          return () => clearInterval(iv);
        }
      }, [user?.id]);

      // Expose reload function for admin panel project deletions/renames
      React.useEffect(() => {
        window.__reloadPortfolio = () => loadProjects(user);
        return () => { delete window.__reloadPortfolio; };
      }, [user]);

      // Expose all projects for report modal
      React.useEffect(() => {
        window.__allProjects = projects;
      }, [projects]);

      function handleLogin(u) {
        setLoading(true);   // show "Connecting…" on first render — no blank flash
        setUser(u);
        loadProjects(u);
        api.getDashboardSettings().then(s => {
          const roleKey = u.role === 'admin' ? null : u.role;
          const roleSettings = roleKey && s[roleKey] ? s[roleKey] : {};
          const userOverride = u.settings_override || {};
          setDashSettings({ ...DEFAULT_SETTINGS, ...roleSettings, ...userOverride });
        }).catch(() => {});
        if (u.role === 'admin') {
          api.pendingCRCount().then(r => setPendingCR(r.pending_count)).catch(() => {});
        }
      }

      function handleLogout() {
        localStorage.removeItem('pmUser');
        setUser(null);
        setProjects([]);
        setSelected(new Set());
      }

      function toggleMode() {
        const next = !isLight;
        setIsLight(next);
        document.documentElement.classList.toggle('light', next);
      }

      function showToast(msg, type = 'info') {
        setToast({ msg, type, key: Date.now() });
      }

      // Show login screen if not authenticated
      if (!user) return <LoginScreen onLogin={handleLogin} />;

      // Module visibility helper — admins always see everything
      const userModules = user.allowed_modules && user.allowed_modules.length
        ? user.allowed_modules
        : ['project_page', 'action_items', 'intelligence', 'project_ext', 'c2026', 'resources'];
      const canSee = (key) => {
        if (user.role === 'admin') return true;
        // standup and report are admin-only regardless of modules
        if (key === 'standup' || key === 'report') return false;
        return userModules.includes(key);
      };
      // CUBES 2026 only mode: auto-open on first render
      const c2026Only = user.role !== 'admin' && userModules.length === 1 && userModules[0] === 'c2026';
      React.useEffect(() => { if (c2026Only) setShowC2026(true); }, [c2026Only]);

      const visible = projects;
      const active = selected.size ? visible.filter(p => selected.has(p.name)) : visible;
      const initials = user.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

      async function handleAddBlank() {
        setShowWizard(true);
      }

      async function handleUpload(file) {
        try {
          showToast("Uploading and parsing MPP...", "info");
          setLoading(true);
          await api.uploadMpp(file, user.id);
          showToast("MPP Uploaded and parsed!", "success");
          await loadProjects(user);
        } catch (e) { showToast(e.message, "error"); setLoading(false); }
      }

      async function handleSyncMpp() {
        setSyncing(true);
        showToast('Reading .mpp files from: OneDrive\u2009› Desktop\u2009› Cubes\u2009› Project Plans ...', 'info');
        try {
          const result = await api.refreshMpp(user.id);
          showToast(result.message || 'Sync complete!', 'success');
          await loadProjects(user);
        } catch (e) { showToast('Sync failed: ' + e.message, 'error'); }
        setSyncing(false);
      }

      return (
        <div className="shell" style={!canSee('project_page') ? { gridTemplateColumns: '1fr' } : {}}>
          {canSee('project_page') && (
            <Sidebar projects={visible} selected={selected}
              onSelect={setSelected}
              onClear={() => setSelected(new Set())}
              onExport={() => window.print()}
              user={user}
              onAddBlank={handleAddBlank}
              onUpload={handleUpload}
              onSyncMpp={handleSyncMpp}
              syncing={syncing}
              settings={dashSettings} />
          )}
          <div className="main">
            <div className="topbar">
              <div>
                <div className="tb-title">
                  Portfolio Dashboard
                  <span style={{ display: 'inline-block', marginLeft: 8, padding: '1px 7px', borderRadius: 5, fontSize: 10, fontWeight: 700, background: 'rgba(91,103,232,.12)', color: 'var(--brand)', border: '1px solid rgba(91,103,232,.25)', verticalAlign: 'middle' }}>v1.6</span>
                </div>
                <div className="tb-sub">{active.length} project{active.length !== 1 ? 's' : ''} · Today: {fmt(TODAY)}</div>
              </div>
              <div className="grow" />
              <span style={{ fontSize: 11, color: 'var(--muted)' }}>{fmtS(TODAY)}</span>
              {canSee('project_ext') && (
                <button className="admin-btn" style={{ background: 'linear-gradient(135deg,rgba(34,197,94,.1),rgba(16,185,129,.08))', borderColor: 'rgba(34,197,94,.3)', color: '#16a34a' }}
                  onClick={() => setShowProjExt(true)} title="Project Extension">
                  📋 Project Ext.
                </button>
              )}
              {canSee('c2026') && user.c2026_access !== 'no_access' && (
                <button className="admin-btn" style={{ background: 'linear-gradient(135deg,rgba(99,102,241,.15),rgba(129,140,248,.08))', borderColor: 'rgba(99,102,241,.4)', color: '#6366f1' }}
                  onClick={() => setShowC2026(true)} title="CUBES 2026 Program Plan">
                  🏗 CUBES 2026
                </button>
              )}
              {canSee('standup') && (
                <button className="admin-btn" style={{ background: 'linear-gradient(135deg,rgba(249,115,22,.12),rgba(234,88,12,.08))', borderColor: 'rgba(249,115,22,.35)', color: '#ea580c' }}
                  onClick={() => { const el = document.getElementById('pm-standup-widget'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }} title="PM Daily Standup">
                  📋 Standup
                </button>
              )}
              {canSee('report') && (
                <button className="admin-btn" style={{ background: 'linear-gradient(135deg,rgba(245,158,11,.12),rgba(217,119,6,.08))', borderColor: 'rgba(245,158,11,.35)', color: '#b45309' }}
                  onClick={() => setShowReportPicker(true)} title="Generate Executive Report">
                  📧 Generate Report
                </button>
              )}
              {canSee('resources') && (
                <button className="admin-btn" style={{ background: 'linear-gradient(135deg,rgba(99,102,241,.15),rgba(129,140,248,.1))', borderColor: 'rgba(99,102,241,.35)', color: 'var(--brand)' }}
                  onClick={() => setShowResHub(true)} title="Open Resource Hub">
                  📊 Resources
                </button>
              )}
              {user.role === 'admin' && (
                <div style={{ position: 'relative' }}>
                  <button className="admin-btn" onClick={() => setShowDbViewer(true)} style={{ background: 'linear-gradient(135deg,rgba(107,114,128,.12),rgba(75,85,99,.08))', borderColor: 'rgba(107,114,128,.3)', color: 'var(--muted)' }} title="View Database">🗄 DB</button>
                </div>
              )}
              {user.role === 'admin' && (
                <div style={{ position: 'relative' }}>
                  <button className="admin-btn" onClick={() => { setAdminTab('users'); setShowAdmin(true); }}>👥 Admin</button>
                  {pendingCR > 0 && (
                    <span className="notif-badge" style={{ cursor: 'pointer' }}
                      onClick={() => { setAdminTab('requests'); setShowAdmin(true); }}>
                      {pendingCR}
                    </span>
                  )}
                </div>
              )}
              <div className="user-chip">
                <div className="user-av">{initials}</div>
                <div><div className="user-nm">{user.name}</div><div className="user-role">{user.role}</div></div>
              </div>
              <button className="logout-btn" onClick={handleLogout} title="Sign out">Sign out</button>
              <button className="mode-btn" onClick={toggleMode} title={isLight ? 'Switch to dark mode' : 'Switch to light mode'}>
                {isLight ? '🌙' : '☀️'}
              </button>
            </div>
            <div className="content">
              <SettingsCtx.Provider value={dashSettings}>
              {!canSee('project_page')
                ? <div className="empty" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, paddingTop:60 }}>
                    <div style={{ fontSize:48 }}>🔒</div>
                    <div style={{ fontWeight:700, fontSize:16 }}>Project Dashboard not available</div>
                    <div style={{ color:'var(--muted)', fontSize:13 }}>You don't have access to the project page. Use the buttons above to access your assigned modules.</div>
                  </div>
                : loading
                  ? <div className="loading">Connecting to MS Project backend…</div>
                  : active.length === 0
                    ? <div className="empty">No projects match.<br />Click a project in the sidebar to view it.</div>
                    : <>
                        <KpiRow projects={active} />
                        {canSee('action_items') && <ActionItemsBox projects={active} user={user} />}
                        <ExecutiveSummary projects={visible} user={user} />
                        {canSee('standup') && <StandupWidget projects={active} user={user} />}
                        {active.map(p => (
                          <div key={p.name} id={`proj-${p.code}`}>
                            <ProjectSection p={p}
                              onSaved={() => loadProjects(null, true)}
                              onToast={showToast}
                              user={user} />
                          </div>
                        ))}
                      </>
              }
              {canSee('project_page') && dashSettings.show_audit_log !== false && <AuditLog user={user} />}
              </SettingsCtx.Provider>
            </div>
          </div>
          {toast && <Toast key={toast.key} message={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
          {showAdmin && <AdminPanel currentUser={user} onClose={() => { setShowAdmin(false); setPendingCR(0); api.pendingCRCount().then(r => setPendingCR(r.pending_count)).catch(() => { }); }} onToast={showToast} initialTab={adminTab} />}
          {showWizard && <CreateProjectWizard user={user} onClose={() => setShowWizard(false)} onCreated={() => { showToast('Project created successfully!', 'success'); loadProjects(user); }} />}
          {showResHub && <ResourceHub user={user} onClose={() => setShowResHub(false)} />}
          {showProjExt && <ProjectExtension user={user} onClose={() => setShowProjExt(false)} />}
          {showC2026 && <Cubes2026Plan user={user} onClose={() => setShowC2026(false)} />}
          {showReportPicker && (
            <ReportProjectPicker
              projects={visible}
              user={user}
              onClose={() => { setShowReportPicker(false); setReportProject(null); }}
              onToast={showToast}
            />
          )}
          {showDbViewer && <DbViewerModal user={user} onClose={() => setShowDbViewer(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
