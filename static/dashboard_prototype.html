<!doctype html>
<html lang="en" class="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CUBES Project Monitoring</title>

  <!-- React 18 + Babel CDN (no Node.js / build step required) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── DARK ──────────────────────────────────────────────────── */
    :root {
      --bg: #060912;
      --s1: #0c1122;
      --s2: #111827;
      --s3: #19243a;
      --s4: #1f2d45;
      --border: #1b2d4a;
      --border2: #2a3f5f;
      --text: #e2e8ff;
      --muted: #64748b;
      --dim: #2e4060;
      --brand: #818cf8;
      --brand2: #a5b4fc;
      --g: #34d399;
      --a: #fbbf24;
      --r: #fb7185;
      --g-bg: rgba(52, 211, 153, .12);
      --g-bd: rgba(52, 211, 153, .3);
      --a-bg: rgba(251, 191, 36, .12);
      --a-bd: rgba(251, 191, 36, .3);
      --r-bg: rgba(251, 113, 133, .12);
      --r-bd: rgba(251, 113, 133, .3);
      --rr: 12px;
    }

    /* ── LIGHT (default) ───────────────────────────────────────── */
    html.light {
      --bg: #f0f4f8;
      --s1: #ffffff;
      --s2: #f8fafc;
      --s3: #edf1f7;
      --s4: #dde5ef;
      --border: #d1dae6;
      --border2: #b8c5d6;
      --text: #1a2332;
      --muted: #5a7090;
      --dim: #8fa4be;
      --brand: #5b67e8;
      --brand2: #4048c4;
      --g: #16a367;
      --a: #c47c08;
      --r: #d42f48;
      --g-bg: rgba(22, 163, 103, .10);
      --g-bd: rgba(22, 163, 103, .3);
      --a-bg: rgba(196, 124, 8, .10);
      --a-bd: rgba(196, 124, 8, .28);
      --r-bg: rgba(212, 47, 72, .10);
      --r-bd: rgba(212, 47, 72, .28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body,
    #root {
      height: 100%;
      overflow: hidden
    }

    body {
      background: var(--bg);
      color: var(--text);
      font: 13px/1.6 'Segoe UI', system-ui, sans-serif;
      transition: background .2s, color .2s
    }

    .shell {
      display: grid;
      grid-template-columns: 272px 1fr;
      height: 100vh
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    .sb-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border)
    }

    .prism-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      border-radius: 9px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      flex-shrink: 0
    }

    .sb-brand {
      font-weight: 800;
      font-size: 14px;
      background: linear-gradient(90deg, var(--brand), var(--brand2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .sb-sub {
      font-size: 10px;
      color: var(--muted)
    }

    .sb-block {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border)
    }

    .sb-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 6px
    }

    .sb-hint {
      font-size: 10px;
      color: var(--dim);
      padding: 2px 14px 6px;
      font-style: italic
    }

    .sb-search {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 12px;
      outline: none
    }

    .sb-search:focus {
      border-color: var(--brand)
    }

    .sb-search::placeholder {
      color: var(--dim)
    }

    select.sb-sel {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 11px;
      cursor: pointer;
      outline: none
    }

    .proj-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px
    }

    .proj-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 9px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: .15s;
      margin-bottom: 3px;
      user-select: none
    }

    .proj-row:hover {
      background: var(--s3);
      border-color: var(--border)
    }

    .proj-row.sel {
      background: rgba(91, 103, 232, .1);
      border-color: rgba(91, 103, 232, .4)
    }

    html:not(.light) .proj-row.sel {
      background: rgba(129, 140, 248, .1);
      border-color: rgba(129, 140, 248, .4)
    }

    .pcheck {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid var(--border2);
      flex-shrink: 0;
      display: grid;
      place-items: center
    }

    .proj-row.sel .pcheck {
      background: var(--brand);
      border-color: var(--brand)
    }

    .proj-row.sel .pcheck::after {
      content: '✓';
      color: #fff;
      font-size: 10px;
      font-weight: 700
    }

    .pdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .pname {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .pmeta {
      font-size: 10px;
      color: var(--muted)
    }

    .rag {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0
    }

    .rag-G {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-bd)
    }

    .rag-A {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-bd)
    }

    .rag-R {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-bd)
    }

    .sb-foot {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px
    }

    .btn {
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--s3);
      color: var(--text);
      transition: .15s;
      flex: 1;
      text-align: center
    }

    .btn:hover {
      border-color: var(--brand);
      color: var(--brand)
    }

    .btn.white {
      background: #fff;
      color: #111;
      border-color: #cbd5e1
    }

    .mode-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--s2);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0
    }

    /* MAIN */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .tb-title {
      font-weight: 700;
      font-size: 14px
    }

    .tb-sub {
      font-size: 11px;
      color: var(--muted)
    }

    .grow {
      flex: 1
    }

    select.ctrl {
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      outline: none
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    /* KPI */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px
    }

    .kpi {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--rr);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      overflow: hidden
    }

    .kpi::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px
    }

    .kpi.kb::before {
      background: linear-gradient(90deg, var(--brand), var(--brand2))
    }

    .kpi.kg::before {
      background: linear-gradient(90deg, var(--g), #6ee7b7)
    }

    .kpi.ka::before {
      background: linear-gradient(90deg, var(--a), #fde68a)
    }

    .kpi.kr::before {
      background: linear-gradient(90deg, var(--r), #fca5a5)
    }

    .kpi.kx::before {
      background: linear-gradient(90deg, var(--muted), var(--border2))
    }

    .kl {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .kv {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1
    }

    .ks {
      font-size: 10px;
      color: var(--dim)
    }

    /* PROJECT CARD */
    .proj-section {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--rr)
    }

    .ps-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--s2);
      border-bottom: 1px solid var(--border);
      border-radius: var(--rr) var(--rr) 0 0;
      flex-wrap: wrap;
      row-gap: 8px
    }

    .ps-av {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 14px;
      flex-shrink: 0
    }

    .ps-nm {
      font-size: 14px;
      font-weight: 700
    }

    .ps-dt {
      font-size: 11px;
      color: var(--muted)
    }

    .ps-mx {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      margin-left: auto;
      flex-wrap: wrap
    }

    .ps-mv {
      font-size: 22px;
      font-weight: 800;
      line-height: 1
    }

    .ps-ml {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase
    }

    .ps-bar {
      height: 4px;
      background: var(--s3)
    }

    .ps-bfill {
      height: 100%;
      transition: width .5s
    }

    .push-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px
    }

    .pending-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(234, 179, 8, .15);
      color: #92610a;
      border: 1px solid rgba(234, 179, 8, .35)
    }

    html:not(.light) .pending-badge {
      color: #fde68a
    }

    .push-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      background: var(--brand);
      color: #fff;
      white-space: nowrap
    }

    .push-btn:disabled {
      opacity: .35;
      cursor: default
    }

    /* SUMMARY STRIP */
    .sumstrip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border)
    }

    .sumc {
      padding: 10px 16px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .sumc:last-child {
      border-right: none
    }

    .suml {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
      margin-bottom: 2px
    }

    .sumv {
      font-size: 13px;
      font-weight: 700
    }

    /* Health reasoning */
    .health-reason {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5
    }

    /* AI INSIGHTS */
    .insights-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--s2)
    }

    .insights-hd {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .insights-hd::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .insights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .insight-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden
    }

    .ic-hdr {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .ic-body {
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .ic-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 11px
    }

    .ic-row:last-child {
      border-bottom: none
    }

    .ic-row:hover {
      background: var(--s3)
    }

    .ic-row.ic-row-hover:hover .ic-admin-btns {
      opacity: 1 !important
    }

    .ic-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0
    }

    .ic-tag {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0
    }

    .ic-days {
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right
    }

    .ic-empty {
      padding: 12px;
      font-size: 11px;
      color: var(--dim);
      text-align: center
    }

    /* TASK TABLE */
    .tt-section {
      border-bottom: 1px solid var(--border)
    }

    .tt-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 9px;
      border-bottom: 1px solid var(--border);
      background: var(--s2)
    }

    .tt-hdr h3 {
      font-size: 12px;
      font-weight: 700
    }

    .tt-meta {
      font-size: 11px;
      color: var(--muted)
    }

    table.msp {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    table.msp th {
      padding: 7px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--border2);
      white-space: nowrap;
      background: var(--s2)
    }

    table.msp td {
      padding: 0;
      border-bottom: 1px solid var(--border);
      vertical-align: middle
    }

    .td-pad {
      padding: 0 10px;
      display: flex;
      align-items: center;
      height: 100%
    }

    .tr-root td {
      background: rgba(91, 103, 232, .09) !important;
      border-top: 2px solid rgba(91, 103, 232, .3) !important;
      border-bottom: 2px solid rgba(91, 103, 232, .2) !important
    }

    .tr-root:hover td {
      background: rgba(91, 103, 232, .14) !important
    }

    html:not(.light) .tr-root td {
      background: rgba(129, 140, 248, .1) !important;
      border-top: 2px solid rgba(129, 140, 248, .35) !important;
      border-bottom: 2px solid rgba(129, 140, 248, .2) !important
    }

    html:not(.light) .tr-root:hover td {
      background: rgba(129, 140, 248, .16) !important
    }

    .tr-phase td {
      background: rgba(0, 0, 0, .03) !important;
      border-left: 3px solid rgba(0, 0, 0, .08) !important
    }

    .tr-phase:hover td {
      background: rgba(0, 0, 0, .06) !important
    }

    html:not(.light) .tr-phase td {
      background: rgba(255, 255, 255, .03) !important;
      border-left: 3px solid rgba(255, 255, 255, .1) !important
    }

    html:not(.light) .tr-phase:hover td {
      background: rgba(255, 255, 255, .06) !important
    }

    .tr-task:hover td {
      background: var(--s3) !important
    }

    .tr-ms td {
      background: rgba(91, 103, 232, .03) !important
    }

    .tr-ms:hover td {
      background: rgba(91, 103, 232, .07) !important
    }

    table.msp tr td {
      height: 34px
    }

    table.msp tr.tr-root td {
      height: 42px
    }

    table.msp tr.tr-phase td {
      height: 36px
    }

    .name-cell {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 0;
      padding: 0 10px
    }

    .tree-conn {
      font-size: 10px;
      color: var(--dim);
      white-space: pre;
      flex-shrink: 0;
      font-family: monospace
    }

    .row-icon {
      flex-shrink: 0;
      margin-right: 5px;
      font-size: 12px;
      width: 14px;
      text-align: center
    }

    .row-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tr-root .row-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--brand)
    }

    .tr-phase .row-name {
      font-weight: 700;
      color: var(--text)
    }

    .tr-task .row-name {
      color: var(--text)
    }

    .tr-ms .row-name {
      color: var(--brand);
      font-style: italic
    }

    .type-badge {
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      display: inline-block;
      min-width: 62px;
      text-align: center
    }

    .t-sum {
      background: rgba(91, 103, 232, .1);
      color: var(--brand);
      border: 1px solid rgba(91, 103, 232, .22)
    }

    .t-task {
      background: rgba(100, 116, 139, .1);
      color: var(--muted);
      border: 1px solid rgba(100, 116, 139, .2)
    }

    .t-ms {
      background: rgba(91, 103, 232, .08);
      color: var(--brand2);
      border: 1px solid rgba(91, 103, 232, .18)
    }

    .pbar-wrap {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .pbar {
      width: 52px;
      height: 5px;
      background: var(--s3);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0
    }

    .pfill {
      height: 100%;
      border-radius: 999px
    }

    .sc {
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      display: inline-block;
      min-width: 76px;
      text-align: center;
      padding: 2px 4px;
      border-radius: 4px
    }

    .sc-done     { color: var(--g) }
    .sc-on       { color: var(--brand) }
    .sc-risk     { color: var(--a) }
    .sc-late     { color: #c2410c }
    html:not(.light) .sc-late { color: #fb923c }
    .sc-overdue  { color: var(--r) }
    .sc-critical { color: var(--r) }
    .sc-behind   { color: #f97316 }
    .sc-ns       { color: var(--muted) }
    .sc-ms-ok    { color: var(--g) }
    .sc-ms-miss  { color: var(--r) }
    .sc-ms-up    { color: var(--brand2) }

    /* INLINE EDITOR */
    .override-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      background: rgba(234, 179, 8, .15);
      color: #92610a;
      border: 1px solid rgba(234, 179, 8, .35);
      margin-left: 5px
    }

    html:not(.light) .override-badge {
      color: #fde68a
    }

    .pct-edit-cell {
      cursor: pointer;
      transition: .15s
    }

    .pct-edit-cell:hover {
      background: rgba(91, 103, 232, .12) !important;
      border-radius: 4px
    }

    /* fixed layout so every row's number + edit icon lands in the same columns */
    /* % cell: value LEFT-aligned, edit icon RIGHT-aligned, both always in same column */
    .pct-cell-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 10px
    }

    .pct-num {
      font-size: 11px;
      font-weight: 700;
      text-align: left;
      flex-shrink: 0;
      min-width: 32px
    }

    .pct-edit-icon {
      font-size: 10px;
      opacity: .3;
      width: 14px;
      flex-shrink: 0;
      text-align: center;
      flex: 0
    }

    .pct-edit-cell:hover .pct-edit-icon {
      opacity: 1;
      color: var(--brand)
    }

    .pct-editor {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px
    }

    .pct-editor input {
      width: 44px;
      padding: 2px 5px;
      border: 1.5px solid var(--brand);
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      background: var(--s1);
      outline: none;
      text-align: center
    }

    .pe-ok {
      padding: 2px 8px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      background: var(--brand);
      color: #fff
    }

    .pe-cancel {
      padding: 2px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      background: var(--s3);
      color: var(--muted)
    }

    .pe-reset {
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 10px;
      background: transparent;
      color: var(--dim)
    }

    /* GANTT */
    .gantt-section {
      padding: 14px 16px
    }

    .sec-hd {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .sec-hd::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .g-row {
      display: flex;
      align-items: center;
      min-height: 24px
    }

    .g-row.g-row-root {
      min-height: 34px;
      border-top: 2px solid rgba(91, 103, 232, .2);
      border-bottom: 1px solid rgba(91, 103, 232, .1);
      background: rgba(91, 103, 232, .04);
      border-radius: 4px;
      margin-bottom: 2px
    }

    .g-row.g-row-phase {
      min-height: 28px;
      background: rgba(0, 0, 0, .02)
    }

    html:not(.light) .g-row.g-row-root {
      background: rgba(129, 140, 248, .06);
      border-top-color: rgba(129, 140, 248, .3)
    }

    html:not(.light) .g-row.g-row-phase {
      background: rgba(255, 255, 255, .03)
    }

    .g-left {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding-right: 6px
    }

    .g-lbl {
      flex: 1;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .g-lbl.l1 {
      font-weight: 800;
      font-size: 12px;
      color: var(--brand)
    }

    .g-lbl.l2 {
      font-weight: 700;
      color: var(--text);
      padding-left: 8px
    }

    .g-lbl.l3 {
      color: var(--muted);
      padding-left: 20px
    }

    .g-lbl.l4 {
      color: var(--dim);
      padding-left: 32px
    }

    .g-pct {
      font-size: 10px;
      font-weight: 700;
      min-width: 34px;
      text-align: right;
      flex-shrink: 0;
      color: var(--muted)
    }

    .g-track {
      flex: 1;
      position: relative;
      height: 18px;
      display: flex;
      align-items: center
    }

    .g-row-root .g-track {
      height: 22px
    }

    .g-row-phase .g-track {
      height: 18px
    }

    /* Full-span bar: shows total duration as a pill, with fill inside showing completion */
    .g-bar {
      position: absolute;
      height: 100%;
      border-radius: 6px;
      overflow: hidden;
      min-width: 4px;
      /* Track / empty portion */
      background: rgba(100, 116, 139, .15);
      border: 1px solid rgba(100, 116, 139, .2);
    }

    html.light .g-bar {
      background: rgba(100, 116, 139, .12);
      border-color: rgba(100, 116, 139, .18)
    }

    .g-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      border-radius: 5px;
      transition: width .4s ease;
      box-shadow: inset -2px 0 3px rgba(0, 0, 0, .18);
      /* slightly lighter right tip for a "progress bar" feel */
    }

    .g-bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: rgba(255, 255, 255, .25);
      border-radius: 0 4px 4px 0;
    }

    /* Summary bars — slightly thinner fill for visual hierarchy */
    .g-bar.g-bar-summary {
      height: 70%;
      top: 15%;
      border-radius: 4px
    }

    .g-bar.g-bar-root {
      height: 80%;
      top: 10%;
      border-radius: 6px
    }

    .g-ms {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 12px;
      height: 12px;
      border: 2.5px solid rgba(255, 255, 255, .8)
    }

    .g-dhdr {
      display: flex;
      margin-bottom: 6px
    }

    .g-dspacer {
      width: 240px;
      flex-shrink: 0
    }

    .g-dates {
      flex: 1;
      position: relative;
      height: 16px;
      overflow: hidden
    }

    .g-tick {
      position: absolute;
      font-size: 9px;
      color: var(--dim);
      transform: translateX(-50%);
      border-left: 1px dashed var(--border2);
      padding-left: 3px;
      height: 100%;
      display: flex;
      align-items: center
    }

    .g-tick-today {
      color: var(--r) !important;
      font-weight: 800 !important;
      border-left-color: rgba(210, 40, 55, .6) !important
    }

    /* AUDIT LOG */
    .audit-section {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--rr)
    }

    .audit-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: var(--s2);
      border-radius: var(--rr) var(--rr) 0 0;
      cursor: pointer;
      user-select: none
    }

    .audit-hdr:hover {
      background: var(--s3)
    }

    .audit-hdr h3 {
      font-size: 12px;
      font-weight: 700;
      flex: 1
    }

    table.atbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px
    }

    table.atbl th {
      padding: 6px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border2);
      background: var(--s2);
      white-space: nowrap
    }

    table.atbl td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border)
    }

    table.atbl tr:hover td {
      background: var(--s3)
    }

    .a-synced {
      color: var(--g);
      font-weight: 700
    }

    .a-pending {
      color: var(--a);
      font-weight: 700
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 9999;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .2);
      transition: opacity .4s;
      pointer-events: none;
      max-width: 400px
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--dim);
      font-size: 14px
    }

    .loading {
      padding: 40px;
      text-align: center;
      color: var(--muted)
    }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10000
    }

    .login-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      width: 460px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .15)
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px
    }

    .login-brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .04em
    }

    .login-sub {
      font-size: 11px;
      color: var(--muted)
    }

    .login-card h2 {
      font-size: 22px;
      font-weight: 800;
      margin: 0
    }

    .login-card p {
      font-size: 13px;
      color: var(--muted);
      margin: 0
    }

    .login-err {
      background: rgba(185, 28, 28, .1);
      border: 1px solid rgba(185, 28, 28, .3);
      color: #b91c1c;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600
    }

    html.light .login-err {
      color: #991b1b
    }

    .login-input {
      padding: 10px 14px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--s2);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: .15s
    }

    .login-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(91, 103, 232, .15)
    }

    .login-btn {
      padding: 11px;
      border-radius: 9px;
      background: var(--brand);
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .15s
    }

    .login-btn:hover {
      background: var(--brand2)
    }

    .login-btn:disabled {
      opacity: .5;
      cursor: default
    }

    .login-hint {
      font-size: 11px;
      color: var(--dim);
      text-align: center
    }

    /* ── USER CHIP (topbar) ── */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px 5px 5px;
      border-radius: 999px;
      background: var(--s2);
      border: 1px solid var(--border);
      cursor: default
    }

    .user-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0
    }

    .user-nm {
      font-size: 12px;
      font-weight: 600
    }

    .user-role {
      font-size: 10px;
      color: var(--muted)
    }

    .logout-btn {
      padding: 4px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      cursor: pointer
    }

    .logout-btn:hover {
      border-color: var(--r);
      color: var(--r)
    }

    .admin-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      background: rgba(91, 103, 232, .12);
      color: var(--brand);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid rgba(91, 103, 232, .25)
    }

    .admin-btn:hover {
      background: rgba(91, 103, 232, .2)
    }

    /* ── ADMIN PANEL ── */
    .adm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 9000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 16px;
      overflow-y: auto
    }

    .adm-panel {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 900px;
      max-width: 100%;
      display: flex;
      flex-direction: column
    }

    .adm-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--s2);
      border-radius: 16px 16px 0 0
    }

    .adm-hdr h2 {
      font-size: 15px;
      font-weight: 800;
      flex: 1
    }

    .adm-close {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      display: grid;
      place-items: center
    }

    .adm-close:hover {
      border-color: var(--r);
      color: var(--r)
    }

    .adm-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .adm-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px
    }

    table.utbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    table.utbl th {
      padding: 7px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border2);
      background: var(--s2);
      white-space: nowrap
    }

    table.utbl td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border)
    }

    table.utbl tr:hover td {
      background: var(--s3)
    }

    .role-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700
    }

    .rb-admin {
      background: rgba(91, 103, 232, .12);
      color: var(--brand);
      border: 1px solid rgba(91, 103, 232, .3)
    }

    .rb-editor {
      background: rgba(22, 163, 74, .1);
      color: var(--g);
      border: 1px solid var(--g-bd)
    }

    .rb-viewer {
      background: var(--s3);
      color: var(--muted);
      border: 1px solid var(--border2)
    }

    .rb-inactive {
      background: rgba(185, 28, 28, .08);
      color: var(--r);
      border: 1px solid rgba(185, 28, 28, .2)
    }

    .adm-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px
    }

    .adm-form-title {
      grid-column: 1/-1;
      font-size: 12px;
      font-weight: 700
    }

    .adm-field {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .adm-field label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase
    }

    .adm-field input,
    .adm-field select {
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--s1);
      color: var(--text);
      font-size: 12px;
      outline: none
    }

    .adm-field input:focus,
    .adm-field select:focus {
      border-color: var(--brand)
    }

    .adm-form-actions {
      grid-column: 1/-1;
      display: flex;
      gap: 8px;
      justify-content: flex-end
    }

    .adm-save-btn {
      padding: 7px 16px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer
    }

    .adm-cancel-btn {
      padding: 7px 14px;
      border-radius: 8px;
      background: var(--s3);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer
    }

    .adm-act-btn {
      padding: 3px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      cursor: pointer
    }

    .adm-act-btn:hover {
      border-color: var(--brand);
      color: var(--brand)
    }

    .adm-act-btn.del:hover {
      border-color: var(--r);
      color: var(--r)
    }

    /* ── CHANGE REQUEST ── */
    .cr-req-btn {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(234, 179, 8, .4);
      background: rgba(234, 179, 8, .08);
      color: #92610a;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap
    }

    html:not(.light) .cr-req-btn {
      color: #fde68a
    }

    .cr-req-btn:hover {
      background: rgba(234, 179, 8, .16)
    }

    .notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--r);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      display: grid;
      place-items: center;
      padding: 0 3px
    }

    .cr-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 9500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px
    }

    .cr-modal {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 460px;
      max-width: 100%;
      padding: 26px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .cr-modal h3 {
      font-size: 15px;
      font-weight: 800;
      margin: 0
    }

    .cr-modal p {
      font-size: 12px;
      color: var(--muted);
      margin: 0
    }

    .cr-field {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .cr-field label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted)
    }

    .cr-field input,
    .cr-field textarea {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--s2);
      color: var(--text);
      font-size: 12px;
      outline: none;
      font-family: inherit
    }

    .cr-field input:focus,
    .cr-field textarea:focus {
      border-color: var(--brand)
    }

    .cr-field textarea {
      resize: vertical;
      min-height: 70px
    }

    .cr-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end
    }

    .cr-submit-btn {
      padding: 8px 18px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer
    }

    .cr-cancel-btn {
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--s3);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer
    }

    .cr-status-pending {
      color: var(--a);
      font-weight: 700
    }

    .cr-status-approved {
      color: var(--g);
      font-weight: 700
    }

    .cr-status-rejected {
      color: var(--r);
      font-weight: 700
    }

    .adm-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px
    }

    .adm-tab {
      padding: 7px 14px;
      border-radius: 7px 7px 0 0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      color: var(--muted)
    }

    .adm-tab.active {
      background: var(--s1);
      border-color: var(--border);
      color: var(--text)
    }

    .adm-tab:hover:not(.active) {
      color: var(--text)
    }

    /* ── DASHBOARD SETTINGS ────────────────────────────────────────── */
    .ds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
    .ds-role-block { background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .ds-role-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .ds-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text);
    }
    .ds-toggle-row:last-child { border-bottom: none; }
    .ds-toggle-label { display: flex; align-items: center; gap: 6px; }
    .ds-toggle {
      position: relative; width: 34px; height: 18px; cursor: pointer;
    }
    .ds-toggle input { opacity: 0; width: 0; height: 0; }
    .ds-toggle-track {
      position: absolute; inset: 0; background: var(--s4);
      border-radius: 9px; transition: background .2s;
      border: 1px solid var(--border2);
    }
    .ds-toggle input:checked + .ds-toggle-track { background: var(--brand); border-color: var(--brand); }
    .ds-toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 12px; height: 12px; background: #fff;
      border-radius: 50%; transition: left .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .ds-toggle input:checked ~ .ds-toggle-thumb { left: 18px; }

    /* ── WIZARD MODAL ──────────────────────────────────────────────── */
    .wiz-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      z-index: 9000; display: flex; align-items: center; justify-content: center;
    }
    .wiz-modal {
      background: var(--s1); border: 1px solid var(--border2);

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── CONSTANTS & UTILITIES ───────────────────────────────────────
    const TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
    const COLORS = ['#5b67e8', '#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#14b8a6'];
    const fmt = d => new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
    const fmtS = d => new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    const days = (a, b) => Math.round((new Date(b) - new Date(a)) / 864e5);
    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));

    function rag(pct, end) {
      if (pct >= 100) return 'G';
      if (TODAY > new Date(end) && pct < 100) return 'R';
      return pct >= 50 ? 'G' : pct >= 20 ? 'A' : 'R';
    }
    const ragLabel = r => r === 'G' ? 'On Track' : r === 'A' ? 'At Risk' : 'Delayed';

    // PMO-standard task status taxonomy
    function taskSt(t) {
      if (t.pct >= 100) return { l: 'Completed', c: 'sc-done' };
      const todayStr = TODAY.toISOString().split('T')[0];
      const endDate  = new Date(t.end);
      const startDate = new Date(t.start);
      // Past finish date and not complete → Overdue
      if (TODAY > endDate) return { l: 'Overdue', c: 'sc-overdue' };
      // Future task — not yet started
      if (TODAY < startDate) return { l: 'Not Started', c: 'sc-ns' };
      // Task window open, no progress logged → Behind Schedule
      if (t.pct === 0) return { l: 'Behind Schedule', c: 'sc-behind' };
      // Progress logged — check against schedule expectation
      const tot = Math.max(1, days(t.start, t.end));
      const elap = clamp(days(t.start, todayStr), 0, tot);
      const expectedPct = Math.round(elap / tot * 100);
      // More than 20% below expected → At Risk
      return t.pct < expectedPct - 20 ? { l: 'At Risk', c: 'sc-risk' } : { l: 'In Progress', c: 'sc-on' };
    }

    // Returns a human-readable reason string for the status (used as tooltip).
    function taskStReason(t, st) {
      const todayStr = TODAY.toISOString().split('T')[0];
      if (st.c === 'sc-done')    return 'Task is 100% complete.';
      if (st.c === 'sc-ns')      return `Scheduled to start ${fmt(t.start)}.`;
      if (st.c === 'sc-behind')  return `Should have started ${fmt(t.start)} — no progress recorded yet.`;
      if (st.c === 'sc-overdue') {
        const od = days(t.end, todayStr);
        return `${od} day${od !== 1 ? 's' : ''} overdue (was due ${fmt(t.end)}).`;
      }
      const tot = Math.max(1, days(t.start, t.end));
      const elap = clamp(days(t.start, todayStr), 0, tot);
      const expectedPct = Math.round(elap / tot * 100);
      if (st.c === 'sc-risk')
        return `At Risk — ${elap}d elapsed of ${tot}d. Expected ~${expectedPct}%, actual ${Math.round(t.pct)}%.`;
      return `On track — ${elap}d elapsed of ${tot}d (expected ~${expectedPct}%, actual ${Math.round(t.pct)}%).`;
    }

    // Returns calendar days a task is delayed (positive = overdue, 0 = on track)
    function taskDelayDays(t) {
      if (t.pct >= 100) {
        // Completed: check if finished late
        const finish = t.actual_finish_date || t.end;
        const late = days(t.end, finish);
        return late > 0 ? late : 0;
      }
      const todayStr = TODAY.toISOString().split('T')[0];
      if (TODAY > new Date(t.end)) return days(t.end, todayStr);
      return 0;
    }

    function addWBS(items) {
      const ctr = [0, 0, 0, 0, 0];
      return items.map(t => {
        const lv = t.level - 1;
        ctr[lv]++;
        for (let i = lv + 1; i < ctr.length; i++) ctr[i] = 0;
        return { ...t, wbs: ctr.slice(0, t.level).join('.') };
      });
    }

    // Returns calendar-day duration for a task. Uses stored duration_days (wizard projects)
    // or derives from start/end dates (MPP-imported). Minimum 1 to avoid zero-weight tasks.
    function taskDuration(t) {
      if ((t.duration_days || 0) > 0) return t.duration_days;
      if (t.start && t.end) {
        const d = Math.round((new Date(t.end) - new Date(t.start)) / 86400000);
        return Math.max(1, d);
      }
      return 1;
    }

    function recalcSummaryPcts(items) {
      // Always recalculate summary/phase % bottom-up from current leaf values.
      // Weighting uses taskDuration() which works for both MPP-imported (date-based)
      // and wizard-created (stored duration_days) projects — matching MS Project logic.
      if (!items || items.length === 0) return items;

      const arr = items.map(t => ({ ...t }));
      const maxLevel = Math.max(...arr.map(t => t.level));

      for (let lv = maxLevel - 1; lv >= 1; lv--) {
        arr.forEach((t, i) => {
          if (!t.is_summary || t.level !== lv) return;
          const children = [];
          for (let j = i + 1; j < arr.length; j++) {
            if (arr[j].level <= lv) break;
            if (arr[j].level === lv + 1) children.push(arr[j]);
          }
          if (children.length === 0) return;
          // Milestones have no duration — exclude from weighted average
          const contributors = children.filter(c => !c.is_milestone);
          if (contributors.length === 0) return;
          const totalDur = contributors.reduce((s, c) => s + taskDuration(c), 0);
          const weighted  = contributors.reduce((s, c) => s + (c.pct || 0) * taskDuration(c), 0);
          arr[i] = { ...arr[i], pct: totalDur > 0 ? Math.round(weighted / totalDur) : 0 };
        });
      }

      return arr;
    }

    // Unified status → bar/text color (no project color involved)
    // pct is optional; when 0 and status is sc-risk it means "not started late" → orange
    function statusColor(st, pct) {
      if (!st) return 'var(--brand)';
      if (st.c === 'sc-done') return 'var(--g)';
      if (st.c === 'sc-critical') return 'var(--r)';
      if (st.c === 'sc-late') return '#f97316';           // orange — delayed
      if (st.c === 'sc-risk') return pct === 0 ? '#f97316' : 'var(--a)'; // no start yet → orange; behind schedule → amber
      if (st.c === 'sc-ns') return 'var(--muted)';      // genuinely not started (future)
      return 'var(--brand)'; // in progress / on track
    }

    // Generate a plain-English explanation of the project health RAG.
    function healthReason(p) {
      const todayStr = TODAY.toISOString().split('T')[0];
      const leaves = p.items.filter(t => !t.is_summary && !t.is_milestone);
      const delayed = leaves.filter(t => { const s = taskSt(t); return s.c === 'sc-critical' || s.c === 'sc-late'; });
      const noStart = leaves.filter(t => taskSt(t).c === 'sc-risk' && t.pct === 0);
      const atRisk = leaves.filter(t => taskSt(t).c === 'sc-risk' && t.pct > 0);
      const dl = days(todayStr, p.end);
      if (p.health === 'R') {
        if (dl < 0) return `Project is ${Math.abs(dl)}d past its planned finish. ${delayed.length} task${delayed.length !== 1 ? 's' : ''} overdue.`;
        return `${delayed.length} overdue task${delayed.length !== 1 ? 's' : ''} with only ${dl}d left. At ${p.progress}% complete, deadline is at risk.`;
      }
      if (p.health === 'A') {
        const parts = [];
        if (atRisk.length) parts.push(`${atRisk.length} task${atRisk.length !== 1 ? 's' : ''} behind expected pace`);
        if (noStart.length) parts.push(`${noStart.length} task${noStart.length !== 1 ? 's' : ''} not started yet`);
        return (parts.join(', ') || 'Some tasks need attention') + `. ${dl > 0 ? dl + 'd remaining.' : ''}`;
      }
      return `${p.progress}% complete — progressing on schedule with ${dl > 0 ? dl + 'd remaining' : Math.abs(dl) + 'd past finish'}.`;
    }

    // AI-style insights: delayed items + active in-progress items to focus on.
    function InsightsPanel({ p, user }) {
      const settings = React.useContext(SettingsCtx);
      const isAdmin = user?.role === 'admin';
      const todayStr = TODAY.toISOString().split('T')[0];
      const leaves = p.items.filter(t => !t.is_summary && !t.is_milestone && !t.is_project_root);
      const storageKey = `insightHidden_${p.code}`;
      const overrideKey = `insightOverride_${p.code}`;

      const [hidden, setHidden] = useState(() => {
        try { return JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch { return []; }
      });
      const [overrides, setOverrides] = useState(() => {
        try { return JSON.parse(localStorage.getItem(overrideKey) || '{}'); } catch { return {}; }
      });
      const [editingId, setEditingId] = useState(null);

        const s = taskSt(t);
        const od = s.c === 'sc-ns' ? 0 : days(t.end, todayStr);

        const s = taskSt(t);
        return (s.c === 'sc-on' || s.c === 'sc-risk') && t.pct > 0 && t.pct < 100;

        return { ...t, st: taskSt(t), rem };

    function transformData(raw) {
      return raw.projects.map((p, i) => {
        const color = COLORS[i % COLORS.length];
        // 1. normalise dates & flags
        const raw_items = p.items.map((t, ri) => {
          const startD = t.start.split('T')[0];
          const endD = t.end.split('T')[0];
          // Use the MPXJ milestone flag from backend; fall back to date equality only for non-summary tasks
          // (avoids misclassifying 1-day tasks whose start/end happen to share the same date)
          const isMsFlag = t.is_milestone === true ? true
            : (!t.is_summary && startD === endD && t.is_milestone !== false);
          return {
            ...t,
            start: startD,
            end: endD,
            level: t.level || 1,
            is_summary: t.is_summary || false,
            is_milestone: isMsFlag,
            overridden: t.overridden || false,
            original_pct: t.original_pct != null ? t.original_pct : t.pct,
            override_info: t.override_info || null,
            is_project_root: ri === 0 && (t.title === p.name || (p.items.length > 1 && (t.is_summary || false))),
          };
        });
        // 2. add WBS numbering
        const items = addWBS(recalcSummaryPcts(raw_items));
        const rootItem = items.find(t => t.is_project_root);

        // Project-level % = duration-weighted average of all leaf tasks.
        // taskDuration() uses stored duration_days (wizard) or derives from start/end dates (MPP).
        // This always reflects current leaf values (including overrides) — no stale DB root values.
        const leaves = items.filter(t => !t.is_summary && !t.is_milestone);
        const totalDur = leaves.reduce((s, c) => s + taskDuration(c), 0);
        const weighted  = leaves.reduce((s, c) => s + (c.pct || 0) * taskDuration(c), 0);
        const progress = leaves.length > 0
          ? Math.round(weighted / totalDur)
          : (rootItem ? Math.round(rootItem.pct) : 0);

        const ss = items.map(t => t.start).sort();
        const ee = items.map(t => t.end).sort();
        const pEnd = ee[ee.length - 1];
        return {
          code: p.code, name: p.name, mpp_path: p.mpp_path || '',
          team_type: p.team_type || 'cubes',
          pending_overrides: p.pending_overrides || 0,
          stakeholder: p.stakeholder || '',
          color, progress, health: rag(progress, pEnd), start: ss[0], end: pEnd, items
        };
      });

    function Toast({ message, type, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 4500);
        return () => clearTimeout(t);
      }, [message]);
      if (!message) return null;
      const bg = type === 'success' ? '#15803d' : type === 'error' ? '#b91c1c' : '#1d4ed8';
      return <div className="toast" style={{ background: bg, opacity: 1 }}>{message}</div>;
    }

      const [pw, setPw] = useState('');
      const [err, setErr] = useState('');

        setBusy(true); setErr('');

          const user = await api.login(v, pw);

        setBusy(false);

    // ── REQUEST CHANGE MODAL ─────────────────────────────────────────
    function RequestChangeModal({ task, project, user, onClose, onToast }) {
      const [val, setVal] = useState('');
      const [reason, setReason] = useState('');
      const [busy, setBusy] = useState(false);

      async function submit() {
        const v = parseInt(val);
        if (isNaN(v) || v < 0 || v > 99) { onToast('Enter a valid % between 0 and 99', 'error'); return; }
        if (!reason.trim()) { onToast('Please provide a reason', 'error'); return; }
        setBusy(true);
        try {
          await api.submitChangeRequest({
            project,
            task: task.title,
            current_value: task.pct,
            requested_value: v,
            reason: reason.trim(),
            requested_by: user.username,
          });
          onToast('📝 Change request submitted — awaiting admin approval', 'success');
          onClose();
        } catch (e) { onToast('Submit failed: ' + e.message, 'error'); }
        setBusy(false);
      }

      return (
        <div className="cr-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="cr-modal">
            <h3>📝 Request Value Change</h3>
            <p>Task <strong>{task.title}</strong> is at <strong style={{ color: 'var(--g)' }}>100%</strong> (locked).<br />
              Submit a request to the admin to change it.</p>
            <div className="cr-field">
              <label>Requested New Value (%)</label>
              <input type="number" min="0" max="99" placeholder="e.g. 75"
                value={val} onChange={e => setVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && submit()} />
            </div>
            <div className="cr-field">
              <label>Reason *</label>
              <textarea placeholder="Explain why this value needs to be changed…"
                value={reason} onChange={e => setReason(e.target.value)} />
            </div>
            <div className="cr-modal-actions">
              <button className="cr-cancel-btn" onClick={onClose}>Cancel</button>
              <button className="cr-submit-btn" onClick={submit} disabled={busy}>
                {busy ? 'Submitting…' : 'Submit Request →'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── TASK DETAILS MODAL (Risk & Impact) ───────────────────────────
    function TaskDetailsModal({ task, project, user, onClose, onToast, onSaved }) {
      const isPrivileged = user?.role === 'admin' || user?.role === 'editor';
      const isViewer = !isPrivileged;
      const [busy, setBusy] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [fd, setFd] = useState({
        is_critical: task.is_critical ? true : false,
        extended_days: task.extended_days || 0,
        comments: task.comments || ''
      });

      async function save() {
        setBusy(true);
        try {
          await api.updateTask(task.id, {
            is_critical: fd.is_critical ? 1 : 0,
            extended_days: parseInt(fd.extended_days) || 0,
            comments: fd.comments || null
          }, user.id);
          onToast('Task details updated ✓', 'success');
          onSaved();
          onClose();
        } catch (e) {
          onToast('Update failed: ' + e.message, 'error');
        }
        setBusy(false);
      }

      async function submitForApproval() {
        if (!fd.comments.trim()) {
          onToast('Please describe the risk or delay reason.', 'error');
          return;
        }
        setBusy(true);
        try {
          await api.submitChangeRequest({
            project,
            task: task.title,
            current_value: task.extended_days || 0,
            requested_value: parseInt(fd.extended_days) || 0,
            reason: `[RISK/DELAY REPORT] ${fd.comments}`,
            requested_by: user.username,
          });
          setSubmitted(true);
          onToast('Risk report submitted for admin approval ✓', 'success');
        } catch (e) {
          onToast('Submission failed: ' + e.message, 'error');
        }
        setBusy(false);
      }

      if (submitted) {
        return (
          <div className="cr-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
            <div className="cr-modal" style={{ textAlign: 'center', padding: 32 }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
              <h3 style={{ marginTop: 0 }}>Report Submitted</h3>
              <p style={{ color: 'var(--muted)', fontSize: 13 }}>
                Your risk/delay report for <strong>{task.title}</strong> has been sent to the admin for review.
                They will adjust the timeline if approved.
              </p>
              <button className="cr-submit-btn" onClick={onClose} style={{ marginTop: 8 }}>Done</button>
            </div>
          </div>
        );
      }

      return (
        <div className="cr-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="cr-modal">
            <h3>⚠ {isViewer ? 'Report Risk / Delay' : 'Task Details & Risk'}</h3>
            <p style={{ marginTop: 0, fontSize: 12, color: 'var(--muted)' }}>
              Task: <strong style={{ color: 'var(--text)' }}>{task.title}</strong>
              {isViewer && <span style={{ display: 'block', marginTop: 4, fontSize: 11, color: 'var(--a)' }}>
                ℹ Your report will be sent to the admin for approval before any timeline changes take effect.
              </span>}
            </p>

            {!isViewer && (
              <div className="cr-field">
                <label>Critical Path / High Risk</label>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
                  <input type="checkbox" style={{ width: 'auto', outline: 'none' }}
                    checked={fd.is_critical} onChange={e => setFd({ ...fd, is_critical: e.target.checked })} />
                  <span>Mark this task as critical</span>
                </div>
              </div>
            )}

            <div className="cr-field">
              <label>Extra Days Needed (Variance)</label>
              <input type="number" min="0" value={fd.extended_days}
                onChange={e => setFd({ ...fd, extended_days: e.target.value })} />
              <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>
                {isViewer
                  ? 'Estimate how many extra days this task needs. Admin will review and apply.'
                  : 'Extra days needed. This will automatically extend the Actual Finish date.'}
              </div>
            </div>

            <div className="cr-field">
              <label>{isViewer ? 'Risk / Delay Description *' : 'Reason for Rework / Delay'}</label>
              <textarea placeholder="Due to [Constraint], we need [X] extra days..."
                value={fd.comments} onChange={e => setFd({ ...fd, comments: e.target.value })} />
            </div>

            <div className="cr-modal-actions">
              <button className="cr-cancel-btn" onClick={onClose}>Close</button>
              {isViewer ? (
                <button className="cr-submit-btn" onClick={submitForApproval} disabled={busy}
                  style={{ background: 'linear-gradient(135deg,#f97316,#ea580c)' }}>
                  {busy ? 'Submitting…' : '📨 Submit for Approval →'}
                </button>
              ) : (
                <button className="cr-submit-btn" onClick={save} disabled={busy}>
                  {busy ? 'Saving…' : 'Save Details →'}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }


    // ── SIDEBAR ──────────────────────────────────────────────────────
    function Sidebar({ projects, selected, onSelect, onClear, onExport, user, onAddBlank, onUpload, onSyncMpp, syncing, settings }) {
      settings = settings || {};
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all');

      const visible = projects.filter(p => (filter === 'all' || p.health === filter) &&
        (p.name.toLowerCase().includes(search.toLowerCase()) || p.code.toLowerCase().includes(search.toLowerCase())));

      // Checkbox click → toggle this project in/out of selection (multi-select)
      function toggleOne(name) {
        const next = new Set(selected);
        next.has(name) ? next.delete(name) : next.add(name);
        onSelect(next);
      }

      // Row click (outside checkbox) → single-select (or deselect if already sole selection)
      function selectOne(name) {
        if (selected.size === 1 && selected.has(name)) onSelect(new Set());
        else onSelect(new Set([name]));
      }

      return (
        <aside className="sidebar">
          <div className="sb-logo">
            <div className="prism-icon">C</div>
            <div><div className="sb-brand">CUBES PM</div><div className="sb-sub">PMO Dashboard</div></div>
          </div>
          <div className="sb-block">
            <div className="sb-lbl">Search</div>
            <input className="sb-search" placeholder="Filter by name or code…" value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="sb-block">
            <div className="sb-lbl">Filter</div>
            <select className="sb-sel" value={filter} onChange={e => setFilter(e.target.value)}>
              <option value="all">All statuses</option>
              <option value="G">On Track</option>
              <option value="A">At Risk</option>
              <option value="R">Delayed</option>
            </select>
          </div>
          <div style={{ padding: '10px 14px 0' }}>
            <div className="sb-lbl" style={{ marginBottom: 2 }}>Projects</div>
            <div className="sb-hint">☑ checkbox = multi-select · row = single</div>
          </div>
          <div className="proj-list">
            {visible.length === 0 && <div className="empty">No matches</div>}
            {(() => {
              const cubes = visible.filter(p => p.team_type !== 'implementation');
              const impl  = visible.filter(p => p.team_type === 'implementation');
              function ProjRow({ p }) {
                return (
                  <div key={p.name} className={`proj-row${selected.has(p.name) ? ' sel' : ''}`}
                    onClick={() => selectOne(p.name)}>
                    <div className="pcheck" onClick={e => { e.stopPropagation(); toggleOne(p.name); }} />
                    <div className="pdot" style={{ background: p.color }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="pname">{p.name}</div>
                      <div className="pmeta">{p.progress}% · {fmt(p.start)} → {fmt(p.end)}</div>
                    </div>
                    <span className={`rag rag-${p.health}`}>{ragLabel(p.health)}</span>
                  </div>
                );
              }
              return (
                <>
                  {cubes.length > 0 && (
                    <>
                      <div style={{ fontSize: 9, fontWeight: 800, color: 'var(--brand)', textTransform: 'uppercase', letterSpacing: '.08em', padding: '8px 14px 2px', opacity: .7 }}>
                        CUBES Team
                      </div>
                      {cubes.map(p => <ProjRow key={p.name} p={p} />)}
                    </>
                  )}
                  {impl.length > 0 && (
                    <>
                      <div style={{ fontSize: 9, fontWeight: 800, color: '#f97316', textTransform: 'uppercase', letterSpacing: '.08em', padding: '8px 14px 2px', opacity: .7 }}>
                        Implementation Team
                      </div>
                      {impl.map(p => <ProjRow key={p.name} p={p} />)}
                    </>
                  )}
                </>
              );
            })()}
          </div>
          <div className="sb-foot" style={{ flexDirection: 'column' }}>
            {(user?.role === 'admin' || settings.show_clear_btn || settings.show_export_btn) && (
              <div style={{ display: 'flex', gap: 8 }}>
                {(user?.role === 'admin' || settings.show_clear_btn) && <button className="btn" onClick={onClear}>Clear</button>}
                {(user?.role === 'admin' || settings.show_export_btn) && <button className="btn white" onClick={onExport}>Export PDF</button>}
              </div>
            )}
            {(user?.role === 'admin' || settings.show_new_project_btn || settings.show_upload_mpp_btn) && (
              <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                {(user?.role === 'admin' || settings.show_new_project_btn) && (
                  <button className="btn" style={{ background: 'linear-gradient(135deg,#6366f1,#818cf8)', color: '#fff', borderColor: 'var(--brand)', fontWeight: 700 }} onClick={onAddBlank}>🚀 New Project</button>
                )}
                {(user?.role === 'admin' || settings.show_upload_mpp_btn) && (
                  <label className="btn" style={{ background: 'var(--brand2)', color: '#fff', borderColor: 'var(--brand2)', cursor: 'pointer' }}>
                    <input type="file" accept=".mpp" style={{ display: 'none' }} onChange={e => { if (e.target.files[0]) onUpload(e.target.files[0]); e.target.value = null; }} />
