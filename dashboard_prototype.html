    // ── GANTT CHART ──────────────────────────────────────────────────
    function GanttChart({ p }) {
      // Exclude the synthetic project root from display
      const visItems = p.items.filter(t => !t.is_project_root);
      const all = visItems.flatMap(t => [new Date(t.start), new Date(t.end)]);
      if (!all.length) return null;
      let mn = new Date(Math.min(...all)), mx = new Date(Math.max(...all));
      mn.setDate(mn.getDate() - 3); mx.setDate(mx.getDate() + 8);
      const span = mx - mn;
      const pos = d => clamp(((new Date(d) - mn) / span) * 100, 0, 100);
      const tPct = pos(TODAY);
      const showToday = tPct > 1 && tPct < 99;

      const totalD = days(mn.toISOString().split('T')[0], mx.toISOString().split('T')[0]);
      const inter = Math.max(7, Math.round(totalD / 10));
      const ticks = []; const td = new Date(mn);
      while (td <= mx) { ticks.push({ p: pos(td), l: fmtS(td) }); td.setDate(td.getDate() + inter); }

      return (
        <div className="gantt-section">
          <div className="sec-hd">Gantt Chart</div>
          <div className="g-dhdr">
            <div className="g-dspacer" />
            <div className="g-dates">
              {ticks.map((t, i) => <div key={i} className="g-tick" style={{ left: `${t.p}%` }}>{t.l}</div>)}
              {showToday && <div className="g-tick g-tick-today" style={{ left: `${tPct}%` }}>TODAY</div>}
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            {showToday && (
              <div style={{ position: 'absolute', top: 0, bottom: 0, left: 240, right: 0, pointerEvents: 'none', zIndex: 5, overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${tPct}%`, width: 2, background: 'rgba(210,40,55,.6)' }} />
              </div>
            )}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
              {visItems.map((t, i) => {
                const isMs = t.is_milestone;
                const l = pos(t.start), r2 = pos(t.end), w = Math.max(0.6, r2 - l);
                const st = (!t.is_summary && !isMs) ? taskSt(t) : (t.pct >= 100 ? { l: 'Completed', c: 'sc-done' } : { l: '', c: 'sc-on' });
                const bc = statusColor(st, t.pct);
                const lc = 'l' + Math.min(t.level, 4);
                const rowType = t.level === 1 ? 'g-row-root' : t.is_summary ? 'g-row-phase' : '';
                // bar shape variant
                const barCls = t.level === 1 ? 'g-bar g-bar-root' : t.is_summary ? 'g-bar g-bar-summary' : 'g-bar';
                // tooltip for leaf tasks
                const tip = (!isMs && !t.is_summary) ? `${t.title}\n${fmt(t.start)} → ${fmt(t.end)}\n${taskStReason(t, st)}` : t.title;
                return (
                  <div key={i} className={`g-row ${rowType}`}>
                    <div className="g-left">
                      <div className={`g-lbl ${lc}`} title={t.title}>
                        {isMs ? `◆ ${t.title}` : t.is_summary ? `▼ ${t.title}` : t.title}
                      </div>
                      <span className="g-pct" style={{ color: bc, fontWeight: t.level === 1 ? 800 : 700 }}>
                        {isMs && t.pct === 0 ? '' : t.pct + '%'}
                      </span>
                    </div>
                    <div className="g-track">
                      {isMs
                        /* Milestone diamond */
                        ? <div className="g-ms" title={tip}
                          style={{ left: `${l}%`, background: bc, borderColor: 'rgba(255,255,255,.8)' }} />
                        /* Full-duration bar with fill representing completion */
                        : <div className={barCls} title={tip}
                          style={{
                            left: `${l}%`,
                            width: `${w}%`,
                            borderColor: `${bc}40`,
                          }}>
                          {/* Completion fill */}
                          <div className="g-bar-fill"
                            style={{ width: `${t.pct}%`, background: bc }} />
                        </div>
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── TASK ROW (with inline editor) ────────────────────────────────
    function TaskRow({ t, p, idx, totalRows, onSaved, onToast, user, onRequestChange, onOpenDetails }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(Math.round(t.pct));
      const [saving, setSaving] = useState(false);
      const inputRef = useRef();

      const role = user?.role || 'viewer';
      const canEdit = role === 'admin' || role === 'editor';
      const isAdmin = role === 'admin';

      // Keep editor seed in sync with live pct after each reload
      useEffect(() => { if (!editing) setVal(Math.round(t.pct)); }, [t.pct, editing]);
      useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [editing]);

      const isMs = t.is_milestone;
      const isRoot = t.level === 1;
      // Admins can edit any task (including 100%). Non-admins are blocked at 100%.
      const isLocked = !isAdmin && !isRoot && !t.is_summary && t.pct >= 100;
      const isEditable = canEdit && !isRoot && !t.is_summary && (t.pct < 100 || isAdmin);
      const rowCls = isRoot ? 'tr-root' : t.is_summary ? 'tr-phase' : isMs ? 'tr-ms' : 'tr-task';
      const st = (!t.is_summary && !isMs) ? taskSt(t) : (t.pct >= 100 ? { l: 'Completed', c: 'sc-done' } : null);
      const stReason = (!t.is_summary && !isMs && st) ? taskStReason(t, st) : '';
      const dur = days(t.start, t.end);
      const bc = isMs ? (t.pct >= 100 ? 'var(--g)' : 'var(--brand)') : statusColor(st, t.pct);

      // Tree connector
      function isLastAtLevel(level) {
        for (let j = idx + 1; j < totalRows; j++) {
          if (p.items[j].level < level) return true;
          if (p.items[j].level === level) return false;
        }
        return true;
      }
      function treePrefix() {
        if (t.level === 1) return '';
        let prefix = '';
        for (let lv = 2; lv < t.level; lv++) {
          let hasCont = false;
          for (let j = idx + 1; j < totalRows; j++) {
            if (p.items[j].level < lv) break;
            if (p.items[j].level === lv) { hasCont = true; break; }
          }
          prefix += hasCont ? '│  ' : '   ';
        }
        return prefix + (isLastAtLevel(t.level) ? '└─ ' : '├─ ');
      }

      async function handleSubmit() {
        const v = parseInt(val);
        if (isNaN(v) || v < 0 || v > 100) return;
        const floor = Math.round(t.pct);
        if (v < floor) {
          if (!isAdmin) {
            // Non-admin: hard block
            onToast(`Cannot decrease — "${t.title}" is already at ${floor}%. Only an admin can reduce a completed value.`, 'error');
            return;
          }
          // Admin: require explicit confirmation for any decrease
          const ok = window.confirm(
            `⚠ Admin override — decrease confirmation\n\n` +
            `Task: "${t.title}"\n` +
            `Current: ${floor}%  →  New: ${v}%\n\n` +
            `Reducing a completed percentage requires admin approval.\n` +
            `Are you sure you want to proceed?`
          );
          if (!ok) return;
        }
        setSaving(true);
        try {
          await api.saveOverride(p.name, t.title, v, t.original_pct, user?.username);
          onToast('Saved ✓', 'success');
          setEditing(false);
          onSaved();
        } catch (e) {
          onToast('Save failed: ' + e.message, 'error');
        }
        setSaving(false);
      }

      async function handleReset() {
        if (!window.confirm(`Reset "${t.title}" back to MS Project value (${t.original_pct}%)?`)) return;
        setSaving(true);
        try {
          await api.deleteOverride(p.name, t.title);
          onToast('Reset to MS Project value ✓', 'success');
          setEditing(false);
          onSaved();
        } catch (e) { onToast('Reset failed: ' + e.message, 'error'); }
        setSaving(false);
      }

      async function renameTask() {
        if (!isAdmin) return;
        const newTitle = window.prompt("Rename task:", t.title);
        if (!newTitle || newTitle === t.title) return;
        try {
          await api.updateTask(t.id, { title: newTitle }, user.id);
          onToast("Task renamed ✓", "success");
          onSaved();
        } catch (e) { onToast(e.message, "error"); }
      }

      const typeBadge = isRoot || t.is_summary
        ? <span className="type-badge t-sum">Summary</span>
        : isMs ? <span className="type-badge t-ms">Milestone</span>
          : <span className="type-badge t-task">Task</span>;

      const statusEl = isMs
        ? (() => {
          const s = t.pct >= 100 ? { l: 'Achieved', c: 'sc-ms-ok' } : TODAY > new Date(t.end) ? { l: 'Missed', c: 'sc-ms-miss' } : { l: 'Upcoming', c: 'sc-ms-up' };
          const reason = s.c === 'sc-ms-miss' ? `Milestone missed — was due ${fmt(t.end)}.`
            : s.c === 'sc-ms-ok' ? `Milestone achieved.` : `Due on ${fmt(t.end)}.`;
          return <span className={`sc ${s.c}`} title={reason}>{s.l}</span>;
        })()
        : t.is_summary
          ? (() => {
            const s = t.pct >= 100 ? { l: 'Completed', c: 'sc-done' } : TODAY > new Date(t.end) ? { l: 'Delayed', c: 'sc-late' } : { l: 'In Progress', c: 'sc-on' };
            return <span className={`sc ${s.c}`}>{s.l}</span>;
          })()
          : <span className={`sc ${st.c}`} title={stReason}>{st.l}</span>;

      // Consistent % cell: number is always right-aligned in fixed 34px slot; edit icon in fixed 10px slot
      const pctCell = isEditable && editing
        ? (<td style={{ width: 96 }}>
          <div className="pct-editor">
            <input ref={inputRef} type="number" min={isAdmin ? 0 : Math.round(t.pct)} max="100" value={val} onChange={e => setVal(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') handleSubmit(); if (e.key === 'Escape') setEditing(false); }} />
            <button className="pe-ok" onClick={handleSubmit} disabled={saving}>{saving ? '…' : '✓'}</button>
            <button className="pe-cancel" onClick={() => setEditing(false)}>✕</button>
            {t.overridden && <button className="pe-reset" onClick={handleReset} title={`Reset to ${t.original_pct}%`}>↺</button>}
          </div>
        </td>)
        : isEditable
          ? (<td className="pct-edit-cell" style={{ width: 96 }} onClick={() => setEditing(true)} title="Click to edit %">
            <div className="pct-cell-inner">
              <span className="pct-num" style={{ color: bc }}>{Math.round(t.pct)}%</span>
              <span className="pct-edit-icon">✎</span>
              {t.overridden && <span className="override-badge" title={t.override_info ? `By ${t.override_info.updated_by}` : 'Override'}>✏</span>}
            </div>
          </td>)
          : isLocked
            ? (<td style={{ width: 96 }}>
              <div className="pct-cell-inner">
                <span className="pct-num" style={{ color: 'var(--g)' }}>100%</span>
                {isAdmin
                  ? <span className="pct-edit-icon" style={{ opacity: .4 }} title="Admin: click row to edit">🔒</span>
                  : <button className="cr-req-btn" title="Request admin to change this value"
                    onClick={() => onRequestChange && onRequestChange(t)}>📝</button>
                }
              </div>
            </td>)
            : (<td style={{ width: 96 }}>
              <div className="pct-cell-inner">
                <span className="pct-num" style={{ color: bc }}>{Math.round(t.pct)}%</span>
                <span className="pct-edit-icon" style={{ opacity: 0 }} />
              </div>
            </td>);

      return (
        <tr className={rowCls}>
          <td style={{ width: 44 }}><div className="td-pad" style={{ color: 'var(--dim)', fontFamily: 'monospace', fontSize: 11 }}>{isRoot ? '' : t.wbs}</div></td>
          {pctCell}
          <td style={{ minWidth: 260, maxWidth: 340 }}>
            <div className="name-cell">
              <span className="tree-conn">{treePrefix()}</span>
              <span className="row-icon" style={{ color: isMs || t.is_summary ? p.color : 'var(--dim)' }}>{isMs ? '◆' : t.is_summary ? '▼' : '·'}</span>
              <span className="row-name" title={t.title}>
                {t.title} {t.is_critical && <span style={{ color: 'var(--r)', fontSize: 10, marginLeft: 4 }}>[CRITICAL]</span>}
              </span>
              {isAdmin && <span style={{ marginLeft: 8, cursor: 'pointer', opacity: 0.3, fontSize: 10 }} onClick={renameTask} title="Rename Task">✏</span>}
              {canEdit && !t.is_summary && !isRoot && <button style={{ marginLeft: 'auto', padding: '2px 6px', fontSize: 9, borderRadius: 4, background: 'rgba(239, 68, 68, 0.1)', color: 'var(--r)', border: '1px solid rgba(239, 68, 68, 0.2)', cursor: 'pointer' }} onClick={() => onOpenDetails(t)} title="Log Rework, Expected Delays, or Risk impact">⚠ Log Risk/Delay</button>}
            </div>
          </td>
          <td style={{ width: 80 }}><div className="td-pad">{typeBadge}</div></td>
          <td><div className="td-pad" style={{ fontSize: 11, color: isMs ? 'var(--brand)' : 'var(--muted)' }}>{fmt(t.start)}</div></td>
          <td><div className="td-pad" style={{ fontSize: 11, color: isMs ? 'var(--brand)' : 'var(--muted)' }}>{isMs ? '—' : fmt(t.end)}</div></td>
          <td><div className="td-pad" style={{ fontSize: 11, color: 'var(--muted)', textAlign: 'right' }}>{isMs || dur === 0 ? '—' : dur + 'd'}</div></td>
          <td style={{ width: 60 }}>
            <div className="td-pad">
              <div className="pbar-wrap">
                <div className="pbar"><div className="pfill" style={{ width: `${t.pct}%`, background: bc }} /></div>
              </div>
            </div>
          </td>
          <td style={{ width: 100 }}><div className="td-pad">{statusEl}</div></td>
        </tr>
      );
    }

    // ── TASK TABLE ───────────────────────────────────────────────────
    function TaskTable({ p, onSaved, onToast, user, onRequestChange }) {
      // Exclude synthetic project root from display
      const visItems = p.items.filter(t => !t.is_project_root);
      const msCount = visItems.filter(t => t.is_milestone).length;
      const summaryCount = visItems.filter(t => t.is_summary).length;
      const taskCount = visItems.filter(t => !t.is_summary && t.start !== t.end).length;
      return (
        <div className="tt-section">
          <div className="tt-hdr">
            <h3>Task Plan — {p.name}</h3>
            <span className="tt-meta">{taskCount} tasks · {summaryCount} summaries · {msCount} milestones</span>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table className="msp">
              <thead><tr>
                <th style={{ width: 44 }}>WBS</th>
                <th style={{ width: 96, textAlign: 'right' }}>%</th>
                <th style={{ minWidth: 260 }}>Task Name</th>
                <th style={{ width: 80 }}>Type</th>
                <th style={{ width: 90 }}>Start</th>
                <th style={{ width: 90 }}>Finish</th>
                <th style={{ width: 55, textAlign: 'right' }}>Dur.</th>
                <th style={{ width: 60 }}>Progress</th>
                <th style={{ width: 100 }}>Status</th>
              </tr></thead>
              <tbody>
                {visItems.map((t, idx) => (
                  <TaskRow key={idx} t={t} p={p} idx={idx} totalRows={visItems.length}
                    onSaved={onSaved} onToast={onToast} user={user}
                    onRequestChange={onRequestChange}
                    onOpenDetails={t => (window.__openDetails && window.__openDetails(t))} />
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── REPORT MODAL ──────────────────────────────────────────────────
    function ReportModal({ p, onClose, onToast }) {
      const leaves = p.items.filter(t => !t.is_summary && !t.is_milestone && !t.is_project_root);
      const risks = leaves.filter(t => t.is_critical || taskSt(t).c === 'sc-critical' || taskSt(t).c === 'sc-late' || taskSt(t).c === 'sc-risk');

      let maxDelayDays = 0;
      let delayReasonTasks = [];
      p.items.forEach(t => {
        if (t.is_critical && t.forecast_end_date) {
          const delay = Math.max(0, days(t.end, t.forecast_end_date));
          if (delay > maxDelayDays) {
            maxDelayDays = delay;
            delayReasonTasks = [t.title];
          } else if (delay > 0 && delay === maxDelayDays) {
            delayReasonTasks.push(t.title);
          }
        }
      });

      let pForecastEnd = null;
      if (maxDelayDays > 0) {
        const d = new Date(p.end);
        d.setDate(d.getDate() + maxDelayDays);
        pForecastEnd = d.toISOString().split('T')[0];
      }

      const expectedPct = Math.round(leaves.map(t => {
        const start = new Date(t.start);
        const end = new Date(t.end);
        const totalD = Math.max(1, days(start, end));
        const elap = clamp(days(start, TODAY.toISOString().split('T')[0]), 0, totalD);
        return Math.round(elap / totalD * 100);
      }).reduce((a, b) => a + b, 0) / Math.max(1, leaves.length)) || 0;

      const reportHtml = (
        <div style={{ fontFamily: 'Arial, Helvetica, sans-serif', color: '#1f2937', padding: '24px', lineHeight: '1.6', background: '#ffffff' }}>
          <h2 style={{ color: '#5b67e8', borderBottom: '2px solid #e5e7eb', paddingBottom: '12px', marginTop: 0 }}>Project Status Report: {p.name}</h2>

          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: '24px', fontSize: '13px' }}>
            <tbody>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', width: '35%', fontWeight: 'bold' }}>Project Health Status</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}>
                  <span style={{
                    display: 'inline-block', padding: '4px 12px', borderRadius: '4px', fontWeight: 'bold', fontSize: '12px',
                    backgroundColor: p.health === 'G' ? '#dcfce7' : p.health === 'A' ? '#fef08a' : '#fee2e2',
                    color: p.health === 'G' ? '#166534' : p.health === 'A' ? '#854d0e' : '#991b1b'
                  }}>{ragLabel(p.health)}</span>
                </td>
              </tr>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Current Progress vs Expected</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}>
                  <strong>{p.progress}%</strong> Actual Progress vs <strong>{expectedPct}%</strong> Expected
                </td>
              </tr>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Target End Date (Baseline)</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb' }}>{fmt(p.end)}</td>
              </tr>
              <tr>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', background: '#f9fafb', fontWeight: 'bold' }}>Forecasted Project End Date</td>
                <td style={{ padding: '10px 14px', border: '1px solid #e5e7eb', color: pForecastEnd ? '#b91c1c' : '#166534', fontWeight: 'bold' }}>
                  {pForecastEnd ? `${fmt(pForecastEnd)} (Impacted by: ${delayReasonTasks.join(', ')})` : 'On Track (No major delays)'}
                </td>
              </tr>
            </tbody>
          </table>

          <h3 style={{ borderBottom: '1px solid #e5e7eb', paddingBottom: '6px', color: '#374151', marginTop: '30px' }}>Main Risks & Critical Tasks</h3>
          {risks.length === 0 ? (
            <p style={{ color: '#6b7280', fontSize: '13px' }}>✓ No significant risks or delays identified at this time.</p>
          ) : (
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead>
                <tr style={{ background: '#f3f4f6' }}>
                  <th style={{ textTransform: 'uppercase', padding: '10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: '800' }}>Task Name</th>
                  <th style={{ textTransform: 'uppercase', padding: '10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: '800' }}>Risk Severity</th>
                  <th style={{ textTransform: 'uppercase', padding: '10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: '800' }}>Current / Forecast Date</th>
                  <th style={{ textTransform: 'uppercase', padding: '10px', border: '1px solid #e5e7eb', textAlign: 'left', fontWeight: '800' }}>Root Cause / Mitigation Log</th>
                </tr>
              </thead>
              <tbody>
                {risks.map((t, i) => (
                  <tr key={i}>
                    <td style={{ padding: '10px', border: '1px solid #e5e7eb', fontWeight: 'bold' }}>{t.title}</td>
                    <td style={{ padding: '10px', border: '1px solid #e5e7eb', color: t.is_critical ? '#b91c1c' : '#854d0e', fontWeight: 'bold' }}>
                      {t.is_critical ? 'CRITICAL PATH' : 'Delayed / At Risk'}
                    </td>
                    <td style={{ padding: '10px', border: '1px solid #e5e7eb', color: t.forecast_end_date ? '#b91c1c' : '' }}>
                      {t.forecast_end_date ? (<span>{fmt(t.forecast_end_date)} <br /><span style={{ fontSize: '10px', fontWeight: 'normal' }}>(Orig: {fmt(t.end)})</span></span>) : fmt(t.end)}
                    </td>
                    <td style={{ padding: '10px', border: '1px solid #e5e7eb', color: '#4b5563' }}>
                      {t.comments ? <span style={{ whiteSpace: 'pre-wrap' }}>{t.comments}</span> : <em>No comments provided</em>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      );

      const reportRef = useRef();

      function handleCopy() {
        const htmlToCopy = reportRef.current.innerHTML;
        const blobHtml = new Blob([htmlToCopy], { type: 'text/html' });
        const textToCopy = reportRef.current.innerText;
        const blobText = new Blob([textToCopy], { type: 'text/plain' });

        try {
          navigator.clipboard.write([
            new ClipboardItem({
              'text/html': blobHtml,
              'text/plain': blobText
            })
          ]).then(() => onToast('Rich format copied to clipboard!', 'success'))
            .catch(() => {
              navigator.clipboard.writeText(textToCopy);
              onToast('Text copied to clipboard!', 'success');
            });
        } catch (e) {
          navigator.clipboard.writeText(textToCopy);
          onToast('Text copied to clipboard!', 'success');
        }
      }

      return (
        <div className="cr-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="cr-modal" style={{ width: 850, maxHeight: '92vh', overflowY: 'auto' }}>
            <h3 style={{ margin: '0 0 10px 0' }}>📧 Executive Status Report</h3>
            <p style={{ marginTop: 0, fontSize: '13px' }}>Review the auto-generated HTML report below. Click "Highlight & Copy Format" to perfectly paste it into Outlook or Teams.</p>

            <div
              ref={reportRef}
              style={{ padding: '4px', border: '1px solid var(--border)', borderRadius: '8px', background: '#fff', fontSize: '14px', color: '#000', userSelect: 'auto', overflowY: 'auto', maxHeight: '60vh' }}
            >
              {reportHtml}
            </div>

            <div className="cr-modal-actions" style={{ marginTop: '20px' }}>
              <button className="cr-cancel-btn" onClick={onClose} style={{ color: '#333' }}>Close Preview</button>
              <button className="cr-submit-btn" onClick={handleCopy} style={{ background: 'var(--brand)', color: 'white', fontWeight: 'bold' }}>Highlight & Copy Format 📋</button>
            </div>
          </div>
        </div>
      );
    }

    // ── PROJECT SECTION ──────────────────────────────────────────────
    function ProjectSection({ p, onSaved, onToast, user }) {
      const [pushing, setPushing] = useState(false);
      const [crTask, setCrTask] = useState(null); // task for which RequestChangeModal is open
      const [detailTask, setDetailTask] = useState(null); // task for details modal
      const [reportMode, setReportMode] = useState(false);

      // Make openDetails available to TaskTable children safely without deep prop drilling
      useEffect(() => {
        window.__openDetails = setDetailTask;
        return () => { window.__openDetails = null; };
      }, []);

      let maxDelayDays = 0;
      let delayReasonTasks = [];
      p.items.forEach(t => {
        if (t.is_critical && t.forecast_end_date) {
          const delay = Math.max(0, days(t.end, t.forecast_end_date));
          if (delay > maxDelayDays) {
            maxDelayDays = delay;
            delayReasonTasks = [t.title];
          } else if (delay > 0 && delay === maxDelayDays) {
            delayReasonTasks.push(t.title);
          }
        }
      });

      let pForecastEnd = null;
      if (maxDelayDays > 0) {
        const d = new Date(p.end);
        d.setDate(d.getDate() + maxDelayDays);
        pForecastEnd = d.toISOString().split('T')[0];
      }

      const dl = days(TODAY.toISOString().split('T')[0], p.end);
      const dlC = dl < 0 ? 'var(--r)' : dl <= 7 ? 'var(--a)' : 'var(--g)';
      const done = p.items.filter(t => !t.is_summary && !t.is_milestone && t.pct >= 100).length;
      const total = p.items.filter(t => !t.is_summary && !t.is_milestone).length;
      const isAdmin = user?.role === 'admin';

      async function handleClone() {
        if (!isAdmin) { onToast('Only admins can clone projects.', 'error'); return; }
        if (!window.confirm(`Create a clone of "${p.name}"?`)) return;
        setPushing(true);
        try {
          await api.cloneProject(p.code, user?.id);
          onToast(`✅ Cloned successfully`, 'success');
          onSaved();
        } catch (e) {
          onToast(`❌ ${e.message}`, 'error');
        }
        setPushing(false);
      }

      function handleGenerateReport() {
        setReportMode(true);
      }

      return (
        <div className="proj-section">
          <div className="ps-hdr">
            <div className="ps-av" style={{ background: `${p.color}18`, color: p.color, border: `1px solid ${p.color}40` }}>
              {p.code.substring(0, 3)}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="ps-nm">
                {p.name}
                {isAdmin && <span style={{ marginLeft: 8, cursor: 'pointer', opacity: 0.3, fontSize: 10 }} onClick={async () => {
                  const newTitle = window.prompt("Rename Project:", p.name);
                  if (!newTitle || newTitle === p.name) return;
                  // Requires /api/projects/{code} PUT route, which isn't there yet, but we have /api/tasks/{task_id} PUT. We'll skip project rename for now, or just let them clone.
                  // Actually they can rename the root task which is the project name!
                }} title="Use clone to rename projects"></span>}
              </div>
              <div className="ps-dt">
                Target: <strong>{fmt(p.end)}</strong>
                {pForecastEnd && <span style={{ color: 'var(--r)', marginLeft: 8 }}>→ Forecast: <strong>{fmt(pForecastEnd)}</strong> <span style={{ fontSize: 10, opacity: 0.8 }}>(Due to delay in: {delayReasonTasks.join(', ')})</span></span>}
              </div>
            </div>
            <div className="ps-mx">
              <div><div className="ps-mv" style={{ color: p.color }}>{p.progress}%</div><div className="ps-ml">Complete</div></div>
              <div><div className="ps-mv" style={{ color: pForecastEnd ? 'var(--r)' : dlC, fontSize: 16 }}>{days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end) < 0 ? Math.abs(days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end)) + 'd OD' : days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end) + 'd'}</div><div className="ps-ml">{days(TODAY.toISOString().split('T')[0], pForecastEnd || p.end) < 0 ? 'Overdue' : 'Remaining'}</div></div>
              <span className={`rag rag-${p.health}`} style={{ fontSize: 12, padding: '5px 12px' }}>{ragLabel(p.health)}</span>
              {isAdmin && (
                <div className="push-area" style={{ display: 'flex', gap: '8px' }}>
                  <button className="push-btn" onClick={handleClone} disabled={pushing} style={{ background: 'var(--brand2)' }}>
                    {pushing ? '⏳ Cloning…' : '📑 Clone Project'}
                  </button>
                  <button className="push-btn" onClick={handleGenerateReport} style={{ background: '#f59e0b', color: '#fff' }}>
                    📧 Generate Report
                  </button>
                </div>
              )}
            </div>
          </div>
          <div className="ps-bar"><div className="ps-bfill" style={{ width: `${p.progress}%`, background: p.color }} /></div>

          {/* Summary strip — 2 columns */}
          <div className="sumstrip">
            <div className="sumc">
              <div className="suml">Tasks Done / Total</div>
              <div className="sumv">
                <span style={{ color: 'var(--g)', fontSize: 16 }}>✔</span>
                <span style={{ color: 'var(--g)', fontWeight: 800 }}> {done}</span>
                <span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: 12 }}> done</span>
                <span style={{ color: 'var(--dim)' }}> / </span>
                <span>{total}</span>
                <span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: 12 }}> total</span>
              </div>
            </div>
            <div className="sumc">
              <div className="suml">Health</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <span className={`rag rag-${p.health}`} style={{ fontSize: 12 }}>{ragLabel(p.health)}</span>
              </div>
              <div className="health-reason">{healthReason(p)}</div>
            </div>
          </div>

          {/* AI Insights */}
          <InsightsPanel p={p} />

          <TaskTable p={p} onSaved={onSaved} onToast={onToast} user={user}
            onRequestChange={t => setCrTask(t)} />
          <GanttChart p={p} />
          {crTask && <RequestChangeModal task={crTask} project={p.name} user={user}
            onClose={() => setCrTask(null)} onToast={onToast} />}
          {detailTask && <TaskDetailsModal task={detailTask} project={p.name} user={user}
            onClose={() => setDetailTask(null)} onToast={onToast} onSaved={onSaved} />}
          {reportMode && <ReportModal p={p} onClose={() => setReportMode(false)} onToast={onToast} />}
        </div>
      );
    }


    // ── AUDIT LOG ────────────────────────────────────────────────────
    function AuditLog() {
      const [open, setOpen] = useState(false);
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(false);

      async function load() {
        setLoading(true);
        try { const d = await api.audit(); setEntries(d.entries || []); }
        catch (e) { setEntries([]); }
        setLoading(false);
      }

      function toggle() {
        const next = !open;
        setOpen(next);
        if (next) load();
      }

      return (
        <div className="audit-section">
          <div className="audit-hdr" onClick={toggle}>
            <h3>📋 Audit Log — Change History</h3>
            <span style={{ fontSize: 11, color: 'var(--muted)' }}>{open ? '▲ Collapse' : '▼ Expand'}</span>
          </div>
          {open && (
            <div style={{ overflowX: 'auto' }}>
              {loading
                ? <div className="loading">Loading audit log…</div>
                : entries.length === 0
                  ? <div style={{ padding: 24, textAlign: 'center', color: 'var(--dim)' }}>No audit entries yet. Edit a task % to start tracking.</div>
                  : <table className="atbl">
                    <thead><tr>
                      <th>Timestamp</th><th>Project</th><th>Task</th>
                      <th>Action</th><th>Was</th><th>Now</th><th>By</th><th>MS Project</th>
                    </tr></thead>
                    <tbody>
                      {entries.map(e => (
                        <tr key={e.id}>
                          <td style={{ whiteSpace: 'nowrap', color: 'var(--muted)', fontSize: 10 }}>{new Date(e.timestamp).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' })}</td>
                          <td style={{ fontWeight: 600 }}>{e.project}</td>
                          <td style={{ maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={e.task}>{e.task}</td>
                          <td>{e.action === 'push_to_msp' ? <span style={{ color: 'var(--brand)', fontWeight: 700 }}>🔄 Pushed</span> : <span style={{ textTransform: 'capitalize' }}>{e.action.replace(/_/g, ' ')}</span>}</td>
                          <td>{e.old_value != null ? <span style={{ color: 'var(--r)' }}>{e.old_value}{e.field === 'pct' ? '%' : ''}</span> : '—'}</td>
                          <td>{e.new_value != null ? <span style={{ color: 'var(--g)' }}>{e.new_value}{e.field === 'pct' ? '%' : ''}</span> : '—'}</td>
                          <td style={{ color: 'var(--muted)' }}>{e.user}</td>
                          <td>{e.synced_to_msp ? <span className="a-synced">✓ Synced</span> : (e.action !== 'push_to_msp' && <span className="a-pending">⏳ Pending</span>)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
              }
            </div>
          )}
        </div>
      );
    }

    // ── ROOT APP ─────────────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(() => {
        try { const u = localStorage.getItem('pmUser'); return u ? JSON.parse(u) : null; } catch { return null; }
      });
      const [projects, setProjects] = useState([]);
      const [selected, setSelected] = useState(new Set());
      const [isLight, setIsLight] = useState(true);
      const [loading, setLoading] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [toast, setToast] = useState(null);
      const [showAdmin, setShowAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('users');
      const [pendingCR, setPendingCR] = useState(0);

      async function loadProjects(currentUser) {
        const u = currentUser || user;
        if (!u) return;
        setLoading(true);
        try {
          const raw = await api.portfolio(u.username);
          setProjects(transformData(raw));
        } catch (e) {
          showToast('Failed to load: ' + e.message, 'error');
        }
        setLoading(false);
      }

      useEffect(() => {
        document.documentElement.classList.toggle('light', true);
        if (user) {
          loadProjects(user);
          // Poll pending change requests every 30s for admins
          if (user.role === 'admin') {
            const refresh = () => api.pendingCRCount().then(r => setPendingCR(r.pending_count)).catch(() => { });
            refresh();
            const iv = setInterval(refresh, 30000);
            return () => clearInterval(iv);
          }
        }
      }, []);

      function handleLogin(u) {
        setUser(u);
        loadProjects(u);
      }

      function handleLogout() {
        localStorage.removeItem('pmUser');
        setUser(null);
        setProjects([]);
        setSelected(new Set());
      }

      function toggleMode() {
        const next = !isLight;
        setIsLight(next);
        document.documentElement.classList.toggle('light', next);
      }

      function showToast(msg, type = 'info') {
        setToast({ msg, type, key: Date.now() });
      }

      // Show login screen if not authenticated
      if (!user) return <LoginScreen onLogin={handleLogin} />;

      const visible = projects;
      const active = selected.size ? visible.filter(p => selected.has(p.name)) : visible;
      const initials = user.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

      async function handleAddBlank() {
        const name = window.prompt("Enter new project name:");
        if (!name) return;
        try {
          setLoading(true);
          await api.createProject(name, user.id);
          showToast("Project created", "success");
          await loadProjects(user);
        } catch (e) { showToast(e.message, "error"); setLoading(false); }
      }

      async function handleUpload(file) {
        try {
          showToast("Uploading and parsing MPP...", "info");
          setLoading(true);
          await api.uploadMpp(file, user.id);
          showToast("MPP Uploaded and parsed!", "success");
          await loadProjects(user);
        } catch (e) { showToast(e.message, "error"); setLoading(false); }
      }

      async function handleSyncMpp() {
        setSyncing(true);
        showToast('Reading .mpp files from: OneDrive\u2009› Desktop\u2009› Cubes\u2009› Project Plans ...', 'info');
        try {
          const result = await api.refreshMpp(user.id);
          showToast(result.message || 'Sync complete!', 'success');
          await loadProjects(user);
        } catch (e) { showToast('Sync failed: ' + e.message, 'error'); }
        setSyncing(false);
      }

      return (
        <div className="shell">
          <Sidebar projects={visible} selected={selected}
            onSelect={setSelected}
            onClear={() => setSelected(new Set())}
            onExport={() => window.print()}
            user={user}
            onAddBlank={handleAddBlank}
            onUpload={handleUpload}
            onSyncMpp={handleSyncMpp}
            syncing={syncing} />
          <div className="main">
            <div className="topbar">
              <div>
                <div className="tb-title">
                  Portfolio Dashboard
                  <span style={{ display: 'inline-block', marginLeft: 8, padding: '1px 7px', borderRadius: 5, fontSize: 10, fontWeight: 700, background: 'rgba(91,103,232,.12)', color: 'var(--brand)', border: '1px solid rgba(91,103,232,.25)', verticalAlign: 'middle' }}>v1.4</span>
                </div>
                <div className="tb-sub">{active.length} project{active.length !== 1 ? 's' : ''} · Today: {fmt(TODAY)}</div>
              </div>
              <div className="grow" />
              <span style={{ fontSize: 11, color: 'var(--muted)' }}>{fmtS(TODAY)}</span>
              {user.role === 'admin' && (
                <div style={{ position: 'relative' }}>
                  <button className="admin-btn" onClick={() => { setAdminTab('users'); setShowAdmin(true); }}>👥 Admin</button>
                  {pendingCR > 0 && (
                    <span className="notif-badge" style={{ cursor: 'pointer' }}
                      onClick={() => { setAdminTab('requests'); setShowAdmin(true); }}>
                      {pendingCR}
                    </span>
                  )}
                </div>
              )}
              <div className="user-chip">
                <div className="user-av">{initials}</div>
                <div><div className="user-nm">{user.name}</div><div className="user-role">{user.role}</div></div>
              </div>
              <button className="logout-btn" onClick={handleLogout} title="Sign out">Sign out</button>
              <button className="mode-btn" onClick={toggleMode} title={isLight ? 'Switch to dark mode' : 'Switch to light mode'}>
                {isLight ? '🌙' : '☀️'}
              </button>
            </div>
            <div className="content">
              {loading
                ? <div className="loading">Connecting to MS Project backend…</div>
                : active.length === 0
                  ? <div className="empty">No projects match.<br />Click a project in the sidebar to view it.</div>
                  : <>
                    <KpiRow projects={active} />
                    {active.map(p => (
                      <ProjectSection key={p.name} p={p}
                        onSaved={() => loadProjects()}
                        onToast={showToast}
                        user={user} />
                    ))}
                  </>
              }
              <AuditLog />
            </div>
          </div>
          {toast && <Toast key={toast.key} message={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
          {showAdmin && <AdminPanel currentUser={user} onClose={() => { setShowAdmin(false); setPendingCR(0); api.pendingCRCount().then(r => setPendingCR(r.pending_count)).catch(() => { }); }} onToast={showToast} initialTab={adminTab} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
