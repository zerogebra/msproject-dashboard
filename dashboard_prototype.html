<!doctype html>
<html lang="en" class="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PRISM – PMO Dashboard</title>

  <!-- React 18 + Babel CDN (no Node.js / build step required) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── DARK ──────────────────────────────────────────────────── */
    :root {
      --bg: #060912;
      --s1: #0c1122;
      --s2: #111827;
      --s3: #19243a;
      --s4: #1f2d45;
      --border: #1b2d4a;
      --border2: #2a3f5f;
      --text: #e2e8ff;
      --muted: #64748b;
      --dim: #2e4060;
      --brand: #818cf8;
      --brand2: #a5b4fc;
      --g: #34d399;
      --a: #fbbf24;
      --r: #fb7185;
      --g-bg: rgba(52, 211, 153, .12);
      --g-bd: rgba(52, 211, 153, .3);
      --a-bg: rgba(251, 191, 36, .12);
      --a-bd: rgba(251, 191, 36, .3);
      --r-bg: rgba(251, 113, 133, .12);
      --r-bd: rgba(251, 113, 133, .3);
      --rr: 12px;
    }

    /* ── LIGHT (default) ───────────────────────────────────────── */
    html.light {
      --bg: #f0f4f8;
      --s1: #ffffff;
      --s2: #f8fafc;
      --s3: #edf1f7;
      --s4: #dde5ef;
      --border: #d1dae6;
      --border2: #b8c5d6;
      --text: #1a2332;
      --muted: #5a7090;
      --dim: #8fa4be;
      --brand: #5b67e8;
      --brand2: #4048c4;
      --g: #16a367;
      --a: #c47c08;
      --r: #d42f48;
      --g-bg: rgba(22, 163, 103, .10);
      --g-bd: rgba(22, 163, 103, .3);
      --a-bg: rgba(196, 124, 8, .10);
      --a-bd: rgba(196, 124, 8, .28);
      --r-bg: rgba(212, 47, 72, .10);
      --r-bd: rgba(212, 47, 72, .28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body,
    #root {
      height: 100%;
      overflow: hidden
    }

    body {
      background: var(--bg);
      color: var(--text);
      font: 13px/1.6 'Segoe UI', system-ui, sans-serif;
      transition: background .2s, color .2s
    }

    .shell {
      display: grid;
      grid-template-columns: 272px 1fr;
      height: 100vh
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    .sb-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border)
    }

    .prism-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      border-radius: 9px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      flex-shrink: 0
    }

    .sb-brand {
      font-weight: 800;
      font-size: 14px;
      background: linear-gradient(90deg, var(--brand), var(--brand2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .sb-sub {
      font-size: 10px;
      color: var(--muted)
    }

    .sb-block {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border)
    }

    .sb-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 6px
    }

    .sb-hint {
      font-size: 10px;
      color: var(--dim);
      padding: 2px 14px 6px;
      font-style: italic
    }

    .sb-search {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 12px;
      outline: none
    }

    .sb-search:focus {
      border-color: var(--brand)
    }

    .sb-search::placeholder {
      color: var(--dim)
    }

    select.sb-sel {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 11px;
      cursor: pointer;
      outline: none
    }

    .proj-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px
    }

    .proj-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 9px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: .15s;
      margin-bottom: 3px;
      user-select: none
    }

    .proj-row:hover {
      background: var(--s3);
      border-color: var(--border)
    }

    .proj-row.sel {
      background: rgba(91, 103, 232, .1);
      border-color: rgba(91, 103, 232, .4)
    }

    html:not(.light) .proj-row.sel {
      background: rgba(129, 140, 248, .1);
      border-color: rgba(129, 140, 248, .4)
    }

    .pcheck {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid var(--border2);
      flex-shrink: 0;
      display: grid;
      place-items: center
    }

    .proj-row.sel .pcheck {
      background: var(--brand);
      border-color: var(--brand)
    }

    .proj-row.sel .pcheck::after {
      content: '✓';
      color: #fff;
      font-size: 10px;
      font-weight: 700
    }

    .pdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .pname {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .pmeta {
      font-size: 10px;
      color: var(--muted)
    }

    .rag {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0
    }

    .rag-G {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-bd)
    }

    .rag-A {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-bd)
    }

    .rag-R {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-bd)
    }

    .sb-foot {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px
    }

    .btn {
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--s3);
      color: var(--text);
      transition: .15s;
      flex: 1;
      text-align: center
    }

    .btn:hover {
      border-color: var(--brand);
      color: var(--brand)
    }

    .btn.white {
      background: #fff;
      color: #111;
      border-color: #cbd5e1
    }

    .mode-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--s2);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0
    }

    /* MAIN */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .tb-title {
      font-weight: 700;
      font-size: 14px
    }

    .tb-sub {
      font-size: 11px;
      color: var(--muted)
    }

    .grow {
      flex: 1
    }

    select.ctrl {
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      outline: none
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    /* KPI */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px
    }

    .kpi {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--rr);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      overflow: hidden
    }

    .kpi::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px
    }

    .kpi.kb::before {
      background: linear-gradient(90deg, var(--brand), var(--brand2))
    }

    .kpi.kg::before {
      background: linear-gradient(90deg, var(--g), #6ee7b7)
    }

    .kpi.ka::before {
      background: linear-gradient(90deg, var(--a), #fde68a)
    }

    .kpi.kr::before {
      background: linear-gradient(90deg, var(--r), #fca5a5)
    }

    .kpi.kx::before {
      background: linear-gradient(90deg, var(--muted), var(--border2))
    }

    .kl {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .kv {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1
    }

    .ks {
      font-size: 10px;
      color: var(--dim)
    }

    /* PROJECT CARD */
    .proj-section {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--rr)
    }

    .ps-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--s2);
      border-bottom: 1px solid var(--border);
      border-radius: var(--rr) var(--rr) 0 0;
      flex-wrap: wrap;
      row-gap: 8px
    }

    .ps-av {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 14px;
      flex-shrink: 0
    }

    .ps-nm {
      font-size: 14px;
      font-weight: 700
    }

    .ps-dt {
      font-size: 11px;
      color: var(--muted)
    }

    .ps-mx {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      margin-left: auto;
      flex-wrap: wrap
    }

    .ps-mv {
      font-size: 22px;
      font-weight: 800;
      line-height: 1
    }

    .ps-ml {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase
    }

    .ps-bar {
      height: 4px;
      background: var(--s3)
    }

    .ps-bfill {
      height: 100%;
      transition: width .5s
    }

    .push-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px
    }

    .pending-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(234, 179, 8, .15);
      color: #92610a;
      border: 1px solid rgba(234, 179, 8, .35)
    }

    html:not(.light) .pending-badge {
      color: #fde68a
    }

    .push-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      background: var(--brand);
      color: #fff;
      white-space: nowrap
    }

    .push-btn:disabled {
      opacity: .35;
      cursor: default
    }

    /* SUMMARY STRIP */
    .sumstrip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border)
    }

    .sumc {
      padding: 10px 16px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .sumc:last-child {
      border-right: none
    }

    .suml {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
      margin-bottom: 2px
    }

    .sumv {
      font-size: 13px;
      font-weight: 700
    }

    /* Health reasoning */
    .health-reason {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5
    }

    /* AI INSIGHTS */
    .insights-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--s2)
    }

    .insights-hd {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .insights-hd::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .insights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .insight-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden
    }

    .ic-hdr {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .ic-body {
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .ic-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 11px
    }

    .ic-row:last-child {
      border-bottom: none
    }

    .ic-row:hover {
      background: var(--s3)
    }

    .ic-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0
    }

    .ic-tag {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0
    }

    .ic-days {
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right
    }

    .ic-empty {
      padding: 12px;
      font-size: 11px;
      color: var(--dim);
      text-align: center
    }

    /* TASK TABLE */
    .tt-section {
      border-bottom: 1px solid var(--border)
    }

    .tt-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 9px;
      border-bottom: 1px solid var(--border);
      background: var(--s2)
    }

    .tt-hdr h3 {
      font-size: 12px;
      font-weight: 700
    }

    .tt-meta {
      font-size: 11px;
      color: var(--muted)
    }

    table.msp {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    table.msp th {
      padding: 7px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--border2);
      white-space: nowrap;
      background: var(--s2)
    }

    table.msp td {
      padding: 0;
      border-bottom: 1px solid var(--border);
      vertical-align: middle
    }

    .td-pad {
      padding: 0 10px;
      display: flex;
      align-items: center;
      height: 100%
    }

    .tr-root td {
      background: rgba(91, 103, 232, .09) !important;
      border-top: 2px solid rgba(91, 103, 232, .3) !important;
      border-bottom: 2px solid rgba(91, 103, 232, .2) !important
    }

    .tr-root:hover td {
      background: rgba(91, 103, 232, .14) !important
    }

    html:not(.light) .tr-root td {
      background: rgba(129, 140, 248, .1) !important;
      border-top: 2px solid rgba(129, 140, 248, .35) !important;
      border-bottom: 2px solid rgba(129, 140, 248, .2) !important
    }

    html:not(.light) .tr-root:hover td {
      background: rgba(129, 140, 248, .16) !important
    }

    .tr-phase td {
      background: rgba(0, 0, 0, .03) !important;
      border-left: 3px solid rgba(0, 0, 0, .08) !important
    }

    .tr-phase:hover td {
      background: rgba(0, 0, 0, .06) !important
    }

    html:not(.light) .tr-phase td {
      background: rgba(255, 255, 255, .03) !important;
      border-left: 3px solid rgba(255, 255, 255, .1) !important
    }

    html:not(.light) .tr-phase:hover td {
      background: rgba(255, 255, 255, .06) !important
    }

    .tr-task:hover td {
      background: var(--s3) !important
    }

    .tr-ms td {
      background: rgba(91, 103, 232, .03) !important
    }

    .tr-ms:hover td {
      background: rgba(91, 103, 232, .07) !important
    }

    table.msp tr td {
      height: 34px
    }

    table.msp tr.tr-root td {
      height: 42px
    }

    table.msp tr.tr-phase td {
      height: 36px
    }

    .name-cell {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 0;
      padding: 0 10px
    }

    .tree-conn {
      font-size: 10px;
      color: var(--dim);
      white-space: pre;
      flex-shrink: 0;
      font-family: monospace
    }

    .row-icon {
      flex-shrink: 0;
      margin-right: 5px;
      font-size: 12px;
      width: 14px;
      text-align: center
    }

    .row-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tr-root .row-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--brand)
    }

    .tr-phase .row-name {
      font-weight: 700;
      color: var(--text)
    }

    .tr-task .row-name {
      color: var(--text)
    }

    .tr-ms .row-name {
      color: var(--brand);
      font-style: italic
    }

    .type-badge {
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      display: inline-block;
      min-width: 62px;
      text-align: center
    }

    .t-sum {
      background: rgba(91, 103, 232, .1);
      color: var(--brand);
      border: 1px solid rgba(91, 103, 232, .22)
    }

    .t-task {
      background: rgba(100, 116, 139, .1);
      color: var(--muted);
      border: 1px solid rgba(100, 116, 139, .2)
    }

    .t-ms {
      background: rgba(91, 103, 232, .08);
      color: var(--brand2);
      border: 1px solid rgba(91, 103, 232, .18)
    }

    .pbar-wrap {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .pbar {
      width: 52px;
      height: 5px;
      background: var(--s3);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0
    }

    .pfill {
      height: 100%;
      border-radius: 999px
    }

    .sc {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      display: inline-block;
      min-width: 76px;
      text-align: center
    }

    .sc-done {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-bd)
    }

    .sc-on {
      background: rgba(91, 103, 232, .12);
      color: var(--brand);
      border: 1px solid rgba(91, 103, 232, .25)
    }

    .sc-risk {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-bd)
    }

    .sc-late {
      background: rgba(249, 115, 22, .12);
      color: #c2410c;
      border: 1px solid rgba(249, 115, 22, .35)
    }

    html:not(.light) .sc-late {
      color: #fb923c
    }

    .sc-critical {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-bd)
    }

    .sc-ns {
      background: rgba(100, 116, 139, .1);
      color: var(--muted);
      border: 1px solid rgba(100, 116, 139, .25)
    }

    .sc-ms-ok {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-bd)
    }

    .sc-ms-miss {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-bd)
    }

    .sc-ms-up {
      background: rgba(91, 103, 232, .08);
      color: var(--brand2);
      border: 1px solid rgba(91, 103, 232, .18)
    }

    /* INLINE EDITOR */
    .override-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;

      return pct >= 50 ? 'G' : pct >= 20 ? 'A' : 'R';
    }
    const ragLabel = r => r === 'G' ? 'On Track' : r === 'A' ? 'At Risk' : 'Delayed';

    function taskSt(t) {
      if (t.pct >= 100) return { l: 'Completed', c: 'sc-done' };
      const todayStr = TODAY.toISOString().split('T')[0];
      const endDate = new Date(t.end);
      const startDate = new Date(t.start);
      if (TODAY > endDate) {
        const overdue = days(t.end, todayStr);
        return overdue > 14 ? { l: 'Critical', c: 'sc-critical' } : { l: 'Delayed', c: 'sc-late' };
      }
      if (TODAY < startDate) return { l: 'Not Started', c: 'sc-ns' };
      // Task window has opened but nothing recorded yet → should-have-started warning
      if (t.pct === 0) return { l: 'Not Started', c: 'sc-risk' };
      const tot = Math.max(1, days(t.start, t.end));
      const elap = clamp(days(t.start, todayStr), 0, tot);
      const expectedPct = Math.round(elap / tot * 100);
      return t.pct < expectedPct - 20 ? { l: 'At Risk', c: 'sc-risk' } : { l: 'In Progress', c: 'sc-on' };
    }

    // Returns a human-readable reason string for the status (used as tooltip).
    function taskStReason(t, st) {
      const todayStr = TODAY.toISOString().split('T')[0];
      if (st.c === 'sc-done') return 'Task is 100% complete.';
      if (st.c === 'sc-ns' && TODAY < new Date(t.start)) return `Scheduled to start ${fmt(t.start)}.`;
      if (st.c === 'sc-risk' && t.pct === 0 && TODAY >= new Date(t.start) && TODAY <= new Date(t.end))
        return `Should have started ${fmt(t.start)} — no progress recorded yet.`;
      if (st.c === 'sc-critical') {
        const od = days(t.end, todayStr);
        return `${od} day${od !== 1 ? 's' : ''} past finish date (${fmt(t.end)}). Requires immediate attention.`;
      }
      if (st.c === 'sc-late') {
        const od = days(t.end, todayStr);
        return `${od} day${od !== 1 ? 's' : ''} past finish date (${fmt(t.end)}).`;
      }
      const tot = Math.max(1, days(t.start, t.end));
      const elap = clamp(days(t.start, todayStr), 0, tot);
      const expectedPct = Math.round(elap / tot * 100);
      if (st.c === 'sc-risk')
        return `Behind schedule — ${elap}d elapsed of ${tot}d total. Expected ~${expectedPct}%, actual ${Math.round(t.pct)}%.`;
      return `On track — ${elap}d elapsed of ${tot}d total (expected ~${expectedPct}%, actual ${Math.round(t.pct)}%).`;
    }

    function addWBS(items) {
      const ctr = [0, 0, 0, 0, 0];
      return items.map(t => {
        const lv = t.level - 1;
        ctr[lv]++;
        for (let i = lv + 1; i < ctr.length; i++) ctr[i] = 0;
        return { ...t, wbs: ctr.slice(0, t.level).join('.') };
      });
    }

    function recalcSummaryPcts(items) {
      // We no longer blindly recalculate summary percentages as simple flat averages.
      // This ensures the dashboard explicitly shows the MS Project work-weighted averages.
      return items;
    }

    // Unified status → bar/text color (no project color involved)
    // pct is optional; when 0 and status is sc-risk it means "not started late" → orange
    function statusColor(st, pct) {
      if (!st) return 'var(--brand)';
      if (st.c === 'sc-done') return 'var(--g)';
      if (st.c === 'sc-critical') return 'var(--r)';
      if (st.c === 'sc-late') return '#f97316';           // orange — delayed
      if (st.c === 'sc-risk') return pct === 0 ? '#f97316' : 'var(--a)'; // no start yet → orange; behind schedule → amber
      if (st.c === 'sc-ns') return 'var(--muted)';      // genuinely not started (future)
      return 'var(--brand)'; // in progress / on track
    }

    // Generate a plain-English explanation of the project health RAG.
    function healthReason(p) {
      const todayStr = TODAY.toISOString().split('T')[0];
      const leaves = p.items.filter(t => !t.is_summary && !t.is_milestone);
      const delayed = leaves.filter(t => { const s = taskSt(t); return s.c === 'sc-critical' || s.c === 'sc-late'; });
      const noStart = leaves.filter(t => taskSt(t).c === 'sc-risk' && t.pct === 0);
      const atRisk = leaves.filter(t => taskSt(t).c === 'sc-risk' && t.pct > 0);
      const dl = days(todayStr, p.end);
      if (p.health === 'R') {
        if (dl < 0) return `Project is ${Math.abs(dl)}d past its planned finish. ${delayed.length} task${delayed.length !== 1 ? 's' : ''} overdue.`;
        return `${delayed.length} overdue task${delayed.length !== 1 ? 's' : ''} with only ${dl}d left. At ${p.progress}% complete, deadline is at risk.`;
      }
      if (p.health === 'A') {
        const parts = [];
        if (atRisk.length) parts.push(`${atRisk.length} task${atRisk.length !== 1 ? 's' : ''} behind expected pace`);
        if (noStart.length) parts.push(`${noStart.length} task${noStart.length !== 1 ? 's' : ''} not started yet`);
        return (parts.join(', ') || 'Some tasks need attention') + `. ${dl > 0 ? dl + 'd remaining.' : ''}`;
      }
      return `${p.progress}% complete — progressing on schedule with ${dl > 0 ? dl + 'd remaining' : Math.abs(dl) + 'd past finish'}.`;
    }

    // AI-style insights: delayed items + active in-progress items to focus on.
    function InsightsPanel({ p }) {
      const todayStr = TODAY.toISOString().split('T')[0];
      const leaves = p.items.filter(t => !t.is_summary && !t.is_milestone && !t.is_project_root);

      // Delayed/critical tasks
      const delayed = leaves.filter(t => {
        const s = taskSt(t);
        return s.c === 'sc-critical' || s.c === 'sc-late' || (s.c === 'sc-risk' && t.pct === 0);
      }).map(t => {
        const s = taskSt(t);
        const od = s.c === 'sc-ns' ? 0 : days(t.end, todayStr);
        return { ...t, st: s, od };
      }).sort((a, b) => b.od - a.od);

      // Active in-progress (have some progress, end date in future)
      const active = leaves.filter(t => {
        const s = taskSt(t);
        return (s.c === 'sc-on' || s.c === 'sc-risk') && t.pct > 0 && t.pct < 100;
      }).map(t => {
        const rem = Math.max(0, days(todayStr, t.end));
        return { ...t, st: taskSt(t), rem };
      }).sort((a, b) => a.rem - b.rem); // soonest deadline first

      const delayedColor = c => c === 'sc-critical' ? 'var(--r)' : c === 'sc-late' || c === 'sc-risk' ? '#f97316' : 'var(--a)';

      return (
        <div className="insights-section">
          <div className="insights-hd">🤖 Project Intelligence</div>
          <div className="insights-grid">
            {/* Left card: items needing attention */}
            <div className="insight-card">
              <div className="ic-hdr" style={{ color: 'var(--r)', borderColor: 'var(--border)' }}>
                ⚠ Needs Attention <span style={{ marginLeft: 'auto', color: 'var(--muted)', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>{delayed.length} item{delayed.length !== 1 ? 's' : ''}</span>
              </div>
              <div className="ic-body">
                {delayed.length === 0
                  ? <div className="ic-empty">✓ No delayed or stalled tasks</div>
                  : delayed.slice(0, 6).map((t, i) => (
                    <div key={i} className="ic-row">
                      <span className="ic-name" title={t.title}>{t.title}</span>
                      <span className="ic-tag" style={{
                        background: `${delayedColor(t.st.c)}18`,
                        color: delayedColor(t.st.c),
                        border: `1px solid ${delayedColor(t.st.c)}40`
                      }}>
                        {t.st.l}
                      </span>
                      <span className="ic-days" style={{ color: delayedColor(t.st.c) }}>
                        {t.od > 0 ? `${t.od}d late` : `0% since ${fmtS(t.start)}`}
                      </span>
                    </div>
                  ))
                }
              </div>
            </div>

            {/* Right card: active tasks to complete */}
            <div className="insight-card">
              <div className="ic-hdr" style={{ color: 'var(--brand)', borderColor: 'var(--border)' }}>
                🎯 In Progress — Focus <span style={{ marginLeft: 'auto', color: 'var(--muted)', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>{active.length} item{active.length !== 1 ? 's' : ''}</span>
              </div>
              <div className="ic-body">
                {active.length === 0
                  ? <div className="ic-empty">No tasks currently in progress</div>
                  : active.slice(0, 6).map((t, i) => {
                    const stC = t.st.c === 'sc-risk' ? 'var(--a)' : 'var(--brand)';
                    return (
                      <div key={i} className="ic-row">
                        <span className="ic-name" title={t.title}>{t.title}</span>
                        <span className="ic-tag" style={{
                          background: `${stC}18`, color: stC,
                          border: `1px solid ${stC}40`
                        }}>
                          {Math.round(t.pct)}%
                        </span>
                        <span className="ic-days" style={{ color: t.rem <= 3 ? 'var(--r)' : t.rem <= 7 ? 'var(--a)' : 'var(--muted)' }}>
                          {t.rem === 0 ? 'due today' : t.rem === 1 ? '1d left' : `${t.rem}d left`}
                        </span>
                      </div>
                    );
                  })
                }
              </div>
            </div>
          </div>
        </div>
      );
    }

    function transformData(raw) {
      return raw.projects.map((p, i) => {
        const color = COLORS[i % COLORS.length];
        // 1. normalise dates & flags
        const raw_items = p.items.map((t, ri) => {
          const startD = t.start.split('T')[0];
          const endD = t.end.split('T')[0];
          // Use the MPXJ milestone flag from backend; fall back to date equality only for non-summary tasks
          // (avoids misclassifying 1-day tasks whose start/end happen to share the same date)
          const isMsFlag = t.is_milestone === true ? true
            : (!t.is_summary && startD === endD && t.is_milestone !== false);
          return {
            ...t,
            start: startD,
            end: endD,
            level: t.level || 1,
            is_summary: t.is_summary || false,
            is_milestone: isMsFlag,
            overridden: t.overridden || false,
            original_pct: t.original_pct != null ? t.original_pct : t.pct,
            override_info: t.override_info || null,
            is_project_root: ri === 0 && (t.title === p.name || (p.items.length > 1 && (t.is_summary || false))),
          };
        });
        // 2. add WBS numbering
        const items = addWBS(recalcSummaryPcts(raw_items));
        const rootItem = items.find(t => t.is_project_root);

        // Use the actual root project progress instead of unweighted averaging of leaf tasks.
        const progress = rootItem ? Math.round(rootItem.pct) : (items.length ? Math.round(items[0].pct) : 0);

        const ss = items.map(t => t.start).sort();
        const ee = items.map(t => t.end).sort();
        const pEnd = ee[ee.length - 1];
        return {
          code: p.code, name: p.name, mpp_path: p.mpp_path || '',
          pending_overrides: p.pending_overrides || 0,
          color, progress, health: rag(progress, pEnd), start: ss[0], end: pEnd, items
        };
      });
    }

    // ── API ─────────────────────────────────────────────────────────
    const api = {
      login: (login) =>
        fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login }) })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Login failed') })),

      portfolio: (username) =>
        fetch(`/api/portfolio?username=${encodeURIComponent(username || 'user')}`).then(r => r.json()),

      saveOverride: (project, task, value, origVal, username) =>
        fetch('/api/override', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project, task, field: 'pct', value, original_value: origVal, user: username || 'user' })
        }).then(r => r.json()),

      deleteOverride: (project, task) =>
        fetch('/api/override', {
          method: 'DELETE', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project, task })
        }).then(r => r.json()),

      push: (project, username) =>
        fetch(`/api/push/${encodeURIComponent(project)}?user=${encodeURIComponent(username || 'user')}`, { method: 'POST' })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail?.message || e.detail || 'Push failed') })),

      audit: (limit = 200) => fetch(`/api/audit?limit=${limit}`).then(r => r.json()),

      // ── user management (admin only) ──
      getUsers: (callerId) =>
        fetch(`/api/users?caller_id=${encodeURIComponent(callerId)}`).then(r => r.json()),

      createUser: (callerId, data) =>
        fetch(`/api/users?caller_id=${encodeURIComponent(callerId)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
        })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      updateUser: (callerId, userId, data) =>
        fetch(`/api/users/${userId}?caller_id=${encodeURIComponent(callerId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
        })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      deleteUser: (callerId, userId) =>
        fetch(`/api/users/${userId}?caller_id=${encodeURIComponent(callerId)}`, { method: 'DELETE' })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      // ── change requests ──
      submitChangeRequest: (data) =>
        fetch('/api/change-requests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      getChangeRequests: (callerId, status) =>
        fetch(`/api/change-requests?caller_id=${encodeURIComponent(callerId)}${status ? '&status=' + status : ''}`)
          .then(r => r.json()),

      pendingCRCount: () =>
        fetch('/api/change-requests/pending-count').then(r => r.json()),

      reviewChangeRequest: (callerId, requestId, action, reviewer, note) =>
        fetch(`/api/change-requests/${requestId}/review?caller_id=${encodeURIComponent(callerId)}`,
          {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, reviewer, review_note: note || '' })
          })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      // ── standalone features ──
      createProject: (name, callerId) =>
        fetch(`/api/projects?caller_id=${encodeURIComponent(callerId)}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      cloneProject: (code, callerId) =>
        fetch(`/api/projects/${code}/clone?caller_id=${encodeURIComponent(callerId)}`, { method: 'POST', headers: { 'Content-Type': 'application/json' } })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      updateTask: (taskId, data, callerId) =>
        fetch(`/api/tasks/${taskId}?caller_id=${encodeURIComponent(callerId)}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') })),

      uploadMpp: (file, callerId) => {
        const fd = new FormData();
        fd.append('file', file);
        return fetch(`/api/upload-mpp?caller_id=${encodeURIComponent(callerId)}`, { method: 'POST', body: fd })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Failed') }));
      },

      refreshMpp: (callerId) =>
        fetch(`/api/refresh-from-mpp?caller_id=${encodeURIComponent(callerId || '')}`, { method: 'POST' })
          .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Sync failed') })),
    };

    // ── TOAST COMPONENT ─────────────────────────────────────────────
    function Toast({ message, type, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 4500);
        return () => clearTimeout(t);
      }, [message]);
      if (!message) return null;
      const bg = type === 'success' ? '#15803d' : type === 'error' ? '#b91c1c' : '#1d4ed8';
      return <div className="toast" style={{ background: bg, opacity: 1 }}>{message}</div>;
    }

    // ── LOGIN SCREEN ─────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [val, setVal] = useState('');
      const [err, setErr] = useState('');
      const [busy, setBusy] = useState(false);

      async function doLogin() {
        const v = val.trim();
        if (!v) { setErr('Please enter your username or email address.'); return; }
        setBusy(true); setErr('');
        try {
          const user = await api.login(v);
          localStorage.setItem('pmUser', JSON.stringify(user));
          onLogin(user);
        } catch (e) { setErr(e.message); }
        setBusy(false);
      }

      const roleDesc = { admin: 'Full access · all projects', editor: 'Can edit assigned projects', viewer: 'Read-only access' };

      return (
        <div className="login-screen">
          <div className="login-card">
            <div className="login-logo">
              <div className="prism-icon">P</div>
              <div><div className="login-brand">PRISM</div><div className="login-sub">CUBES PMO Dashboard</div></div>
            </div>
            <h2>Welcome back</h2>
            <p style={{ color: 'var(--muted)', fontSize: 13 }}>Enter your username or email address to access the dashboard.</p>
            {err && <div className="login-err">⚠ {err}</div>}
            <input className="login-input" type="text" placeholder="e.g. mohammad.hamzeh or …@cubesplatform.com"
              value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && doLogin()} autoFocus />
            <button className="login-btn" onClick={doLogin} disabled={busy}>{busy ? 'Signing in…' : 'Sign In →'}</button>
            <div className="login-hint">Contact your administrator if you do not have access.</div>
          </div>
        </div>
      );
    }

    // ── ADMIN PANEL ──────────────────────────────────────────────────
    const ROLE_LABELS = { admin: 'Admin', editor: 'Editor', viewer: 'Viewer' };
    const FILTER_LABELS = { all: 'All Projects', cubes: 'Cubes Teams', implementation: 'Implementation Teams', specific: 'Specific List' };

    function AdminPanel({ currentUser, onClose, onToast, initialTab }) {
      const [tab, setTab] = useState(initialTab || 'users'); // 'users' | 'requests'
      const [users, setUsers] = useState([]);
      const [requests, setRequests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [form, setForm] = useState(null);
      const [fd, setFd] = useState({});

      async function load() {
        setLoading(true);
        try {
          const [ur, cr] = await Promise.all([
            api.getUsers(currentUser.id),
            api.getChangeRequests(currentUser.id),
          ]);
          setUsers(ur.users);
          setRequests(cr.requests);
        } catch (e) { onToast('Load failed: ' + e.message, 'error'); }
        setLoading(false);
      }
      useEffect(() => { load(); }, []);

      function openAdd() {
        setFd({ name: '', username: '', email: '', role: 'viewer', project_filter: 'all', allowed_projects: [], active: true });
        setForm({ mode: 'add' });
      }
      function openEdit(u) {
        setFd({ ...u });
        setForm({ mode: 'edit', user: u });
      }
      function closeForm() { setForm(null); }

      async function saveForm() {
        try {
          if (form.mode === 'add') {
            await api.createUser(currentUser.id, {
              name: fd.name, username: fd.username, email: fd.email,
              role: fd.role, project_filter: fd.project_filter,
              allowed_projects: fd.allowed_projects || [],
            });
            onToast('User added ✓', 'success');
          } else {
            await api.updateUser(currentUser.id, form.user.id, {
              name: fd.name, username: fd.username, email: fd.email,
              role: fd.role, project_filter: fd.project_filter,
              allowed_projects: fd.allowed_projects || [],
              active: fd.active,
            });
            onToast('User updated ✓', 'success');
          }
          closeForm();
          load();
        } catch (e) { onToast(e.message, 'error'); }
      }

      async function toggleActive(u) {
        try {
          await api.updateUser(currentUser.id, u.id, { active: !u.active });
          onToast(u.active ? 'User deactivated' : 'User reactivated', 'success');
          load();
        } catch (e) { onToast(e.message, 'error'); }
      }

      async function doDelete(u) {
        if (u.id === currentUser.id) { onToast('Cannot delete your own account.', 'error'); return; }
        if (!window.confirm(`Delete user "${u.name}"? This cannot be undone.`)) return;
        try {
          await api.deleteUser(currentUser.id, u.id);
          onToast('User deleted', 'success');

      function RoleBadge({ role, active }) {
        if (!active) return <span className="role-badge rb-inactive">Inactive</span>;

        return <span className={`role-badge ${cls}`}>{ROLE_LABELS[role] || role}</span>;
      }

      return (
        <div className="adm-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="adm-panel">
            <div className="adm-hdr">
              <h2>👥 User Management</h2>
              <span style={{ fontSize: 11, color: 'var(--muted)' }}>Admin only · changes take effect immediately</span>
              <button className="adm-close" onClick={onClose}>✕</button>
            </div>
            <div className="adm-body">
              {/* Tabs */}
              <div className="adm-tabs">
                <div className={`adm-tab${tab === 'users' ? ' active' : ''}`} onClick={() => setTab('users')}>👥 Users</div>
                <div className={`adm-tab${tab === 'requests' ? ' active' : ''}`} onClick={() => setTab('requests')}>
                  📝 Change Requests
                  {requests.filter(r => r.status === 'pending').length > 0 &&
                    <span style={{ marginLeft: 5, background: 'var(--r)', color: '#fff', borderRadius: 999, padding: '0 5px', fontSize: 9, fontWeight: 800 }}>
                      {requests.filter(r => r.status === 'pending').length}
                    </span>}
                </div>
              </div>

              {tab === 'requests' && (
                <div>
                  <div className="adm-section-title">Change Requests</div>
                  {loading ? <div className="loading">Loading…</div> : requests.length === 0
                    ? <div style={{ padding: 20, color: 'var(--dim)', textAlign: 'center', fontSize: 12 }}>No change requests yet.</div>
                    : <table className="utbl">
                      <thead><tr>
                        <th>Task</th><th>Project</th><th>From</th><th>To</th>
                        <th>Reason</th><th>Requested By</th><th>Status</th><th style={{ width: 150 }}>Actions</th>
                      </tr></thead>
                      <tbody>
                        {requests.map(r => (
                          <tr key={r.id}>
                            <td style={{ fontWeight: 600, maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={r.task}>{r.task}</td>
                            <td style={{ fontSize: 11, color: 'var(--muted)' }}>{r.project}</td>

    // ── REQUEST CHANGE MODAL ─────────────────────────────────────────
    function RequestChangeModal({ task, project, user, onClose, onToast }) {
      const [val, setVal] = useState('');
      const [reason, setReason] = useState('');
      const [busy, setBusy] = useState(false);

      async function submit() {
        const v = parseInt(val);
        if (isNaN(v) || v < 0 || v > 99) { onToast('Enter a valid % between 0 and 99', 'error'); return; }
        if (!reason.trim()) { onToast('Please provide a reason', 'error'); return; }
        setBusy(true);
        try {
          await api.submitChangeRequest({
            project,
            task: task.title,
            current_value: task.pct,
            requested_value: v,
            reason: reason.trim(),
            requested_by: user.username,
          });
          onToast('📝 Change request submitted — awaiting admin approval', 'success');
          onClose();
        } catch (e) { onToast('Submit failed: ' + e.message, 'error'); }
        setBusy(false);
      }

      return (
        <div className="cr-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="cr-modal">
            <h3>📝 Request Value Change</h3>
            <p>Task <strong>{task.title}</strong> is at <strong style={{ color: 'var(--g)' }}>100%</strong> (locked).<br />
              Submit a request to the admin to change it.</p>
            <div className="cr-field">
              <label>Requested New Value (%)</label>
              <input type="number" min="0" max="99" placeholder="e.g. 75"
                value={val} onChange={e => setVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && submit()} />
            </div>
            <div className="cr-field">
              <label>Reason *</label>
              <textarea placeholder="Explain why this value needs to be changed…"
                value={reason} onChange={e => setReason(e.target.value)} />
            </div>
            <div className="cr-modal-actions">
              <button className="cr-cancel-btn" onClick={onClose}>Cancel</button>
              <button className="cr-submit-btn" onClick={submit} disabled={busy}>
                {busy ? 'Submitting…' : 'Submit Request →'}
              </button>
            </div>
          </div>
        </div>
      );
    }
