<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Project Portfolio Dashboard</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e5e7eb;
      }
      h1 {
        margin-bottom: 4px;
      }
      .subtitle {
        color: #9ca3af;
        margin-bottom: 24px;
      }
      .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
      .card {
        background: #020617;
        border-radius: 12px;
        border: 1px solid #1e293b;
        padding: 16px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
      }
      .code {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #22c55e;
      }
      .name {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .task {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 8px 0;
        border-top: 1px solid #1f2933;
      }
      .task-title {
        font-size: 13px;
        font-weight: 500;
      }
      .task-meta {
        font-size: 11px;
        color: #9ca3af;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .bar {
        margin-top: 4px;
        height: 6px;
        border-radius: 999px;
        background: rgba(55, 65, 81, 0.7);
        overflow: hidden;
      }
      .bar-inner {
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #a3e635);
      }
      .empty {
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Project Portfolio</h1>
    <div class="subtitle">
      Preview using example data. Backend will replace this with real MS
      Project (.mpp) data from `/api/portfolio`.
    </div>

    <div id="app"></div>

    <script>
      // EXAMPLE DATA (this is what the backend will return from MS Project files)
      window.__DATA__ = {
        projects: [
          {
            code: "PRJ",
            name: "Project Phoenix – Migration",
            items: [
              {
                title: "Discovery & Requirements",
                start: "2026-02-01T09:00:00",
                end: "2026-02-07T17:00:00",
                pct: 100,
              },
              {
                title: "Core Build",
                start: "2026-02-08T09:00:00",
                end: "2026-03-01T17:00:00",
                pct: 55,
              },
              {
                title: "UAT & Training",
                start: "2026-03-02T09:00:00",
                end: "2026-03-15T17:00:00",
                pct: 10,
              },
            ],
          },
          {
            code: "CRM",
            name: "CRM Rollout – EMEA",
            items: [
              {
                title: "Rollout Wave 1",
                start: "2026-01-15T09:00:00",
                end: "2026-02-15T17:00:00",
                pct: 80,
              },
              {
                title: "Rollout Wave 2",
                start: "2026-02-16T09:00:00",
                end: "2026-03-31T17:00:00",
                pct: 35,
              },
            ],
          },
        ],
      };

      function renderDashboard(data) {
        const root = document.getElementById("app");
        if (!data || !Array.isArray(data.projects) || data.projects.length === 0) {
          root.innerHTML =
            '<div class="empty">No projects found. Check MPP_ROOT and your .mpp files.</div>';
          return;
        }

        const html = `
          <div class="projects">
            ${data.projects
              .map((p) => {
                const tasksHtml =
                  p.items && p.items.length
                    ? p.items
                        .map((t) => {
                          const pct = Number(t.pct || 0);
                          const pctClamped = Math.max(
                            0,
                            Math.min(100, Math.round(pct))
                          );
                          return `
                            <div class="task">
                              <div class="task-title">${t.title}</div>
                              <div class="task-meta">
                                <span>${new Date(
                                  t.start
                                ).toLocaleDateString()} → ${new Date(
                            t.end
                          ).toLocaleDateString()}</span>
                                <span>${pctClamped}%</span>
                              </div>
                              <div class="bar">
                                <div class="bar-inner" style="width: ${pctClamped}%;"></div>
                              </div>
                            </div>
                          `;
                        })
                        .join("")
                    : '<div class="empty">No tasks in this project.</div>';

                return `
                  <div class="card">
                    <div class="code">${p.code || ""}</div>
                    <div class="name">${p.name || "Untitled project"}</div>
                    ${tasksHtml}
                  </div>
                `;
              })
              .join("")}
          </div>
        `;

        root.innerHTML = html;
      }

      // For now, just use the example data above:
      renderDashboard(window.__DATA__);

      // LATER, when backend is working, replace the above with:
      // (async () => {
      //   const res = await fetch("/api/portfolio?username=mhamzeh");
      //   window.__DATA__ = await res.json();
      //   renderDashboard(window.__DATA__);
      // })();
    </script>
  </body>
</html>
